<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PaaOS Future</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root { 
    --bg: #000; 
    --accent: #ff3e3e; 
    --text: #fff; 
    --glass: rgba(255,255,255,0.15); 
    --win-bg: #fdfdfd; 
    --text-dark: #000;
    --bsod-bg: #0078d7;
    /* デフォルトはシステム標準フォント */
    --font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    --emoji-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', sans-serif;
}


/* ↓↓↓ ここに追加 ↓↓↓ */
* {
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
}



/* 入力欄だけは普通に使えるようにする場合（任意） */
input, textarea {
    user-select: auto !important;
    -webkit-user-select: auto !important;
    cursor: text !important;
}
        
        html, body { 
    margin: 0; padding: 0; width: 100%; height: 100%; 
    overflow: hidden; position: fixed; 
    touch-action: none; 
    background: #1a1a1a; color: var(--text); 
    font-family: var(--font-family);  /* ← ここを変更 */
}

        #device { 
            width: 375px; height: 812px; background: var(--bg); border-radius: 55px; 
            border: 12px solid #333; position: relative; overflow: hidden; 
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            margin: auto;
            will-change: transform; transform: translateZ(0);
        }

        /* --- 壁紙システムレイヤー --- */
        #wallpaper-container {
            position: absolute; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
        }
        #wallpaper-container iframe {
            width: 100%; height: 100%; border: none; pointer-events: none;
        }

        /* --- ステータスバー & クイックパネル --- */
        #status-bar { 
            position: absolute; top: 0; width: 100%; height: 44px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 35px; box-sizing: border-box; font-size: 13px; font-weight: 600; 
            z-index: 12000; cursor: pointer;
        }

/* 再生中インジケーター (Dynamic Island) */
#playing-indicator {
    position: absolute; 
    top: 9px; 
    left: 30%; 
    /* 初期状態：中央に配置しつつ、少し小さくしておく */
    transform: translateX(-50%) scale(0.8); 
    height: 24px; 
    min-width: 50px; /* ご希望のサイズ */
    background: #000; 
    border-radius: 14px;
    
    /* display: noneは使わず、常にflexにしておく（透明度で隠す） */
    display: flex; 
    align-items: center; 
    justify-content: center;
    padding: 0 12px; 
    gap: 8px; 
    z-index: 12500;
    border: 0.5px solid rgba(255,255,255,0.2);
    color: #fff; 
    font-size: 10px;

    /* 透明度とクリック不可の設定 */
    opacity: 0;
    pointer-events: none; 
    
    /* これが「開く時」も「閉じる時」も効きます */
    transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
}

/* 表示時の状態：ここをクラスの付け外しで制御する */
#playing-indicator.active {
    opacity: 1;
    transform: translateX(-50%) scale(1);
    pointer-events: auto;
}

/* 波のアニメーションなどはそのままでOK */
.playing-wave { display: flex; align-items: flex-end; gap: 2px; height: 10px; }
.playing-wave span { width: 2px; background: var(--accent); animation: wave 0.8s infinite ease-in-out; }
.playing-wave span:nth-child(2) { animation-delay: 0.2s; }
.playing-wave span:nth-child(3) { animation-delay: 0.4s; }
@keyframes wave { 0%, 100% { height: 3px; } 50% { height: 10px; } }


        #quick-panel {
    position: absolute; top: 0; left: 0; width: 100%;
    max-height: 70vh;                         /* ← 追加（画面の70%まで） */
    background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(25px);
    z-index: 11500; border-radius: 0 0 40px 40px; border-bottom: 0.5px solid rgba(255,255,255,0.2);
    transform: translateY(-100%); transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
    display: flex; flex-direction: column; padding: 50px 20px 20px 30px; box-sizing: border-box;
    color: #fff;
    overflow-y: auto;                         /* ← 追加（縦スクロール） */
    overscroll-behavior: contain;             /* ← 追加 */
}
#quick-panel::-webkit-scrollbar {
    width: 3px;
}
#quick-panel::-webkit-scrollbar-track {
    background: transparent;
}
#quick-panel::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
}
        #quick-panel.active { transform: translateY(0); }
.quick-grid {
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-start;   /* ← center → flex-start に変更 */
    gap: 18px;
    padding: 1px 0;
    margin-top: 10px;
}
        .quick-item:active {
    background: rgba(255,255,255,0.25);
    transform: scale(0.92);
}
.quick-item {
    width: 64px;
    height: 64px;
    background: rgba(255,255,255,0.12);
    border-radius: 50%;                       /* 完全な丸 */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    font-size: 8px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.08);
}
        .quick-icon {
    font-size: 26px;                          /* アイコンを少し大きく */
    line-height: 1;
}
.quick-item span {
    font-size: 9px;
    opacity: 0.8;
    line-height: 1.2;
    max-width: 56px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}


        /* ロック画面 */
        #lock-screen { 
            position: absolute; inset: 0; z-index: 10000; 
            display: flex; flex-direction: column; align-items: center; justify-content: space-between; 
            padding: 100px 20px 80px; box-sizing: border-box; background: #000;
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.4s;
        }
        #lock-bg-blur { 
            position: absolute; inset: 0; background-size: cover; background-position: center; 
            filter: blur(20px); transform: scale(1.1); z-index: -1; opacity: 0.6;
        }
        #lock-clock { font-size: 80px; font-weight: 200; text-shadow: 0 0 20px rgba(0,0,0,0.3); }
        
        #slider-container { 
            width: 280px; height: 60px; background: rgba(255,255,255,0.1); 
            border-radius: 30px; position: relative; backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.2); overflow: hidden;
            touch-action: none;
        }
        #slider-track { 
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; 
            font-size: 14px; color: rgba(255,255,255,0.6); letter-spacing: 1px; pointer-events: none;
        }
        #slider-handle { 
            width: 50px; height: 50px; background: #fff; border-radius: 50%; 
            position: absolute; top: 5px; left: 5px; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; color: #000; font-weight: bold;
            box-shadow: 0 0 15px rgba(0,0,0,0.2); will-change: transform;
        }
        #lock-screen.unlocked { transform: scale(1.2) translateY(-20px); opacity: 0; pointer-events: none; }

        /* デスクトップ & アイコン移動システム */
        #desktop { 
            height: 100%; width: 100%; 
            position: relative; 
            padding: 60px 15px 120px; box-sizing: border-box; 
            background-size: cover; background-position: center; transition: opacity 0.3s; opacity: 0;
            overflow: hidden;
            z-index: 5; /* 壁紙より前面 */
        }
        #desktop.active { opacity: 1; }
        
        .app-icon { 
            position: absolute; 
            display: flex; flex-direction: column; align-items: center; cursor: pointer; 
            width: 80px; height: 95px; 
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s;
            touch-action: none;
            user-select: none;
            -webkit-user-drag: none;
        }
        .app-icon.moving { 
            opacity: 0.8; 
            transform: scale(1.1); 
            z-index: 10000; 
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.4));
            transition: none;
        }
        .edit-mode .app-icon:not(.moving) {
            animation: shake 0.3s infinite ease-in-out;
        }
        @keyframes shake {
            0 { transform: rotate(-1deg); }
            50% { transform: rotate(1.deg); }
            100% { transform: rotate(-1deg); }
        }

        .icon-box { width: 60px; height: 60px; background: var(--glass); border-radius: 16px; backdrop-filter: blur(15px); border: 0.5px solid rgba(255,255,255,0.2); display: flex; justify-content: center; align-items: center; overflow: hidden; font-size: 30px; pointer-events: none; }
        .icon-box img { width: 100%; height: 100%; object-fit: cover; }
        .icon-label { margin-top: 6px; font-size: 10px; font-weight: 500; text-shadow: 0 1px 4px rgba(0,0,0,0.8); text-align: center; width: 100%; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; pointer-events: none; }

        #window-layer { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }
        #window-layer > * { pointer-events: auto; }

        .window { 
            position: absolute; inset: 0; background: var(--win-bg); color: var(--text-dark); 
            transform: translateY(100%) scale(0.1); transition: 0.45s cubic-bezier(0.16, 1, 0.3, 1); 
            z-index: 1000; display: flex; flex-direction: column; 
            opacity: 0; pointer-events: none;
        }
        .window.active { transform: translateY(0) scale(1) !important; opacity: 1; pointer-events: auto; left: 0 !important; top: 0 !important; width: 100% !important; height: 100% !important; border-radius: 0; }
        .window.minimized { transform: scale(0.1) !important; opacity: 0; pointer-events: none; } 

        .win-header { 
    height: 70px; 
    padding: 0px 23px 12px 23px;   /* 下だけ20px */
    display: flex; 
    align-items: flex-end;       /* 子要素を下端に寄せる */
    justify-content: space-between; 
    border-bottom: 0.5px solid rgba(128,128,128,0.3); 
    font-weight: bold; 
    background: var(--win-bg); 
}
        .win-body { flex: 1; overflow-y: auto; background: var(--win-bg); display: flex; flex-direction: column; -webkit-overflow-scrolling: touch; }
        iframe { width: 100%; height: 100%; border: none; flex: 1; }

        #dock {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 320px; height: 75px; background: rgba(255,255,255,0.2);
            backdrop-filter: blur(25px); border-radius: 28px; border: 0.5px solid rgba(255,255,255,0.2);
            display: none; justify-content: space-around; align-items: center; padding: 0 10px;
            z-index: 9000;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s;
        }
        #dock.hidden {
            transform: translate(-50%, 150px);
            opacity: 0;
            pointer-events: none;
        }
        .dock-item { width: 52px; height: 52px; background: rgba(255,255,255,0.1); border-radius: 14px; display: flex; justify-content: center; align-items: center; font-size: 26px; cursor: pointer; overflow: hidden; transition: transform 0.2s; }
        .dock-item:active { transform: scale(0.9); }
        .dock-item img { width: 100%; height: 100%; object-fit: cover; }

        #edit-trigger {
            position: absolute; bottom: 105px; right: 25px;
            padding: 5px 12px; border-radius: 15px; background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px); border: 0.5px solid rgba(255,255,255,0.3);
            color: #fff; font-size: 11px; font-weight: bold; z-index: 9500;
            display: none; cursor: pointer;
        }

        #home-bar-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 30px; z-index: 12000;
            display: flex; justify-content: center; align-items: center; pointer-events: auto !important;
        }
        #home-bar { width: 130px; height: 5px; background: #fff; border-radius: 10px; cursor: pointer; will-change: transform; transition: transform 0.1s linear, background 0.3s; pointer-events: auto !important; }

        #switcher {
            position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(20px);
            z-index: 10500; display: none; flex-direction: row; align-items: center; 
            overflow-x: auto; flex-wrap: nowrap; gap: 20px; padding: 80px 50px 0;
            scrollbar-width: none;
            opacity: 0; transform: scale(1.1); transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #switcher.active { display: flex; opacity: 1; transform: scale(1); }
        .switcher-card {
            min-width: 240px; height: 480px; background: var(--win-bg); border-radius: 24px;
            position: relative; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            display: flex; flex-direction: column; flex-shrink: 0; 
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
            touch-action: none;
        }
        .switcher-card.closing { transform: translateY(-100%) scale(0.8); opacity: 0; }
        .switcher-card-header { padding: 12px; background: rgba(128,128,128,0.1); color: var(--text-dark); font-size: 13px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .switcher-card-body { flex: 1; background: #ccc; pointer-events: none; overflow: hidden; position: relative; background-size: cover; background-position: center; }

        .list-item { padding: 12px; background: rgba(128,128,128,0.1); border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(128,128,128,0.2); font-size: 13px; }
        .btn-mini { background: #333; color: #fff; border: none; padding: 6px 10px; border-radius: 6px; font-size: 10px; cursor: pointer; }
        .btn-red { background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-save { background: #4CAF50; color: #fff; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .editor-area { width: 100%; height: 70%; border: 1px solid #ddd; padding: 10px; font-family: monospace; font-size: 12px; box-sizing: border-box; background: transparent; color: inherit; }

        

        .notif-item {
            padding: 12px; border-bottom: 0.5px solid rgba(128,128,128,0.2);
            display: flex; justify-content: space-between; align-items: center;
        }
        .notif-content { flex: 1; display: flex; flex-direction: column; gap: 2px; }
        .notif-title { font-weight: bold; font-size: 14px; }
        .notif-msg { font-size: 12px; opacity: 0.8; }
        .notif-time { font-size: 10px; opacity: 0.5; }

        /* 再起動レイヤー */
        #reboot-overlay {
            position: absolute; inset: 0; background: #000; z-index: 30000;
            display: none; justify-content: center; align-items: center;
        }
        #reboot-display { width: 100%; height: 100%; object-fit: contain; }

        /* --- リカバリーモード UI --- */
        #recovery-screen {
            position: absolute; inset: 0; background: #000; z-index: 40000;
            display: none; flex-direction: column; padding: 40px 20px;
            font-family: 'Courier New', monospace; color: #fff; overflow: hidden;
        }
        #recovery-header { border-bottom: 2px solid #fff; padding-bottom: 10px; margin-bottom: 20px; }
        .recovery-item { padding: 8px 10px; font-size: 14px; margin: 2px 0; }
        .recovery-item.selected { background: #fff; color: #000; font-weight: bold; }
        #recovery-controls {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 20px; z-index: 40001;
        }
        .recovery-btn {
            width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.2);
            border: 2px solid #fff; color: #fff; display: flex; justify-content: center; align-items: center;
            font-size: 20px; font-weight: bold; cursor: pointer;
        }
        .recovery-btn:active { background: #fff; color: #000; }
        #recovery-log { margin-top: auto; font-size: 10px; color: #0f0; opacity: 0.7; height: 100px; overflow: hidden; }

        /* --- ブルースクリーン (BSoD) --- */
        #bsod-screen {
            position: absolute; inset: 0; background: var(--bsod-bg); z-index: 50000;
            display: none; flex-direction: column; padding: 40px; box-sizing: border-box;
            color: #fff; font-family: -apple-system, sans-serif;
        }
        #bsod-face { font-size: 60px; margin-bottom: 20px; }
        #bsod-title { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        #bsod-info { font-size: 14px; line-height: 2.0; }

/* 初期状態ではホームバーを非表示 */
#home-bar-container {
    display: none;
}

/* デスクトップがアクティブ（ロック解除後）になったら表示 */
#desktop.active ~ #home-bar-container {
    display: flex;
}

/* ステータスバーの文字色をテーマ優先に */
#status-bar,
#status-bar span,
#status-bar div {
    color: inherit !important;
}

.system-popup {
    position: absolute;
    top: 50px;
    left: 10px;
    right: 10px;
    background: rgba(255, 255, 255, 0.95);
    color: #000;
    padding: 15px;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    z-index: 13000;
    display: flex;                     /* ← 追加 */
    flex-direction: column;            /* ← 追加 */
    gap: 5px;
    word-break: break-all;
    max-height: 200px;
    overflow: hidden;

    /* 初期状態：上に隠れてフェードアウト */
    transform: translateY(-100%) scale(0.95);
    opacity: 0;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 0.3s ease;
}

.system-popup.active {
    transform: translateY(0) scale(1);
    opacity: 1;
}

.system-popup.closing {
    opacity: 0 !important;
    transform: translateY(-20px) scale(0.95) !important;
}

/* 開く時のアニメーション（既存のものを流用） */
@keyframes popupAnim {
    from { opacity: 0; transform: translateY(-20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ===== スイッチャー改良 ===== */
#switcher {
    /* スクロールバーを表示（デフォルトはauto） */
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.3) transparent;
    padding: 60px 0 0 0;  /* ボタンエリアのスペース */
}

/* WebKit系ブラウザ用スクロールバー */
#switcher::-webkit-scrollbar {
    width: 4px;
    height: 4px;
}
#switcher::-webkit-scrollbar-track {
    background: transparent;
}
#switcher::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.4);
    border-radius: 4px;
}

/* カードの出現・退場アニメーション（transitionで制御） */
.switcher-card {
    opacity: 0;
    transform: scale(0.9) translateY(20px);
    transition: opacity 0.35s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.35s cubic-bezier(0.16, 1, 0.3, 1),
                box-shadow 0.3s ease;
    will-change: transform, opacity;
}
.switcher-card.visible {
    opacity: 1;
    transform: scale(1) translateY(0);
}
.switcher-card.closing {
    opacity: 0;
    transform: scale(0.8) translateY(-30px);
}

/* カードホバー（タッチデバイスでは効果なし） */
@media (hover: hover) {
    .switcher-card:hover {
        transform: scale(1.02);
        box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
}

/* スイッチャー下部のボタンエリア */
#switcher-actions {
    position: absolute;
    bottom: 30px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 0 20px;
    z-index: 10;
}
.switcher-action-btn {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border: 0.5px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
.switcher-action-btn:active {
    transform: scale(0.94);
    background: rgba(255,255,255,0.25);
}
.switcher-action-btn .icon {
    font-size: 16px;
}

/* ===== 分割表示 ===== */
#split-view {
    position: absolute;
    inset: 0;
    z-index: 2000;
    display: none;
    flex-direction: column;
    background: var(--win-bg);
    color: var(--text-dark);
}
#split-view.active {
    display: flex;
}

.split-pane {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--win-bg);
}
.split-pane .window {
    position: absolute;
    inset: 0;
    transform: none !important;
    opacity: 1 !important;
    pointer-events: auto !important;
    border-radius: 0 !important;
    transition: none !important;
}
.split-pane .window .win-header {
    padding: 0 16px 8px 16px;
    height: 60px;
}
.split-pane .window .win-body {
    height: calc(100% - 60px);
}

/* 分割線 */
.split-divider {
    height: 6px;
    background: rgba(128,128,128,0.3);
    cursor: ns-resize;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    transition: background 0.2s;
}
.split-divider:hover {
    background: rgba(128,128,128,0.6);
}
.split-divider::after {
    content: '⋯';

/* 分割線クリックメニュー */
.split-menu {
    position: absolute;

.split-menu button {
    background: transparent;
    border: none;
    color: #fff;
    padding: 8px 20px;
    text-align: left;

    border-radius: 10px;

}
.split-menu button:hover {
    background: rgba(255,255,255,0.1);
}
.split-menu button.danger {
    color: #ff6b6b;
}
.split-menu button.danger:hover {
    background: rgba(255,60,60,0.2);
}

/* ===== ポップアップウィンドウ ===== */
.popup-window {
    position: absolute;
    z-index: 3000; /* window-layer (1000) よりも上 */
    background: var(--win-bg);
    color: var(--text-dark);
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    display: none;
    flex-direction: column;
    min-width: 200px;
    min-height: 150px;
    overflow: hidden;
    resize: none;
    border: 1px solid rgba(128,128,128,0.2);
    transition: box-shadow 0.2s;
}
.popup-window.active {
    display: flex;
}
.popup-window .popup-header {
    height: 44px;
    padding: 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(128,128,128,0.08);
    border-bottom: 0.5px solid rgba(128,128,128,0.2);
    cursor: move;
    flex-shrink: 0;
    user-select: none;
    -webkit-user-select: none;
}
.popup-window .popup-header .popup-title {
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
}
.popup-window .popup-header .popup-title img {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    object-fit: cover;
}
.popup-window .popup-header .popup-controls {
    display: flex;
    gap: 12px;
}
.popup-window .popup-header .popup-controls span {
    cursor: pointer;
    font-size: 16px;
    opacity: 0.6;
    transition: opacity 0.2s;
    padding: 4px;
    line-height: 1;
}
.popup-window .popup-header .popup-controls span:hover {
    opacity: 1;
}
.popup-window .popup-header .popup-controls .popup-close {
    color: var(--accent);
}
.popup-window .popup-body {
    flex: 1;
    overflow: hidden;
    background: var(--win-bg);
}
.popup-window .popup-body iframe {
    width: 100%;
    height: 100%;
    border: none;
}
.popup-window .popup-body .win-body {
    height: 100%;
}

/* リサイズハンドル（右下） */
.popup-resize-handle {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 20px;
    height: 20px;
    cursor: nwse-resize;
    z-index: 10;
}
.popup-resize-handle::after {
    content: '';
    position: absolute;
    bottom: 4px;
    right: 4px;
    width: 10px;
    height: 10px;
    border-right: 2px solid rgba(128,128,128,0.4);
    border-bottom: 2px solid rgba(128,128,128,0.4);
}

#setup-wizard {

}
.setup-btn {

}
.setup-btn:active {

.passcode-btn:active {

}
#setup-preview {

}

#device.fullscreen-mode {
    width: 100vw !important;

    border: none !important;
    border-radius: 0 !important;
    margin: 0 !important;
}

<script>
class PaaOS_Kernel {
    constructor() {
        this.root = null; 
        this.apps = {};
        this.dbName = "PaaOS_Final";
        this.config = { 
    disabled: [], 
    hiddenApps: [],   // ← 追加（ホーム画面に表示しないアプリID）
    theme: 'light',
    userName: '',
    passcode: '',
    dockApps: ['sys.files', 'sys.youtube', 'sys.settings'],
    appPositions: {} ,
    customThemeEnabled: false,
    customThemeFile: null,  // ファイル名（例: mytheme.css）
    fontFamily: 'default',   // 'default' または 'noto'
        emojiFamily: 'default'   // 'default' または 'noto'
};

// 例: bootメソッド内の最後、またはconstructor内

this.quickItems = [
        { id: 'theme', icon: '☀️', label: 'テーマ', action: 'toggleTheme' },
        { id: 'reload', icon: '🔄', label: '再読み込み', action: 'reload' },
        { id: 'settings', icon: '⚙️', label: '設定', action: 'launch', arg: 'sys.settings' },
        { id: 'notifications', icon: '🔔', label: '通知', action: 'launch', arg: 'sys.notifications' },
        { id: 'appdrawer', icon: '📱', label: 'アプリ一覧', action: 'showAppDrawer' },
        { id: 'screenshot', icon: '📸', label: 'スクリーンショット', action: 'takeSystemScreenshot' },
        { id: 'fullscreen', icon: '⛶', label: 'フルスクリーン', action: 'toggleFullscreen' },
    ];
// コンストラクタ内の this.config の後など、適切な場所に追加
this._updateCache = {
    available: false,
    version: null,
    filename: null,
    description: null,
    lastCheck: 0
};
this._updateCheckInProgress = false;

this._timers = {
        panel: null,
        switcher: null,
        launch: null,
        goHome: null,
        killApp: null,
        popup: null,
        dialog: null,
        reboot: null
    };

this._isBootInProgress = false;

this._isDragging = false;   // ← 追加

this.translations = new Map();
this.currentLanguage = 'ja';

// ポップアップ状態
this.popupState = {
    active: false,
    appId: null,
    window: null,
    x: 60,
    y: 100,
    width: 320,
    height: 400,
};

// 分割表示状態
this.splitState = {
    active: false,
    topId: null,
    bottomId: null,
    topWin: null,
    bottomWin: null,
    ratio: 50, // 上部の割合（%）
    container: null,
    divider: null,
};

       this._appDrawerVisible = false;
        this.activeAppId = null;
        this.runningApps = []; 
        this.panelActive = false;
        this.isSwitcherActive = false;
        this.folders = ['apps', 'pictures', 'videos', 'media', 'music', 'documents', 'system'];
        this.fmPath = [];

        this.movingAppId = null;
        this.isEditMode = false;
        this.gridSize = { x: 85, y: 100 };
        this.isRooted = false; 
        this.msgCounter = {};

this.fmViewMode = 'home';
this.fmCategory = '';
this._returnToCategory = false;
this.fmTrashDir = null;
this.fmClipboard = null;
this.fmSelectMode = false;
this.fmSelected = new Set();
this._previewReturnMode = null;      // 'browser', 'category', 'search'
this._previewSearchKeyword = '';
this._lastSearchKeyword = '';
        
        // 再生監視システム
        this.mediaAppId = null;
        
        // リカバリー関連
        this.isBooting = false;
        this.recoveryIndex = 0;
        this.recoveryConfirmation = false;
        this.recoveryMenu = [
            { label: "続行(再起動)", action: "reboot_normal" },
            { label: "ユーザー設定の初期化", action: "wipe_config" },
            { label: "更新ファイルのインストール", action: "install_update" },
            { label: "システム再読み込み", action: "reload" }
        ];

        this.lastTouchPos = { x: 187, y: 406 }; 

        this.updateTime();
        setInterval(() => this.updateTime(), 1000);
        this.initLockScreen();
        this.initHomeBar();
        this.initMoveSystem(); 
        this.initMediaWatcher();

}
    // 再生状態を監視するシステム
    initMediaWatcher() {
    setInterval(() => {
        const indicators = document.getElementById('playing-indicator');
        let isAnyMediaPlaying = false;
        let currentPlayingId = null;

        // 1. システム内部アプリのメディアチェック
        const videos = document.querySelectorAll('video');
        const audios = document.querySelectorAll('audio');
        [...videos, ...audios].forEach(el => {
            if (!el.paused && !el.ended && el.readyState > 2) {  // ← !el.paused（pausedがfalseが再生中）
                isAnyMediaPlaying = true;
                let parent = el.closest('.window');
                if (parent) currentPlayingId = parent.id.replace('win-', '');
            }
        });

        // 2. iframe内のメディアチェック
        const iframes = document.querySelectorAll('iframe');  // ← iframes で宣言
        iframes.forEach(frame => {  // ← iframes を使う
            try {
                const frameDocs = frame.contentDocument || frame.contentWindow.document;
                const fVideos = frameDocs.querySelectorAll('video');
                const fAudios = frameDocs.querySelectorAll('audio');
                [...fVideos, ...fAudios].forEach(el => {
                    if (!el.paused && !el.ended && el.readyState > 2) {
                        isAnyMediaPlaying = true;
                        let parent = frame.closest('.window');
                        if (parent) currentPlayingId = parent.id.replace('win-', '');
                    }
                });
            } catch(e) {
                // クロスドメインの場合は無視
                if (frame.id?.includes('sys.youtube') || frame.src?.includes('youtube.com')) {
                    isAnyMediaPlaying = true;
                    currentPlayingId = 'sys.youtube';
                }
            }
        });

        if (isAnyMediaPlaying && currentPlayingId) {
            this.mediaAppId = currentPlayingId;
            indicators.classList.add('active');
            document.getElementById('playing-label').innerText = this.apps[this.mediaAppId]?.name || "再生中";
        } else {
            indicators.classList.remove('active');
        }
    }, 1000);
}

    launchPlaybackApp(e) {
        e.stopPropagation();
        if (this.mediaAppId) {
            this.launch(this.mediaAppId);
        }
    }

    async preBoot() {
        const db = await this.getDB();
        let handle = await new Promise(r => db.transaction("state").objectStore("state").get("root").onsuccess = (e) => r(e.target.result));
        if (handle) {
            this.root = handle;
            await this.loadConfig();
            await this.scanApps();
            this.applyTheme();
        }
    }

    updateTime() {
        const d = new Date();
        const time = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
        document.getElementById('clock').innerText = time;
        document.getElementById('lock-clock').innerText = time;
    }

    toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
            this.showOSPopup('フルスクリーン', '切り替えに失敗: ' + err.message);
            // エラー時は強制的にクラスを外す
            document.getElementById('device').classList.remove('fullscreen-mode');
            this.updateQuickPanel();
        });
    } else {
        document.exitFullscreen().catch(err => {
            this.showOSPopup('フルスクリーン', '解除に失敗: ' + err.message);
        });
    }
    // ★ 即座にクラスを同期（イベントが発火しなくても確実に）
    setTimeout(() => {
        const el = document.getElementById('device');
        if (document.fullscreenElement) {
            el.classList.add('fullscreen-mode');
        } else {
            el.classList.remove('fullscreen-mode');
        }
        this.updateQuickPanel();
    }, 100);
}

renderQuickPanel() {
    const container = document.getElementById('quick-grid-container');
    if (!container) return;
    container.innerHTML = '';
    this.quickItems.forEach(item => {
        const div = document.createElement('div');
        div.className = 'quick-item';
        div.innerHTML = `<div class="quick-icon">${item.icon}</div><span>${item.label}</span>`;
        div.onclick = (e) => {
            e.stopPropagation();
            // アクション実行
            switch (item.action) {
                case 'toggleTheme': this.toggleTheme(); break;
                case 'reload': location.reload(); break;
                case 'launch': this.launch(item.arg); break;
                case 'showAppDrawer': this.showAppDrawer(); break;
                case 'takeSystemScreenshot': this.takeSystemScreenshot(); break;
case 'toggleFullscreen': this.toggleFullscreen(); break;  // ★ 追加{
                // 必要に応じて他のアクションを追加
                default: break;
            }
        };
        container.appendChild(div);
    });
}

    togglePanel() {
    if(this.movingAppId) return;
    this.panelActive = !this.panelActive;
    const panel = document.getElementById('quick-panel');
    if (this.panelActive) {
        panel.classList.add('active');
        this.renderQuickPanel();   // ← 追加（表示時に描画）
        this.updateQuickPanel();
    } else {
        panel.classList.remove('active');
    }
}

startPopupApp() {
    // スイッチャーを閉じる
    this.closeSwitcher();
    // アプリ選択ダイアログを表示
    this.showPopupAppPicker();
}

showPopupAppPicker() {
    const allApps = Object.keys(this.apps).filter(id => !this.config.hiddenApps.includes(id));
    if (allApps.length === 0) {
        this.showOSPopup('ポップアップ', 'アプリがありません');
        return;
    }

    // 選択用のシンプルなダイアログ（showDialog を流用）
    const options = {
        title: 'ポップアップで開くアプリを選択',
        html: `
            <div style="max-height:300px; overflow-y:auto; text-align:left;">
                ${allApps.map(id => `
                    <div style="display:flex; align-items:center; gap:10px; padding:8px; border-bottom:1px solid rgba(128,128,128,0.1); cursor:pointer;" onclick="kernel.launchPopupApp('${id}')">
                        <span style="font-size:20px;">${this.apps[id].icon}</span>
                        <span style="flex:1;">${this.apps[id].name}</span>
                    </div>
                `).join('')}
            </div>
        `,
        buttons: [
            { label: 'キャンセル', value: 'cancel' }
        ],
        style: { width: '300px' }
    };
    this.showDialog('ポップアップ', options.html, options.buttons, options);
}

launchPopupApp(appId) {
    // 既存のポップアップがあれば閉じる
    this.closePopupApp();

    const app = this.apps[appId];
    if (!app) {
        this.showOSPopup('エラー', 'アプリが見つかりません');
        return;
    }

    // ダイアログを閉じる（最前面のモーダルを削除）
    const overlay = document.querySelector('.modal-dialog-overlay');
    if (overlay) overlay.remove();

    // ポップアップウィンドウを作成
    const popup = this._createPopupWindow(appId);

    // 状態を保存
    this.popupState.active = true;
    this.popupState.appId = appId;
    this.popupState.window = popup;

    // runningApps に追加（launch と同じ扱い）
    if (!this.runningApps.includes(appId)) {
        this.runningApps.push(appId);
    }

    // アクティブアプリとして設定（ただし、ポップアップは独立）
    this.activeAppId = appId;

    // ドック・編集ボタンを隠す（ポップアップ中は非表示）
    document.getElementById('dock').classList.add('hidden');
    document.getElementById('edit-trigger').style.display = 'none';

    // ポップアップを表示
    popup.classList.add('active');

    // アプリのレンダリング
    this._renderPopupContent(appId, popup);
}

_createPopupWindow(appId) {
    const app = this.apps[appId];
    const state = this.popupState;

    // 既存のポップアップがあれば削除
    const old = document.getElementById('popup-window');
    if (old) old.remove();

    const popup = document.createElement('div');
    popup.id = 'popup-window';
    popup.className = 'popup-window';
    popup.style.left = state.x + 'px';
    popup.style.top = state.y + 'px';
    popup.style.width = state.width + 'px';
    popup.style.height = state.height + 'px';

    const iconHtml = app.icon.length > 2 ? `<img src="${app.icon}">` : app.icon;

    popup.innerHTML = `
        <div class="popup-header" id="popup-header">
            <div class="popup-title">
                ${iconHtml}
                <span>${app.name}</span>
            </div>
            <div class="popup-controls">
                <span onclick="kernel.minimizePopupApp()" title="最小化">─</span>
                <span class="popup-close" onclick="kernel.closePopupApp()" title="閉じる">✕</span>
            </div>
        </div>
        <div class="popup-body" id="popup-body-${appId}"></div>
        <div class="popup-resize-handle" id="popup-resize-handle"></div>
    `;

    document.getElementById('window-layer').appendChild(popup);

    // ドラッグ移動（ヘッダー）
    this._initPopupDrag(popup);

    // リサイズ
    this._initPopupResize(popup);

    return popup;
}


_renderPopupContent(appId, popup) {
    const app = this.apps[appId];
    const body = popup.querySelector('.popup-body');

    if (app.type === 'sys') {
        // システムアプリは専用のレンダリング
        // 既存の renderSysApp を流用するため、一時的に body を置き換える
        const tempBody = document.createElement('div');
        tempBody.id = 'body-' + appId;
        tempBody.style.height = '100%';
        body.appendChild(tempBody);
        // renderSysApp は id から body を取得するので、id を合わせる
        // ただし、renderSysApp は document.getElementById('body-${id}') を使うため、ここで id を設定
        tempBody.id = 'body-' + appId;
        this.renderSysApp(appId);
    } else {
        // 外部アプリは iframe
        const frame = document.createElement('iframe');
        frame.id = 'iframe-' + appId;
        frame.src = URL.createObjectURL(new Blob([app.content], { type: 'text/html' }));
        body.appendChild(frame);
    }
}

_initPopupDrag(popup) {
    const header = popup.querySelector('.popup-header');
    let isDragging = false;
    let offsetX = 0, offsetY = 0;

    const onStart = (e) => {
        const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
        isDragging = true;
        const rect = popup.getBoundingClientRect();
        offsetX = clientX - rect.left;
        offsetY = clientY - rect.top;
        popup.style.transition = 'none';
        e.preventDefault();
    };

    const onMove = (e) => {
        if (!isDragging) return;
        const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
        const parentRect = popup.parentElement.getBoundingClientRect();
        let newX = clientX - parentRect.left - offsetX;
        let newY = clientY - parentRect.top - offsetY;
        // 範囲制限（はみ出さないように）
        newX = Math.max(0, Math.min(parentRect.width - popup.offsetWidth, newX));
        newY = Math.max(0, Math.min(parentRect.height - popup.offsetHeight, newY));
        popup.style.left = newX + 'px';
        popup.style.top = newY + 'px';
        e.preventDefault();
    };

    const onEnd = () => {
        if (isDragging) {
            isDragging = false;
            // 位置を保存
            this.popupState.x = parseInt(popup.style.left);
            this.popupState.y = parseInt(popup.style.top);
        }
    };

    header.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    header.addEventListener('touchstart', onStart, { passive: false });
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('touchend', onEnd, { passive: true });
}

_initPopupResize(popup) {
    const handle = popup.querySelector('.popup-resize-handle');
    let isResizing = false;
    let startX = 0, startY = 0;
    let startWidth = 0, startHeight = 0;

    const onStart = (e) => {
        const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
        isResizing = true;
        startX = clientX;
        startY = clientY;
        startWidth = popup.offsetWidth;
        startHeight = popup.offsetHeight;
        popup.style.transition = 'none';
        e.preventDefault();
        e.stopPropagation();
    };

    const onMove = (e) => {
        if (!isResizing) return;
        const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
        const dx = clientX - startX;
        const dy = clientY - startY;
        let newWidth = Math.max(200, startWidth + dx);
        let newHeight = Math.max(150, startHeight + dy);
        popup.style.width = newWidth + 'px';
        popup.style.height = newHeight + 'px';
        e.preventDefault();
        e.stopPropagation();
    };

    const onEnd = () => {
        if (isResizing) {
            isResizing = false;
            this.popupState.width = parseInt(popup.style.width);
            this.popupState.height = parseInt(popup.style.height);
        }
    };

    handle.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    handle.addEventListener('touchstart', onStart, { passive: false });
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('touchend', onEnd, { passive: true });
}

// ========== フォント・絵文字適用（強化版） ==========
applyFontAndEmoji() {
    const fontMode = this.config.fontFamily || 'default';
    const emojiMode = this.config.emojiFamily || 'default';

    let baseFont = '-apple-system, "Segoe UI", Roboto, sans-serif';
    let baseEmoji = '"Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif';

    let finalFont = baseFont;
    if (fontMode === 'noto') {
        finalFont = "'Noto Sans JP', " + baseFont;
    }

    let finalEmoji = baseEmoji;
    if (emojiMode === 'noto') {
        finalEmoji = "'Noto Color Emoji', " + baseEmoji;
        // body全体のフォントに絵文字フォントを追加
        finalFont = finalFont + ", " + finalEmoji;
    }

    // CSS変数に設定
    document.documentElement.style.setProperty('--font-family', finalFont);
    document.documentElement.style.setProperty('--emoji-family', finalEmoji);
    document.body.style.fontFamily = finalFont;

    // ★ 絵文字を含む主要な要素に直接 font-family を強制適用
    const targets = document.querySelectorAll(
        '.icon-box, .icon-label, .dock-item, .quick-icon, ' +
        '.app-icon, .switcher-card-header, .list-item, ' +
        '.notif-item, .settings-list-icon, .settings-list-label, ' +
        '.win-header, .system-popup, .modal-dialog'
    );
    targets.forEach(el => {
        if (emojiMode === 'noto') {
            // 既存のスタイルを保持しつつ、Noto Color Emoji を先頭に追加
            const current = el.style.fontFamily || '';
            el.style.fontFamily = "'Noto Color Emoji', " + (current || finalFont);
        } else {
            // デフォルトに戻す（CSSの変数に従う）
            el.style.fontFamily = '';
        }
    });

    // ホーム画面とドックを再描画
    this.renderDesktop();
    this.renderDock();
    
}

minimizePopupApp() {
    if (!this.popupState.active) return;
    const popup = this.popupState.window;
    if (popup) {
        popup.classList.remove('active');
        // 最小化中はドックを表示
        document.getElementById('dock').classList.remove('hidden');
        document.getElementById('edit-trigger').style.display = 'block';
        // アクティブアプリをリセット
        this.activeAppId = null;
    }
}

closePopupApp() {
    if (!this.popupState.active) return;

    const appId = this.popupState.appId;
    const popup = this.popupState.window;

    // アプリを終了（runningApps から削除）
    if (appId && this.runningApps.includes(appId)) {
        this.runningApps = this.runningApps.filter(id => id !== appId);
        localStorage.removeItem(`paaos_thumb_${appId}`);
    }

    // ウィンドウ削除
    if (popup) {
        popup.remove();
    }

    // 状態リセット
    this.popupState.active = false;
    this.popupState.appId = null;
    this.popupState.window = null;
    if (this.activeAppId === appId) {
        this.activeAppId = null;
    }

    // ドックを表示
    document.getElementById('dock').classList.remove('hidden');
    document.getElementById('edit-trigger').style.display = 'block';
}


    
async takeSystemScreenshot() {
    this.togglePanel(); // パネルを閉じる

    setTimeout(async () => {
        try {
            const target = document.getElementById('device'); 

            // --- html2canvas ライブラリを動的に読み込む ---
            if (typeof html2canvas === 'undefined') {
                await new Promise((resolve) => {
                    const script = document.createElement('script');
                    script.src = 'https://html2canvas.hertzen.com/dist/html2canvas.min.js';
                    script.onload = resolve;
                    document.head.appendChild(script);
                });
            }

            // --- 強力なレンダリング設定 ---
            const canvas = await html2canvas(target, {
                useCORS: true,           // 画像などの外部リソースを許可
                allowTaint: true,        // 同一オリジンのiframe内描画を許可
                backgroundColor: null,    
                scale: 1,                
                logging: false,
                removeContainer: true,
                onclone: (clonedDoc) => {
                    // 1. 【スマホ枠と全体の角丸を除去】
                    const clonedDevice = clonedDoc.getElementById('device');
                    if (clonedDevice) {
                        // 本体の装飾（ベゼル画像、境界線など）を消す
                        clonedDevice.style.backgroundImage = 'none';
                        clonedDevice.style.border = 'none';
                        clonedDevice.style.boxShadow = 'none';
                        clonedDevice.style.padding = '0';
                        clonedDevice.style.margin = '0';
                        
                        // ★ここがポイント：一番外側の角丸だけを解除
                        clonedDevice.style.borderRadius = '0px';
                        clonedDevice.style.clipPath = 'none';
                        clonedDevice.style.overflow = 'visible';

                        // もし中身がさらに別の画面コンテナ（例: .screen）に入っているなら、その角丸も解除
                        // ※PaaOSの構造に合わせてクラス名等は調整してください
                        const screenArea = clonedDevice.querySelector('.screen') || clonedDevice.firstElementChild;
                        if (screenArea) {
                            screenArea.style.borderRadius = '0px';
                            screenArea.style.clipPath = 'none';
                        }
                    }

                    // 2. 【iframe貫通】
                    const iframes = clonedDoc.getElementsByTagName('iframe');
                    for (let f of iframes) {
                        f.style.visibility = 'visible';
                        f.style.display = 'block';
                        f.style.opacity = '1';
                        // iframe自体の枠線に角丸がある場合はここで消す
                        f.style.borderRadius = '0px';
                    }

                    // ※「allElements.forEach」を削除したことで、
                    // 中にあるボタンやアイコンの borderRadius は維持されます！
                }
            });

            const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
            
            // --- ファイル名を「年月日時分秒」に生成 ---
            const now = new Date();
            const Y = now.getFullYear();
            const M = String(now.getMonth() + 1).padStart(2, '0');
            const D = String(now.getDate()).padStart(2, '0');
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const fileName = `ss_${Y}${M}${D}_${h}${m}${s}.png`;

            // 保存処理
            const picDir = await this.root.getDirectoryHandle('pictures', { create: true });
            const ssDir = await picDir.getDirectoryHandle('screenshots', { create: true });
            
            const fileHandle = await ssDir.getFileHandle(fileName, { create: true });
            const writable = await fileHandle.createWritable();
            await writable.write(blob);
            await writable.close();

            this.showSystemPopup("System", `Screenshot saved: ${fileName}`);
            if (navigator.vibrate) navigator.vibrate([50, 10, 50]); 

        } catch (e) {
            console.error("Screenshot failed:", e);
            this.showSystemPopup("PaaOS", "スクリーンショットを保存できませんでした。");
        }
    }, 1000);
}

// バックアップ作成（キャンセル可能）
async createBackup() {
    if (this._backupCancelled) this._backupCancelled = false;
    try {
        const backupDir = await this.root.getDirectoryHandle('backup', { create: true });
        const now = new Date();
        const timestamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`;
        const backupName = `backup_${timestamp}.paabak`;
        
        const progress = this._showProgressOverlay("バックアップ", "ファイル一覧を取得中...", "0%", true);
        
        // ファイル一覧を取得（キャンセルチェック付き）
        let fileList = [];
        let collectCancelled = false;
        const collectFiles = async (dirHandle, currentPath = '') => {
            if (this._backupCancelled) { collectCancelled = true; return; }
            for await (const entry of dirHandle.values()) {
                if (this._backupCancelled) { collectCancelled = true; return; }
                if (entry.kind === 'file') {
                    const file = await entry.getFile();
                    fileList.push({ path: currentPath, name: entry.name, size: file.size, handle: entry });
                } else if (entry.kind === 'directory') {
                    if (entry.name === 'backup') continue;
                    await collectFiles(await dirHandle.getDirectoryHandle(entry.name), currentPath + entry.name + '/');
                }
            }
        };
        await collectFiles(this.root);
        if (collectCancelled || this._backupCancelled) {
            this._hideProgressOverlay(progress);
            this.showOSPopup("バックアップ", "ユーザーによりキャンセルされました");
            this._backupCancelled = false;
            return false;
        }
        
        if (fileList.length === 0) {
            this._hideProgressOverlay(progress);
            this.showOSPopup("バックアップ", "バックアップするファイルがありません");
            return false;
        }
        
        const zip = new JSZip();
        let processed = 0;
        let skipped = 0;
        const MAX_FILE_SIZE = 100 * 1024 * 1024;
        
        for (const item of fileList) {
            if (this._backupCancelled) break;
            processed++;
            const percent = Math.round((processed / fileList.length) * 100);
            this._updateProgressOverlay(progress, `バックアップ中... (${processed}/${fileList.length})`, `${percent}%`, item.path + item.name);
            
            if (item.size > MAX_FILE_SIZE) {
                skipped++;
                continue;
            }
            try {
                const file = await item.handle.getFile();
                const arrayBuffer = await file.arrayBuffer();
                zip.file(item.path + item.name, arrayBuffer);
            } catch(e) {
                skipped++;
            }
        }
        
        if (this._backupCancelled) {
            this._hideProgressOverlay(progress);
            this.showOSPopup("バックアップ", "ユーザーによりキャンセルされました");
            this._backupCancelled = false;
            return false;
        }
        
        this._updateProgressOverlay(progress, "ZIP圧縮中...", "100%", "");
        const blob = await zip.generateAsync({ type: 'blob' });
        
        if (this._backupCancelled) {
            this._hideProgressOverlay(progress);
            this.showOSPopup("バックアップ", "キャンセルされました");
            this._backupCancelled = false;
            return false;
        }
        
        this._updateProgressOverlay(progress, "保存中...", "100%", "");
        const fileHandle = await backupDir.getFileHandle(backupName, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(blob);
        await writable.close();
        
        this._hideProgressOverlay(progress);
        let msg = `バックアップ完了: ${backupName}\n保存先: root/backup/\nファイル数: ${processed - skipped}/${processed}`;
        if (skipped > 0) msg += `\n⚠️ ${skipped}個のファイルをスキップ（100MB超）`;
        this.showOSPopup("バックアップ", msg);
        this._backupCancelled = false;
        return true;
        
    } catch (err) {
        this._hideProgressOverlay(document.getElementById('backup-progress'));
        this.showOSPopup("エラー", "バックアップに失敗しました: " + err.message);
        this._backupCancelled = false;
        return false;
    }
}

// 復元（キャンセル対応）
async restoreFromBackup() {
    try {
        const [fileHandle] = await window.showOpenFilePicker({
            types: [{ description: 'PaaOS Backup', accept: { 'application/paaos-backup': ['.paabak'] } }]
        });
        const file = await fileHandle.getFile();
        const zip = await JSZip.loadAsync(file);
        
        const method = await this.showDialog(
            "バックアップ復元",
            "復元方法を選択してください",
            [
                { label: "上書き（現在の全データを置き換え）", value: "overwrite" },
                { label: "新規フォルダに展開", value: "newfolder" },
                { label: "キャンセル", value: "cancel" }
            ]
        );
        if (method === "cancel") return;
        this._backupCancelled = false;
        if (method === "overwrite") {
            await this._restoreOverwrite(zip);
        } else {
            await this._restoreNewFolder(zip);
        }
    } catch (err) {
        if (err.name !== 'AbortError') {
            console.error("復元エラー:", err);
            this.showOSPopup("エラー", "復元に失敗しました: " + err.message);
        }
    }
}

// 上書き復元（キャンセル可能）
async _restoreOverwrite(zip) {
    const confirm = await this.showDialog(
        "⚠️ 警告",
        "上書き復元を実行すると、現在の全データがバックアップの内容に置き換えられます。続行しますか？",
        [{ label: "続行", value: "ok" }, { label: "キャンセル", value: "cancel" }]
    );
    if (confirm !== "ok") return;
    
    const progress = this._showProgressOverlay("復元（上書き）", "準備中...", "0%", true);
    
    let tempDir;
    try {
        tempDir = await this.root.getDirectoryHandle('temp_restore', { create: true });
    } catch(e) {
        await this.root.removeEntry('temp_restore', { recursive: true });
        tempDir = await this.root.getDirectoryHandle('temp_restore', { create: true });
    }
    
    const extractOk = await this._extractZipToDirWithProgress(zip, tempDir, progress);
    if (!extractOk || this._backupCancelled) {
        await this.root.removeEntry('temp_restore', { recursive: true }).catch(()=>{});
        this._hideProgressOverlay(progress);
        this.showOSPopup("復元", "キャンセルされました");
        this._backupCancelled = false;
        return;
    }
    
    this._updateProgressOverlay(progress, "既存データを削除中...", "30%", "");
    for await (const entry of this.root.values()) {
        if (this._backupCancelled) break;
        if (entry.name === 'temp_restore' || entry.name === 'backup') continue;
        await this.root.removeEntry(entry.name, { recursive: true }).catch(e=>console.warn(e));
    }
    if (this._backupCancelled) {
        await this.root.removeEntry('temp_restore', { recursive: true }).catch(()=>{});
        this._hideProgressOverlay(progress);
        this.showOSPopup("復元", "キャンセルされました");
        this._backupCancelled = false;
        return;
    }
    
    let total = 0, copied = 0;
    for await (const entry of tempDir.values()) total++;
    for await (const entry of tempDir.values()) {
        if (this._backupCancelled) break;
        copied++;
        const percent = 60 + Math.round((copied / total) * 40);
        this._updateProgressOverlay(progress, "データを移動中...", `${percent}%`, entry.name);
        if (entry.kind === 'file') {
            const file = await entry.getFile();
            const newHandle = await this.root.getFileHandle(entry.name, { create: true });
            const writable = await newHandle.createWritable();
            await writable.write(await file.arrayBuffer());
            await writable.close();
        } else {
            await this._copyDir(entry, await this.root.getDirectoryHandle(entry.name, { create: true }));
        }
    }
    
    await this.root.removeEntry('temp_restore', { recursive: true });
    if (this._backupCancelled) {
        this._hideProgressOverlay(progress);
        this.showOSPopup("復元", "キャンセルされました");
        this._backupCancelled = false;
        return;
    }
    
    this._updateProgressOverlay(progress, "完了！", "100%", "");
    await new Promise(r => setTimeout(r, 500));
    this._hideProgressOverlay(progress);
    this.showOSPopup("復元", "上書き復元が完了しました。再起動をおすすめします。");
    this._backupCancelled = false;
}

// アップデートをチェック（キャッシュ付き）
async checkForUpdates(force = false) {
    const now = Date.now();
    // キャッシュ有効期間: 5分
    if (!force && this._updateCache.lastCheck && (now - this._updateCache.lastCheck < 300000)) {
        return this._updateCache;
    }

    if (this._updateCheckInProgress) {
        return this._updateCache;
    }
    this._updateCheckInProgress = true;

    try {
        const localVersion = await this.getLocalVersion();
        const url = `https://raw.githubusercontent.com/${this._storeRepo.owner}/${this._storeRepo.repo}/${this._storeRepo.branch}/UPINFO.json`;
        const response = await fetch(url);
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        const text = await response.text();
        const info = JSON.parse(text);

                // バージョン比較（semver風）
        // ★ 数値とドットだけを抽出する関数（例: "PF.2.4.06.R" → "2.4.06"）
        const extractNumeric = (str) => {
            const match = str.match(/\d+(\.\d+)*/);
            return match ? match[0].split('.').map(Number) : [];
        };

        const localParts = extractNumeric(localVersion);   // "2.4" → [2, 3]
        const remoteParts = extractNumeric(info.version);  // "PF.2.4.06.R" → [2, 3, 6]

        let isNewer = false;
        const maxLen = Math.max(localParts.length, remoteParts.length);
        for (let i = 0; i < maxLen; i++) {
            const lv = localParts[i] || 0;
            const rv = remoteParts[i] || 0;
            if (rv > lv) {
                isNewer = true;  // リモートが大きければ更新あり
                break;
            } else if (rv < lv) {
                break; // ローカルの方が大きければ更新なし
            }
        }

        // ファイル名を取得（UP_###.zip の ### 部分を表示名として使用）
        const filename = info.filename || '';
        const displayName = filename.replace(/^UP_/, '').replace(/\.zip$/, '');

        this._updateCache = {
            available: isNewer,
            version: info.version || '0.0.0',
            filename: filename,
            description: info.description || '',
            displayName: displayName,
            localVersion: localVersion,
            lastCheck: now,
            rawInfo: info
        };

        return this._updateCache;
    } catch(e) {
        console.warn('アップデートチェック失敗:', e);
        this._updateCache = {
            available: false,
            version: null,
            filename: null,
            description: null,
            lastCheck: now,
            error: e.message,
            localVersion: await this.getLocalVersion()
        };
        return this._updateCache;
    } finally {
        this._updateCheckInProgress = false;
    }
}

// アップデートをダウンロードしてインストール
async downloadAndInstallUpdate() {
    const updateInfo = await this.checkForUpdates(true);
    if (!updateInfo.available || !updateInfo.filename) {
        this.showOSPopup('アップデート', '利用可能なアップデートがありません。');
        return false;
    }

    // 確認ダイアログ
    const confirm = await this.showDialog(
        '📥 アップデート',
        `バージョン ${updateInfo.version} が利用可能です。\n` +
        `${updateInfo.description ? '詳細: ' + updateInfo.description + '\n' : ''}` +
        `\nダウンロードしてインストールしますか？`,
        [
            { label: 'インストール', value: 'ok' },
            { label: 'キャンセル', value: 'cancel' }
        ]
    );
    if (confirm !== 'ok') return false;

    // 進捗オーバーレイ表示
    const progress = this._showProgressOverlay(
        'アップデート',
        'ダウンロード中...',
        '0%',
        true  // キャンセルボタン付き
    );

    try {
        // ZIPファイルをダウンロード
        const zipUrl = `https://raw.githubusercontent.com/${this._storeRepo.owner}/${this._storeRepo.repo}/${this._storeRepo.branch}/${updateInfo.filename}`;
        this._updateProgressOverlay(progress, 'ダウンロード中...', '20%', updateInfo.filename);
        
        const response = await fetch(zipUrl);
        if (!response.ok) {
            throw new Error(`ダウンロード失敗: HTTP ${response.status}`);
        }
        const arrayBuffer = await response.arrayBuffer();
        if (this._backupCancelled) {
            this._hideProgressOverlay(progress);
            this.showOSPopup('アップデート', 'キャンセルされました。');
            return false;
        }

        this._updateProgressOverlay(progress, '展開中...', '50%', '');
        
        // JSZipで読み込み
        const zip = await JSZip.loadAsync(arrayBuffer);
        if (this._backupCancelled) {
            this._hideProgressOverlay(progress);
            this.showOSPopup('アップデート', 'キャンセルされました。');
            return false;
        }

        // os.html の確認
        const osFile = zip.file('os.html');
        if (!osFile) {
            throw new Error('ZIPファイルに os.html が見つかりません。');
        }

        // info.txt の処理
        const infoFile = zip.file('info.txt');
        if (infoFile) {
            try {
                const infoContent = await infoFile.async('text');
                const sysDir = await this.root.getDirectoryHandle('system', { create: true });
                const infoHandle = await sysDir.getFileHandle('info.txt', { create: true });
                const writable = await infoHandle.createWritable();
                await writable.write(infoContent);
                await writable.close();
                this.showOSPopup('アップデート', 'システム情報 (info.txt) を更新しました');
            } catch (infoErr) {
                console.warn('info.txtの保存に失敗:', infoErr);
            }
        }

        this._updateProgressOverlay(progress, 'インストール中...', '70%', '');

        // os.html を保存（ランダムな名前で）
        const osContent = await osFile.async('blob');
        const rand = Math.floor(Math.random() * 10000);
        const newFileName = `${rand}os.html`;
        const newFileHandle = await this.root.getFileHandle(newFileName, { create: true });
        const writable = await newFileHandle.createWritable();
        await writable.write(osContent);
        await writable.close();

        // バージョンを保存
        await this.saveLocalVersion(updateInfo.version);

        // 古い os.html を削除
        try {
            const sysDir = await this.root.getDirectoryHandle('system');
            await sysDir.removeEntry('os.html');
        } catch(e) {
            try { await this.root.removeEntry('os.html'); } catch(e2) {}
        }

        this._updateProgressOverlay(progress, '完了！', '100%', '');
        await new Promise(r => setTimeout(r, 500));
        this._hideProgressOverlay(progress);

        // 完了ダイアログ（再起動ではなく読み込みに変更）
await this.showDialog(
    '✅ アップデート完了',
    `アップデートが完了しました。\n` +
    `新しいバージョン: ${updateInfo.version}\n` +
    `\n新しいOSを読み込みます。`,
    [{ label: 'OK', value: 'ok' }]
);

// ★ 再起動ではなく、新しい os.html へリダイレクト
location.href = newFileName;
return true;

    } catch(e) {
        this._hideProgressOverlay(progress);
        console.error('アップデートエラー:', e);
        this.showOSPopup('❌ アップデートエラー', e.message || 'アップデートに失敗しました。');
        return false;
    }
}



// 新規フォルダ展開（キャンセル可能）
async _restoreNewFolder(zip) {
    let targetDir;
    try {
        targetDir = await window.showDirectoryPicker({ mode: 'readwrite' });
    } catch(e) {
        if (e.name !== 'AbortError') this.showOSPopup("エラー", "ディレクトリの選択に失敗しました");
        return;
    }
    const progress = this._showProgressOverlay("復元（新規フォルダ）", "展開中...", "0%", true);
    const ok = await this._extractZipToDirWithProgress(zip, targetDir, progress);
    this._hideProgressOverlay(progress);
    if (ok && !this._backupCancelled) {
        this.showOSPopup("復元", `バックアップを展開しました: ${targetDir.name}`);
    } else {
        this.showOSPopup("復元", "キャンセルされました");
    }
    this._backupCancelled = false;
}

// ZIP展開（キャンセル対応、進捗付き）
async _extractZipToDirWithProgress(zip, targetDir, progressOverlay) {
    const entries = Object.keys(zip.files);
    const total = entries.length;
    let processed = 0;
    for (const path of entries) {
        if (this._backupCancelled) return false;
        processed++;
        const percent = Math.round((processed / total) * 30);
        this._updateProgressOverlay(progressOverlay, "展開中...", `${percent}%`, path);
        
        const zipEntry = zip.files[path];
        if (zipEntry.dir) continue;
        const parts = path.split('/').filter(p => p);
        const fileName = parts.pop();
        let currentDir = targetDir;
        for (const dirName of parts) {
            if (this._backupCancelled) return false;
            currentDir = await currentDir.getDirectoryHandle(dirName, { create: true });
        }
        const fileBlob = await zipEntry.async('blob');
        const fileHandle = await currentDir.getFileHandle(fileName, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(fileBlob);
        await writable.close();
    }
    return true;
}

// 進捗オーバーレイ表示（キャンセルボタン付き）
_showProgressOverlay(title, status, percent, withCancel = false) {
    const existing = document.getElementById('backup-progress');
    if (existing) existing.remove();
    const overlay = document.createElement('div');
    overlay.id = 'backup-progress';
    overlay.style.cssText = `position:absolute; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); z-index:50000; display:flex; align-items:center; justify-content:center; color:white; font-family:monospace;`;
    overlay.innerHTML = `
        <div style="background:#1a1a1a; border-radius:24px; padding:24px; width:280px; text-align:center;">
            <h3 style="margin:0 0 16px 0;">${title}</h3>
            <div id="progress-status" style="margin-bottom:8px; font-size:14px;">${status}</div>
            <div style="width:100%; height:8px; background:#333; border-radius:4px; overflow:hidden; margin:12px 0;">
                <div id="progress-bar" style="width:0%; height:100%; background:var(--accent); transition:width 0.3s;"></div>
            </div>
            <div id="progress-percent" style="font-size:12px;">${percent}</div>
            <div id="progress-file" style="font-size:10px; opacity:0.7; margin-top:12px; word-break:break-all;"></div>
            ${withCancel ? '<button id="cancel-backup-btn" style="margin-top:16px; background:#ff3e3e; border:none; padding:8px 20px; border-radius:40px; color:white; font-weight:bold; cursor:pointer;">キャンセル</button>' : ''}
        </div>
    `;
    document.getElementById('device').appendChild(overlay);
    if (withCancel) {
        const cancelBtn = overlay.querySelector('#cancel-backup-btn');
        cancelBtn.onclick = () => {
            this._backupCancelled = true;
            this._hideProgressOverlay(overlay);
            this.showOSPopup("キャンセル", "処理をキャンセルしました");
        };
    }
    return overlay;
}

// 以下、既存の _updateProgressOverlay, _hideProgressOverlay, _copyDir は変更なし
_updateProgressOverlay(overlay, status, percent, currentFile = "") {
    if (!overlay) return;
    const statusEl = overlay.querySelector('#progress-status');
    const percentEl = overlay.querySelector('#progress-percent');
    const barEl = overlay.querySelector('#progress-bar');
    const fileEl = overlay.querySelector('#progress-file');
    if (statusEl) statusEl.textContent = status;
    if (percentEl) percentEl.textContent = percent;
    if (barEl) barEl.style.width = percent;
    if (fileEl) fileEl.textContent = currentFile;
}

_hideProgressOverlay(overlay) {
    if (overlay) overlay.remove();
}

async _copyDir(sourceDir, destDir) {
    for await (const entry of sourceDir.values()) {
        if (entry.kind === 'file') {
            const file = await entry.getFile();
            const newHandle = await destDir.getFileHandle(entry.name, { create: true });
            const writable = await newHandle.createWritable();
            await writable.write(await file.arrayBuffer());
            await writable.close();
        } else {
            const subDest = await destDir.getDirectoryHandle(entry.name, { create: true });
            const subSource = await sourceDir.getDirectoryHandle(entry.name);
            await this._copyDir(subSource, subDest);
        }
    }
}
    updateQuickPanel() {
    const isDark = this.config.theme === 'dark';
    // テーマアイテム更新
    const themeItem = this.quickItems.find(item => item.id === 'theme');
    if (themeItem) {
        themeItem.icon = isDark ? '🌙' : '☀️';
        themeItem.label = isDark ? 'ダーク' : 'ライト';
    }
    // ★ フルスクリーンアイテム更新（確実に document.fullscreenElement を使う）
    const fsItem = this.quickItems.find(item => item.id === 'fullscreen');
    if (fsItem) {
        const isFullscreen = !!document.fullscreenElement;
        fsItem.icon = isFullscreen ? '⤢' : '⛶';  // 任意の記号
        fsItem.label = isFullscreen ? '解除' : 'フルスクリーン';
    }
    // パネルが開いていれば再描画
    if (this.panelActive) {
