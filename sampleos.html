// ---------- 削除（ゴミ箱へ） ----------
async fmDelete(name, kind) {
    if (this.fmPath[0] === 'trash') {
        const confirm = await this.showDialog("完全削除", `${name} を完全に削除しますか？`, [
            { label: "削除", value: "ok" }, { label: "キャンセル", value: "cancel" }
        ]);
        if (confirm !== "ok") return;
        const dir = await this.getFmDir();
        try {
            await dir.removeEntry(name, { recursive: true });
            await this._removeTrashEntry(name);
            await this.renderBrowser(document.getElementById('body-sys.files'));
            this.showOSPopup("削除", `${name} を完全に削除しました`);
        } catch(e) { this.showOSPopup("エラー", "削除に失敗: " + e.message); }
        return;
    }
    if (this.fmPath.length === 0 && name === 'trash') {
        await this.showDialog("エラー", "ゴミ箱フォルダは削除できません", [{ label: "OK", value: "ok" }]);
        return;
    }
    if (kind === 'directory' && (name === 'apps' || name === 'system')) {
        const confirm = await this.showDialog("警告", `「${name}」フォルダを削除するとシステムに重大な影響を与えます。本当に削除しますか？`, [
            { label: "削除する", value: "ok" }, { label: "キャンセル", value: "cancel" }
        ]);
        if (confirm !== "ok") return;
    }
    if (this._isUnderSystem(this.fmPath)) {
        const confirm = await this.showDialog("警告", `「${name}」はシステム領域内にあります。削除すると動作が不安定になる可能性があります。続行しますか？`, [
            { label: "削除する", value: "ok" }, { label: "キャンセル", value: "cancel" }
        ]);
        if (confirm !== "ok") return;
    }
    const confirm = await this.showDialog("削除確認", `${name} をゴミ箱に移動しますか？`, [
        { label: "移動", value: "ok" }, { label: "キャンセル", value: "cancel" }
    ]);
    if (confirm !== "ok") return;
    const dir = await this.getFmDir();
    try {
        const originalPath = [...this.fmPath, name].join('/');
        let trashName;
        if (kind === 'file') {
            const file = await dir.getFileHandle(name);
            const fileData = await file.getFile();
            trashName = `${Date.now()}_${name}`;
            const trashFile = await this.fmTrashDir.getFileHandle(trashName, { create: true });
            const writable = await trashFile.createWritable();
            await writable.write(await fileData.arrayBuffer());
            await writable.close();
            await dir.removeEntry(name);
        } else {
            trashName = `${Date.now()}_${name}`;
            const sourceDir = await dir.getDirectoryHandle(name);
            const targetDir = await this.fmTrashDir.getDirectoryHandle(trashName, { create: true });
            await this._copyDir(sourceDir, targetDir);
            await dir.removeEntry(name, { recursive: true });
        }
        await this._recordTrashEntry(originalPath, trashName);
        await this.renderBrowser(document.getElementById('body-sys.files'));
        this.showOSPopup("削除", `${name} をゴミ箱に移動しました`);
    } catch(e) { this.showOSPopup("エラー", "削除に失敗: " + e.message); }
}
async fmBatchDelete() {
    if (this.fmSelected.size === 0) return;
    if (this.fmPath.length === 0 && this.fmSelected.has('trash')) {
        await this.showDialog("エラー", "ゴミ箱フォルダは削除できません", [{ label: "OK", value: "ok" }]);
        return;
    }
    const hasApps = this.fmSelected.has('apps');
    const hasSystem = this.fmSelected.has('system');
    if (hasApps || hasSystem) {
        const confirm = await this.showDialog("警告", `選択項目にシステム重要なフォルダが含まれています。削除するとシステムが破損する可能性があります。続行しますか？`, [
            { label: "キャンセル", value: "cancel" }, { label: "それでも削除", value: "ok" }
        ]);
        if (confirm !== "ok") return;
    }
    if (this._isUnderSystem(this.fmPath)) {
        const confirm = await this.showDialog("警告", "システム領域内のアイテムを削除しようとしています。続行しますか？", [
            { label: "キャンセル", value: "cancel" }, { label: "削除する", value: "ok" }
        ]);
        if (confirm !== "ok") return;
    }
    const confirm = await this.showDialog("確認", `${this.fmSelected.size}個のアイテムをゴミ箱に移動しますか？`, [
        { label: "移動", value: "ok" }, { label: "キャンセル", value: "cancel" }
    ]);
    if (confirm !== "ok") return;
    const dir = await this.getFmDir();
    for (const name of this.fmSelected) {
        try {
            let kind, entry;
            try { entry = await dir.getDirectoryHandle(name); kind = 'directory'; } catch(e) { entry = await dir.getFileHandle(name); kind = 'file'; }
            const originalPath = [...this.fmPath, name].join('/');
            const trashName = `${Date.now()}_${name}`;
            if (kind === 'file') {
                const file = await entry.getFile();
                const trashFile = await this.fmTrashDir.getFileHandle(trashName, { create: true });
                const writable = await trashFile.createWritable();
                await writable.write(await file.arrayBuffer());
                await writable.close();
            } else {
                const sourceDir = entry;
                const targetDir = await this.fmTrashDir.getDirectoryHandle(trashName, { create: true });
                await this._copyDir(sourceDir, targetDir);
            }
            await this._recordTrashEntry(originalPath, trashName);
            await dir.removeEntry(name, { recursive: true });
        } catch(e) { console.warn(`削除失敗: ${name}`, e); }
    }
    this.fmSelected.clear();
    this.fmSelectMode = false;
    await this.renderBrowser(document.getElementById('body-sys.files'));
    this.showOSPopup("削除", "選択したアイテムをゴミ箱に移動しました");
}

// ---------- ゴミ箱関連 ----------
async fmOpenTrash() {
    this.fmPath = ['trash'];
    this.fmSelectMode = false;
    this.fmSelected.clear();
    this.fmViewMode = 'browser';
    await this.renderBrowser(document.getElementById('body-sys.files'));
}
async fmRestoreFromTrash(trashName) {
    const meta = await this._loadTrashMeta();
    const originalPath = meta[trashName];
    if (!originalPath) { this.showOSPopup("復元エラー", "元のパス情報が見つかりません"); return; }
    const pathParts = originalPath.split('/');
    const fileName = pathParts.pop();
    let targetDir = this.root;
    for (const p of pathParts) {
        try { targetDir = await targetDir.getDirectoryHandle(p); }
        catch(e) { targetDir = await targetDir.getDirectoryHandle(p, { create: true }); }
    }
    try {
        try {
            await targetDir.getFileHandle(fileName);
            const choice = await this.showDialog("ファイル競合", `${fileName} は既に存在します。上書きしますか？`, [
                { label: "上書き", value: "overwrite" }, { label: "キャンセル", value: "cancel" }
            ]);
            if (choice !== "overwrite") return;
            await targetDir.removeEntry(fileName, { recursive: true });
        } catch(e) {}
        const sourceEntry = await this.fmTrashDir.getDirectoryHandle(trashName).catch(() => this.fmTrashDir.getFileHandle(trashName));
        if (sourceEntry.kind === 'file') {
            const file = await sourceEntry.getFile();
            const newFile = await targetDir.getFileHandle(fileName, { create: true });
            const writable = await newFile.createWritable();
            await writable.write(await file.arrayBuffer());
            await writable.close();
        } else {
            const sourceDir = sourceEntry;
            const targetFolder = await targetDir.getDirectoryHandle(fileName, { create: true });
            await this._copyDir(sourceDir, targetFolder);
        }
        await this.fmTrashDir.removeEntry(trashName, { recursive: true });
        await this._removeTrashEntry(trashName);
        await this.renderBrowser(document.getElementById('body-sys.files'));
        this.showOSPopup("復元", `${fileName} を復元しました`);
    } catch(e) { this.showOSPopup("復元エラー", e.message); }
}

// ---------- 名前変更 ----------
async fmRename(oldName, kind) {
    const result = await this.showDialog("名前変更", "新しい名前を入力", [
        { label: "変更", value: "ok" }, { label: "キャンセル", value: "cancel" }
    ], { input: { type: "text", default: oldName } });
    if (result.value !== "ok") return;
    const newName = result.inputValue.trim();
    if (!newName || newName === oldName) return;
    const dir = await this.getFmDir();
    try {
        if (kind === 'directory') {
            const source = await dir.getDirectoryHandle(oldName);
            const target = await dir.getDirectoryHandle(newName, { create: true });
            await this._copyDir(source, target);
            await dir.removeEntry(oldName, { recursive: true });
        } else {
            const file = await dir.getFileHandle(oldName);
            const content = await (await file.getFile()).arrayBuffer();
            const newFile = await dir.getFileHandle(newName, { create: true });
            const writable = await newFile.createWritable();
            await writable.write(content);
            await writable.close();
            await dir.removeEntry(oldName);
        }
        await this.renderBrowser(document.getElementById('body-sys.files'));
        this.showOSPopup("名前変更", `${oldName} → ${newName}`);
    } catch(e) { this.showOSPopup("エラー", "名前変更に失敗: " + e.message); }
}

// ---------- ZIP圧縮 ----------
async fmCompressToZip() {
    if (this.fmSelected.size === 0) { this.showOSPopup("ZIP圧縮", "圧縮するアイテムを選択してください"); return; }
    const zip = new JSZip();
    const dir = await this.getFmDir();
    for (const name of this.fmSelected) {
        try {
            const entry = await dir.getDirectoryHandle(name).catch(() => dir.getFileHandle(name));
            if (entry.kind === 'file') {
                const file = await entry.getFile();
                const arrayBuffer = await file.arrayBuffer();
                zip.file(name, arrayBuffer);
            } else {
                this.showOSPopup("ZIP圧縮", `ディレクトリ "${name}" はスキップされました（簡易版ではファイルのみ圧縮）`);
            }
        } catch(e) { console.warn(`圧縮エラー: ${name}`, e); }
    }
    const blob = await zip.generateAsync({ type: 'blob' });
    const zipName = `archive_${Date.now()}.zip`;
    const zipFile = await dir.getFileHandle(zipName, { create: true });
    const writable = await zipFile.createWritable();
    await writable.write(blob);
    await writable.close();
    this.fmSelected.clear();
    await this.renderBrowser(document.getElementById('body-sys.files'));
    this.showOSPopup("ZIP圧縮", `${zipName} を作成しました`);
}

// ---------- アーカイブビューア ----------
async fmViewArchive(fileHandle, fileName) {
    try {
        const file = await fileHandle.getFile();
        const arrayBuffer = await file.arrayBuffer();
        const zip = await JSZip.loadAsync(arrayBuffer);
        const entries = Object.keys(zip.files).filter(path => !zip.files[path].dir);
        if (entries.length === 0) { this.showOSPopup("アーカイブビューア", "このアーカイブは空です"); return; }
        let listHtml = '<div style="max-height:300px; overflow-y:auto;"><ul style="list-style:none; padding:0;">';
        for (const entry of entries) {
            const entryEscaped = this._escapeJsString(entry);
            listHtml += `<li style="padding:4px; border-bottom:1px solid rgba(128,128,128,0.1); display:flex; justify-content:space-between; align-items:center;">
                <span>📄 ${this._escapeHtml(entry)}</span>
                <button class="btn-mini" onclick="kernel._extractArchiveFile('${fileName}', '${entryEscaped}')">抽出</button>
            </li>`;
        }
        listHtml += '</ul></div>';
        await this.showDialog(`アーカイブ: ${fileName}`, listHtml, [{ label: "閉じる", value: "close" }], { html: listHtml, style: { width: '90%', maxWidth: '400px' } });
        // 閉じた後は元の画面に戻る
        await this.closePreview();
    } catch(e) { this.showOSPopup("アーカイブビューア", "このファイルはアーカイブ形式ではないか、破損しています"); }
}
async _extractArchiveFile(zipFileName, internalPath) {
    try {
        const targetDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        const zipHandle = await (await this.getFmDir()).getFileHandle(zipFileName);
        const zipFile = await zipHandle.getFile();
        const zip = await JSZip.loadAsync(await zipFile.arrayBuffer());
        const fileEntry = zip.file(internalPath);
        if (!fileEntry) throw new Error("ファイルが見つかりません");
        const blob = await fileEntry.async('blob');
        const parts = internalPath.split('/');
        const outName = parts.pop();
        const outFile = await targetDir.getFileHandle(outName, { create: true });
        const writable = await outFile.createWritable();
        await writable.write(blob);
        await writable.close();
        this.showOSPopup("抽出完了", `${outName} を保存しました`);
    } catch(e) { this.showOSPopup("抽出エラー", e.message); }
}

// ---------- ファイルを開く ----------
async fmAction(name, kind) {
    this.fmSelectMode = false;
    this.fmSelected.clear();
    if (kind === 'directory') {
        this.fmPath.push(name);
        await this.renderBrowser(document.getElementById('body-sys.files'));
    } else {
        const dir = await this.getFmDir();
        const fileHandle = await dir.getFileHandle(name);
        const file = await fileHandle.getFile();
        const body = document.getElementById('body-sys.files');
        const ext = name.split('.').pop().toLowerCase();
        
        if (ext === 'zip' || name.endsWith('.appaa') || name.endsWith('.modpaa')) {
            await this.fmViewArchive(fileHandle, name);
            return;
        }
        
        // プレビュー表示（閉じるボタンは closePreview を呼ぶ）
        if (name.endsWith('.txt') || name.endsWith('.html') || name.endsWith('.json')) {
            body.innerHTML = `<div style="padding:15px;"><h4>編集: ${this._escapeHtml(name)}</h4><textarea id="ed-area" class="editor-area">${await file.text()}</textarea><button class="btn-red" style="margin-top:10px" onclick="kernel.fmSave('${this._escapeJsString(name)}')">保存</button><button class="btn-mini" style="margin-top:10px; width:100%; padding:10px;" onclick="kernel.closePreview()">キャンセル</button></div>`;
        } else if (['jpg','jpeg','png','gif','webp'].includes(ext)) {
            body.innerHTML = `<div style="padding:15px; text-align:center;"><h4>${this._escapeHtml(name)}</h4><img src="${URL.createObjectURL(file)}" style="max-width:100%; max-height:50vh; border-radius:8px; margin-bottom:15px; object-fit:contain;"><button class="btn-red" onclick="kernel.closePreview()">閉じる</button></div>`;
        } else if (['mp4','mov','webm'].includes(ext)) {
            body.innerHTML = `<div style="padding:15px; text-align:center;"><h4>${this._escapeHtml(name)}</h4><video src="${URL.createObjectURL(file)}" controls autoplay style="max-width:100%; max-height:50vh; background:#000; border-radius:8px; margin-bottom:15px;"></video><button class="btn-red" onclick="kernel.closePreview()">閉じる</button></div>`;
        } else if (['mp3','wav','aac','flac','ogg','m4a'].includes(ext)) {
            body.innerHTML = `<div style="padding:15px; text-align:center;"><h4>${this._escapeHtml(name)}</h4><div style="font-size:60px; margin:20px 0;">🎵</div><audio src="${URL.createObjectURL(file)}" controls autoplay style="width:100%; margin-bottom:15px;"></audio><button class="btn-red" onclick="kernel.closePreview()">閉じる</button></div>`;
        } else {
            body.innerHTML = `<div style="padding:15px; text-align:center;"><h4>${this._escapeHtml(name)}</h4><p style="font-size:12px; opacity:0.7;">Preview not supported.</p><button class="btn-red" onclick="kernel.closePreview()">閉じる</button></div>`;
        }
    }
}

// ---------- 閉じるボタンの処理（元の画面に戻る） ----------
async closePreview() {
    const mode = this._previewReturnMode;
    this._previewReturnMode = null;
    if (mode === 'category') {
        await this.renderCategoryView();
    } else if (mode === 'search') {
        if (this._previewSearchKeyword) {
            await this._executeSearch(this._previewSearchKeyword);
        } else {
            await this.renderBrowser(document.getElementById('body-sys.files'));
        }
        this._previewSearchKeyword = '';
    } else {
        await this.renderBrowser(document.getElementById('body-sys.files'));
    }
}

// ---------- その他ユーティリティ ----------
async fmRefresh() {
    if (this.fmViewMode === 'browser') await this.renderBrowser(document.getElementById('body-sys.files'));
    else if (this.fmViewMode === 'category') await this.renderCategoryView();
    else if (this.fmViewMode === 'search' && this._lastSearchKeyword) await this._executeSearch(this._lastSearchKeyword);
    else await this.renderHome(document.getElementById('body-sys.files'));
}
async getFmDir() {
    let dir = this.root;
    for (const p of this.fmPath) dir = await dir.getDirectoryHandle(p);
    return dir;
}
async fmUp() {
    this.fmPath.pop();
    this.fmSelectMode = false;
    this.fmSelected.clear();
    this._returnToCategory = false;
    await this.renderBrowser(document.getElementById('body-sys.files'));
}
async fmSave(name) {
    const dir = await this.getFmDir();
    const text = document.getElementById('ed-area').value;
    const writable = await (await dir.getFileHandle(name)).createWritable();
    await writable.write(text);
    await writable.close();
    await this.closePreview();
}
async _copyDir(sourceDir, destDir) {
    for await (const entry of sourceDir.values()) {
        if (entry.kind === 'file') {
            const file = await entry.getFile();
            const newFile = await destDir.getFileHandle(entry.name, { create: true });
            const writable = await newFile.createWritable();
            await writable.write(await file.arrayBuffer());
            await writable.close();
        } else {
            const subDest = await destDir.getDirectoryHandle(entry.name, { create: true });
            const subSource = await sourceDir.getDirectoryHandle(entry.name);
            await this._copyDir(subSource, subDest);
        }
    }
}

    else await this.renderHome(body);
}

            this._renderSetupStep(this._setupCurrentStep);
        });
    });

    this._updateProgress(progress, 2);
}

_renderPasscodeStep(container, progress) {

    let passcodeArray = this._setupData.passcode ? this._setupData.passcode.split('') : [];

 // ★★★ キーボードイベント（追加） ★★★

        const key = e.key;
        if (key >= '0' && key <= '9') {
            e.preventDefault();
            if (passcodeArray.length < 4) {
                passcodeArray.push(key);
                this._setupData.passcode = passcodeArray.join('');
                updateDots();
            }
        } else if (key === 'Backspace') {
            e.preventDefault();
            if (passcodeArray.length > 0) {
                passcodeArray.pop();
                this._setupData.passcode = passcodeArray.join('');
                updateDots();
            }

            this._savePasscodeAndNext();

        const nextBtn = document.getElementById('passcode-next-btn');

                height: 64px; border-radius: 50%;

                color: #fff;

_nextSetupStep() {
    if (this._setupCurrentStep < this._setupSteps.length - 1) {
        this._setupCurrentStep++;
        this._renderSetupStep(this._setupCurrentStep);
    }
}

_prevSetupStep() {
    if (this._setupCurrentStep > 0) {
        this._setupCurrentStep--;
        this._renderSetupStep(this._setupCurrentStep);
    }
}

_renderSetupStep(index) {
    const container = document.getElementById('setup-step-container');
    const progress = document.getElementById('setup-progress');
    if (!container) return;

    switch (index) {
        case 0: this._renderWelcomeStep(container, progress); break;
        case 1: this._renderNameStep(container, progress); break;
        case 2: this._renderThemeStep(container, progress); break;
        case 3: this._renderPasscodeStep(container, progress); break;
        case 4: this._renderDoneStep(container, progress); break;
    }

    // スクロール位置をリセット（念のため）
    container.scrollTop = 0;
}

_updateProgress(progressEl, activeIndex) {
    progressEl.innerHTML = this._setupSteps.map((_, i) => `
        <div style="
            width: 10px; height: 10px;
            border-radius: 50%;
            background: ${i === activeIndex ? 'var(--accent)' : 'rgba(255,255,255,0.2)'};
            transition: background 0.3s;
        "></div>
    `).join('');
}

_saveNameAndNext() {
    const input = document.getElementById('setup-name-input');
    if (input) {
        this._setupData.name = input.value.trim() || 'User';
    }
    this._nextSetupStep();
}

_saveThemeAndNext() {
    // テーマは既に _setupData.theme に保存済み
    this._nextSetupStep();
}

_savePasscodeAndNext() {
    // パスコードは既に _setupData.passcode に保存済み
    this._nextSetupStep();
}

_finishSetup() {
    // 設定を反映
    this.config.userName = this._setupData.name || 'User';
    this.config.theme = this._setupData.theme || 'dark';
    this.config.passcode = this._setupData.passcode || '';

    // 保存してウィザードを閉じる
    this.saveConfig();

    const wizard = document.getElementById('setup-wizard');
    if (wizard) {
        wizard.style.opacity = '0';
        setTimeout(() => wizard.remove(), 500);
    }

    // 起動処理を再開（boot の続き）
    // boot() 内で await this.showSetupWizard() の後に処理が続くので、そのまま return で良い
}

async askPasscode() {
    if (!this.config.passcode) return true;

    const pad = document.createElement('div');
    pad.id = 'passcode-pad';
    pad.style = "position:absolute; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(20px); z-index:15000; display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:1; transition: opacity 0.2s ease;";

    pad.innerHTML = `
        <div style="margin-bottom:12px; font-weight:bold; font-size:18px;">ようこそ、${this.config.userName}さん。</div>
        <div id="pass-error" style="font-size:14px; height:24px; margin-bottom:4px; text-align:center;"></div>
        <div id="pass-dots" style="display:flex; gap:10px; margin-bottom:30px; font-size:28px; letter-spacing:4px;">${'○'.repeat(4)}</div>
        <div style="display:grid; grid-template-columns:repeat(3, 72px); gap:14px;">
            ${[1,2,3,4,5,6,7,8,9].map(n => `
                <button class="btn-mini" style="height:72px; border-radius:50%; font-size:22px; background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.2); color:#fff;" onclick="window._pk('${n}')">${n}</button>
            `).join('')}
            <button class="btn-mini" style="height:72px; border-radius:50%; font-size:20px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:#fff;" onclick="window._backspace()">⌫</button>
            <button class="btn-mini" style="height:72px; border-radius:50%; font-size:22px; background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.2); color:#fff;" onclick="window._pk('0')">0</button>
            <button class="btn-mini" style="height:72px; border-radius:50%; font-size:16px; background:rgba(255,60,60,0.25); border:1px solid rgba(255,60,60,0.4); color:#fff;" onclick="window._pc()">✕</button>
        </div>
        <div style="margin-top:24px; font-size:12px; opacity:0.4;">パスコードを入力してください</div>
    `;
    document.getElementById('device').appendChild(pad);

    const loadingOverlay = document.getElementById('boot-loading');
    if (loadingOverlay) loadingOverlay.style.display = 'none';

    return new Promise(r => {
        let input = "";

        window._pk = async (n) => {
            if (input.length >= 4) return;
            input += n;
            updateDots();
            if (input.length === 4) {
                if (input === this.config.passcode) {
                    const errEl = document.getElementById('pass-error');
                    if (errEl) errEl.innerHTML = '<span style="color:#4CAF50; font-weight:bold; font-size:16px;">ロック解除</span>';
                    pad.style.opacity = '0';
                    setTimeout(() => {
                        pad.remove();
                        if (loadingOverlay) loadingOverlay.style.display = 'flex';
                        r(true);
                    }, 200);
                } else {
                    showError('パスコードが間違っています');
                    input = "";
                    updateDots();
                    setTimeout(() => {
                        const errEl = document.getElementById('pass-error');
                        if (errEl) errEl.textContent = '';
                    }, 2000);
                }
            }
        };

        window._backspace = () => {
            if (input.length > 0) {
                input = input.slice(0, -1);
                updateDots();
                const errEl = document.getElementById('pass-error');
                if (errEl) errEl.textContent = '';
            }
        };

        window._pc = () => {
            pad.remove();
            if (loadingOverlay) loadingOverlay.style.display = 'flex';
            r(false);
        };

        const updateDots = () => {
            const dots = document.getElementById('pass-dots');
            if (dots) dots.innerText = '●'.repeat(input.length) + '○'.repeat(4 - input.length);
        };

        const showError = (msg) => {
            const errEl = document.getElementById('pass-error');
            if (errEl) {
                errEl.style.color = '#ff6b6b';
                errEl.textContent = msg;
            }
        };

        // ★★★ キーボードイベント（追加） ★★★
        const onKeyDown = (e) => {
            const key = e.key;
            if (key >= '0' && key <= '9') {
                e.preventDefault();
                window._pk(key);
            } else if (key === 'Backspace') {
                e.preventDefault();
                window._backspace();
            } else if (key === 'Enter' && input.length === 4) {
                e.preventDefault();
                // 自動で判定は _pk で行われるので、ここでは何もしない
            } else if (key === 'Escape') {
                e.preventDefault();
                window._pc();
            }
        };

        window.addEventListener('keydown', onKeyDown);

        // パッド削除時にリスナーも削除
        const originalRemove = pad.remove.bind(pad);
        pad.remove = function() {
            window.removeEventListener('keydown', onKeyDown);
            originalRemove();
        };
    });
}

// ========== GitHubからシステムファイルをダウンロード ==========

/**
 * GitHubリポジトリのルートにあるシステムファイル一覧を取得し、UIに表示する
 */
async fetchAndShowSystemFiles() {
    const listContainer = document.getElementById('system-file-list');
    if (!listContainer) return;

    listContainer.innerHTML = '<div style="text-align:center; padding:12px; opacity:0.7;">🔄 読み込み中...</div>';

    try {
        const url = `https://api.github.com/repos/${this._storeRepo.owner}/${this._storeRepo.repo}/contents?ref=${this._storeRepo.branch}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        // ファイルのみをフィルタリング（ディレクトリを除外）
        const files = data.filter(item => item.type === 'file');

        // 対象ファイル名パターン（boot, shutdown, wallpaper で始まるもの）
        const targetPatterns = ['boot.', 'shutdown.', 'wallpaper.'];
        const targetFiles = files.filter(file =>
            targetPatterns.some(pattern => file.name.toLowerCase().startsWith(pattern))
        );

        if (targetFiles.length === 0) {
            listContainer.innerHTML = '<div style="text-align:center; padding:12px; opacity:0.5;">該当するファイルが見つかりませんでした。</div>';
            return;
        }

        // チェックボックス付きリストを生成
        let html = '<div style="max-height:200px; overflow-y:auto; border:1px solid rgba(128,128,128,0.2); border-radius:12px; padding:8px;">';
        targetFiles.forEach(file => {
            const fileName = file.name;
            const fileSize = (file.size / 1024).toFixed(1) + ' KB';
            const checked = this._selectedSystemFiles && this._selectedSystemFiles.includes(fileName) ? 'checked' : '';
            html += `
                <div style="display:flex; align-items:center; gap:8px; padding:6px 4px; border-bottom:1px solid rgba(128,128,128,0.05);">
                    <input type="checkbox" id="sysfile-${this._escapeHtml(fileName)}" value="${this._escapeHtml(fileName)}" ${checked} onchange="kernel._toggleSystemFileSelection('${this._escapeJsString(fileName)}')">
                    <label for="sysfile-${this._escapeHtml(fileName)}" style="flex:1; font-size:13px; cursor:pointer;">${this._escapeHtml(fileName)}</label>
                    <span style="font-size:11px; opacity:0.5;">${fileSize}</span>
                </div>
            `;
        });
        html += '</div>';
        listContainer.innerHTML = html;

        // 選択リストを初期化（既に選択されていなければ空配列）
        if (!this._selectedSystemFiles) this._selectedSystemFiles = [];

        // チェックボックスの状態を同期（onchangeで既に更新されるが、初期化時も反映）
        document.querySelectorAll('#system-file-list input[type="checkbox"]').forEach(cb => {
            const val = cb.value;
            if (cb.checked) {
                if (!this._selectedSystemFiles.includes(val)) this._selectedSystemFiles.push(val);
            } else {
                this._selectedSystemFiles = this._selectedSystemFiles.filter(f => f !== val);
            }
        });

    } catch (e) {
        console.error('ファイル一覧取得エラー:', e);
        listContainer.innerHTML = `<div style="text-align:center; padding:12px; color:#ff6b6b;">⚠️ 一覧の取得に失敗しました: ${e.message}</div>`;
    }
}

/**
 * チェックボックスが変更されたときに選択状態を更新
 */
_toggleSystemFileSelection(fileName) {
    if (!this._selectedSystemFiles) this._selectedSystemFiles = [];
    const idx = this._selectedSystemFiles.indexOf(fileName);
    if (idx > -1) {
        this._selectedSystemFiles.splice(idx, 1);
    } else {
        this._selectedSystemFiles.push(fileName);
    }
}

/**
 * 選択されたシステムファイルをダウンロードして保存
 */
async downloadSelectedSystemFiles() {
    if (!this._selectedSystemFiles || this._selectedSystemFiles.length === 0) {
        this.showOSPopup('システムファイル', 'ダウンロードするファイルが選択されていません。');
        return;
    }

    // 壁紙が含まれているかチェック
    const hasWallpaper = this._selectedSystemFiles.some(f => f.toLowerCase().startsWith('wallpaper.'));
    if (hasWallpaper) {
        const confirm = await this.showDialog(
            '⚠️ 壁紙の置き換え',
            '選択されたファイルに壁紙が含まれています。既存の壁紙を削除して新しい壁紙に置き換えますか？',
            [
                { label: 'OK', value: 'ok' },
                { label: 'キャンセル', value: 'cancel' }
            ]
        );
        if (confirm !== 'ok') {
            // 壁紙を除外して続行するか、キャンセルするか
            const choice = await this.showDialog(
                '壁紙の処理',
                '壁紙を除外して他のファイルだけをダウンロードしますか？',
                [
                    { label: '壁紙を除外して続行', value: 'exclude' },
                    { label: 'キャンセル', value: 'cancel' }
                ]
            );
            if (choice === 'cancel') return;
            // 壁紙を除外
            this._selectedSystemFiles = this._selectedSystemFiles.filter(f => !f.toLowerCase().startsWith('wallpaper.'));
            if (this._selectedSystemFiles.length === 0) {
                this.showOSPopup('システムファイル', 'ダウンロードするファイルがなくなりました。');
                return;
            }
        }
    }

    // 進捗表示
    const progress = this._showProgressOverlay(
        'システムファイルダウンロード',
        '準備中...',
        '0%',
        true // キャンセル可能
    );

    let successCount = 0;
    let failCount = 0;
    const total = this._selectedSystemFiles.length;

    for (let i = 0; i < total; i++) {
        if (this._backupCancelled) break; // キャンセル処理
        const fileName = this._selectedSystemFiles[i];
        const percent = Math.round(((i + 1) / total) * 100);
        this._updateProgressOverlay(progress, `ダウンロード中: ${fileName}`, `${percent}%`, fileName);

        try {
            await this._downloadAndSaveSystemFile(fileName);
            successCount++;
        } catch (e) {
            console.error(`ファイル ${fileName} のダウンロードに失敗:`, e);
            failCount++;
        }
    }

    this._hideProgressOverlay(progress);

    // 完了メッセージ
    let msg = `ダウンロード完了: ${successCount} 個成功`;
    if (failCount > 0) msg += `, ${failCount} 個失敗`;
    this.showOSPopup('システムファイル', msg);

    // 壁紙が含まれていた場合は適用
    const downloadedWallpaper = this._selectedSystemFiles.find(f => f.toLowerCase().startsWith('wallpaper.'));
    if (downloadedWallpaper && successCount > 0) {
        this.applyWP();
    }

    // 選択状態をリセット（任意）
    this._selectedSystemFiles = [];
    // UIのチェックボックスもクリア
    const listContainer = document.getElementById('system-file-list');
    if (listContainer) listContainer.innerHTML = '';
}

/**
 * 単一のシステムファイルをダウンロードして適切な場所に保存
 */
async _downloadAndSaveSystemFile(fileName) {
    // 1. ファイルをダウンロード
    const url = `https://raw.githubusercontent.com/${this._storeRepo.owner}/${this._storeRepo.repo}/${this._storeRepo.branch}/${encodeURIComponent(fileName)}`;
    const response = await fetch(url);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const blob = await response.blob();

    // 2. 保存先を決定
    const lowerName = fileName.toLowerCase();
    let targetDirHandle;
    let targetFileName = fileName;

    if (lowerName.startsWith('boot.')) {
        // system/boot/ に保存
        const sysDir = await this.root.getDirectoryHandle('system', { create: true });
        targetDirHandle = await sysDir.getDirectoryHandle('boot', { create: true });
        // 既存の boot ファイルを削除（同じ拡張子のものがあれば削除）
        for await (const entry of targetDirHandle.values()) {
            if (entry.kind === 'file' && entry.name.toLowerCase().startsWith('boot.')) {
                await targetDirHandle.removeEntry(entry.name);
            }
        }
    } else if (lowerName.startsWith('shutdown.')) {
        const sysDir = await this.root.getDirectoryHandle('system', { create: true });
        targetDirHandle = await sysDir.getDirectoryHandle('shutdown', { create: true });
        // 既存の shutdown ファイルを削除
        for await (const entry of targetDirHandle.values()) {
            if (entry.kind === 'file' && entry.name.toLowerCase().startsWith('shutdown.')) {
                await targetDirHandle.removeEntry(entry.name);
            }
        }
    } else if (lowerName.startsWith('wallpaper.')) {
        const sysDir = await this.root.getDirectoryHandle('system', { create: true });
        targetDirHandle = sysDir;
        // 既存の壁紙を全て削除（wallpaper.*）
        const exts = ['html', 'png', 'jpg', 'jpeg', 'gif', 'webp'];
        for (const ext of exts) {
            try {
                await targetDirHandle.removeEntry(`wallpaper.${ext}`);
            } catch(e) {}
        }
        // 壁紙ファイル名はそのまま（例: wallpaper.png）
    } else {
        // その他のファイルは system/misc/ に保存（フォールバック）
        const sysDir = await this.root.getDirectoryHandle('system', { create: true });
        targetDirHandle = await sysDir.getDirectoryHandle('misc', { create: true });
    }

    // 3. ファイルを保存
    const fileHandle = await targetDirHandle.getFileHandle(targetFileName, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(blob);
    await writable.close();

    // ログ出力（任意）
    console.log(`Saved: ${targetFileName} to ${targetDirHandle.name}`);
}

    showOSPopup(title, message) {
    this.saveNotificationRecord(title, message);
    const container = document.getElementById('system-popup-layer');
    const popup = document.createElement('div');
    popup.className = 'system-popup';
    popup.innerHTML = `<strong>${title}</strong><span>${message}</span>`;
    container.appendChild(popup);
void popup.offsetHeight;
    popup.classList.add('active');

    // ★ ユニークなIDを生成（各ポップアップ個別管理）
    const popupId = 'popup_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    popup.dataset.popupId = popupId;

    // 既存のポップアップタイマーはクリアしない（各ポップアップ独立）

    // 自動消滅タイマー（個別）
    const autoTimer = setTimeout(() => {
        if (popup.parentNode) {
            popup.style.transition = "0.4s opacity";
            popup.style.opacity = "0";
            setTimeout(() => {
                if (popup.parentNode) {
                    if (popup._cleanup) popup._cleanup();
                    popup.remove();
                }
            }, 400);
        }
    }, 3000);
    
    // タイマーIDを保存（クリーンアップ用）
    popup._autoTimer = autoTimer;

    // --- スワイプ処理 ---
    let startX = 0, currentX = 0, isDragging = false;

    const onStart = (e) => {
        const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
        startX = clientX;
        currentX = startX;
        isDragging = true;
        popup.style.transition = 'none';
        clearTimeout(popup._autoTimer);
    };

    const onMove = (e) => {
        if (!isDragging) return;
        const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
        currentX = clientX;
        const diff = currentX - startX;
        const clamped = Math.max(-150, Math.min(150, diff));
        popup.style.transform = `translateX(${clamped}px)`;
        popup.style.opacity = 1 - Math.abs(clamped) / 150;
        if (e.type === 'mousemove' || e.type === 'touchmove') {
            e.preventDefault();
        }
    };

    const onEnd = (e) => {
        if (!isDragging) return;
        isDragging = false;
        const clientX = e.type === 'touchend' ? e.changedTouches[0].clientX : e.clientX;
        const diff = clientX - startX;
        const threshold = 80;
        if (Math.abs(diff) > threshold) {
            const direction = diff > 0 ? 1 : -1;
            popup.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
            popup.style.transform = `translateX(${direction * 200}px)`;
            popup.style.opacity = '0';
            clearTimeout(popup._autoTimer);
            setTimeout(() => {
                if (popup.parentNode) {
                    if (popup._cleanup) popup._cleanup();
                    popup.remove();
                }
            }, 350);
        } else {
            popup.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
            popup.style.transform = 'translateX(0px)';
            popup.style.opacity = '1';
            popup._autoTimer = setTimeout(() => {
                if (popup.parentNode) {
                    popup.style.transition = "0.4s opacity";
                    popup.style.opacity = "0";
                    setTimeout(() => {
                        if (popup.parentNode) {
                            if (popup._cleanup) popup._cleanup();
                            popup.remove();
                        }
                    }, 400);
                }
            }, 3000);
        }
    };

    popup.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    popup.addEventListener('touchstart', onStart, { passive: true });
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('touchend', onEnd, { passive: true });

    popup._cleanup = () => {
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onEnd);
        window.removeEventListener('touchmove', onMove);
        window.removeEventListener('touchend', onEnd);
        clearTimeout(popup._autoTimer);
    };
}

    // --- ブルースクリーン (BSoD) 実行メソッド ---
    async triggerBSOD(errorCode, file) {
        // 1. 全プロセスの強制終了
        this.runningApps.forEach(id => {
            const win = document.getElementById('win-' + id);
            if(win) win.remove();
            localStorage.removeItem(`paaos_thumb_${id}`);
        });
        this.runningApps = [];
        this.activeAppId = null;

        // 2. ログ記録 (system/errorlog.json に追記)
        try {
            const errorEntry = {
                timestamp: new Date().toISOString(),
                errorCode: errorCode,
                involvedFile: file
            };
            const sysDir = await this.root.getDirectoryHandle('system');
            const logHandle = await sysDir.getFileHandle('errorlog.json', { create: true });
            const logFile = await logHandle.getFile();
            const currentContent = await logFile.text();
            
            let logs = [];
            if (currentContent) {
                try { logs = JSON.parse(currentContent); } catch(e) { logs = []; }
            }
            logs.push(errorEntry);
            
            const writable = await logHandle.createWritable();
            await writable.write(JSON.stringify(logs, null, 2));
            await writable.close();
        } catch(e) { console.error("Error logging failed", e); }

        // 3. BSOD表示
        const screen = document.getElementById('bsod-screen');
        document.getElementById('bsod-error-code').innerText = `エラーコード: [${errorCode}]`;
        document.getElementById('bsod-involved-file').innerText = `関与したファイル: [${file}]`;
        screen.style.display = 'flex';

        // 4. タイマー処理 (10秒後にリカバリーモードへ移行)
        let timeLeft = 10;
        const timerText = document.getElementById('bsod-timer');
        const interval = setInterval(() => {
            timeLeft--;
            timerText.innerText = `${timeLeft}秒後にリカバリーモードを開始します...`;
            if (timeLeft <= 0) {
                clearInterval(interval);
                // リロードではなく、直接リカバリーモード関数を呼び出す
                this.launchRecovery();
            }
        }, 1000);
    }

showLoadingOverlay() {

// 中央ダイアログ (Promise で選択結果を返す) - 拡張版
showDialog(title, message, buttons = [{ label: 'OK', value: 'ok' }], options = {}) {
    return new Promise((resolve) => {
        // 既存のポップアップを全て削除（重複防止）
        document.querySelectorAll('.modal-dialog').forEach(d => d.remove());

        const overlay = document.createElement('div');
        overlay.className = 'modal-dialog-overlay';
        overlay.style.cssText = `
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        `;

        const dialog = document.createElement('div');
        dialog.className = 'modal-dialog';
        const isDark = this.config.theme === 'dark';
        
        // カスタムスタイルがあれば適用
        const customStyle = options.style || {};
        
        dialog.style.cssText = `
            background: ${customStyle.background || (isDark ? '#2c2c2c' : '#fefefe')};
            color: ${customStyle.color || (isDark ? '#eee' : '#111')};
            border-radius: ${customStyle.borderRadius || '24px'};
            width: ${customStyle.width || '280px'};
            max-width: ${customStyle.maxWidth || '80%'};
            max-height: 64vh;                    /* ★ 画面の80%を上限に */
            display: flex;
            flex-direction: column;
            overflow: hidden;                    /* ★ ダイアログ自体ははみ出させない */
            padding: ${customStyle.padding || '20px'};
            box-shadow: ${customStyle.boxShadow || '0 20px 40px rgba(0,0,0,0.3)'};
            font-family: ${customStyle.fontFamily || '-apple-system, sans-serif'};
            animation: fadeInScale 0.2s ease-out;
        `;

        // コンテンツエリア（スクロール可能）
        const contentArea = document.createElement('div');
        contentArea.style.cssText = `
            flex: 1;
            overflow-y: auto;
            margin-bottom: 16px;
        `;

        // タイトル（カスタムHTMLも可）
        let titleElement;
        if (options.titleHtml) {
            titleElement = document.createElement('div');
            titleElement.innerHTML = options.titleHtml;
            titleElement.style.cssText = `
                margin-bottom: 12px;
                text-align: center;
                flex-shrink: 0;
                ${customStyle.titleStyle || ''}
            `;
        } else {
            titleElement = document.createElement('div');
            titleElement.textContent = title;
            titleElement.style.cssText = `
                font-size: 18px;
                font-weight: bold;
                margin-bottom: 12px;
                text-align: center;
                flex-shrink: 0;
                ${customStyle.titleStyle || ''}
            `;
        }

        // メッセージ部分（カスタムHTMLも可）
        let messageElement;
        if (options.html) {
            messageElement = document.createElement('div');
            messageElement.innerHTML = options.html;
            messageElement.style.cssText = `
                text-align: center;
                line-height: 1.4;
                ${customStyle.messageStyle || ''}
            `;
        } else {
            messageElement = document.createElement('div');
            messageElement.textContent = message;
            messageElement.style.cssText = `
                font-size: 14px;
                text-align: center;
                line-height: 1.4;
                white-space: pre-wrap;
                word-break: break-word;
                ${customStyle.messageStyle || ''}
            `;
        }

        // 入力フィールド（options.input が指定された場合）
        let inputElement = null;
        if (options.input) {
            const inputContainer = document.createElement('div');
            inputContainer.style.cssText = `
                margin-top: 16px;
                width: 100%;
            `;
            
            const inputType = options.input.type || 'text';
            const inputPlaceholder = options.input.placeholder || '';
            const inputDefault = options.input.default || '';
            
            inputElement = document.createElement('input');
            inputElement.type = inputType;
            inputElement.placeholder = inputPlaceholder;
            inputElement.value = inputDefault;
            inputElement.style.cssText = `
                width: 100%;
                padding: 12px;
                border-radius: 12px;
                border: 1px solid ${isDark ? '#444' : '#ddd'};
                background: ${isDark ? '#1a1a1a' : '#fff'};
                color: ${isDark ? '#eee' : '#111'};
                font-size: 14px;
                box-sizing: border-box;
                outline: none;
                transition: border-color 0.2s;
            `;
            inputElement.onfocus = (e) => {
                e.target.style.borderColor = 'var(--accent)';
            };
            inputElement.onblur = (e) => {
                e.target.style.borderColor = isDark ? '#444' : '#ddd';
            };
            
            inputContainer.appendChild(inputElement);
            
            // 入力バリデーション関数
            if (options.input.validate) {
                inputElement.oninput = () => {
                    const isValid = options.input.validate(inputElement.value);
                    if (isValid === false) {
                        inputElement.style.borderColor = '#ff6b6b';
                    } else {
                        inputElement.style.borderColor = isDark ? '#444' : '#ddd';
                    }
                };
            }
            
            messageElement.appendChild(inputContainer);
        }

        // ★ contentArea にタイトルとメッセージを追加
        contentArea.appendChild(titleElement);
        contentArea.appendChild(messageElement);

        const btnContainer = document.createElement('div');
        
        // カスタムボタンレイアウト（options.buttonsLayout で指定）
        const layout = options.buttonsLayout || 'row'; // 'row', 'column', 'grid'
        btnContainer.style.cssText = `
            display: ${layout === 'grid' ? 'grid' : 'flex'};
            ${layout === 'grid' ? 'grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px;' : ''}
            ${layout === 'column' ? 'flex-direction: column;' : 'flex-direction: row; flex-wrap: wrap;'}
            gap: 12px;
            justify-content: center;
            flex-shrink: 0;
        `;

        // ボタン生成
        buttons.forEach(btn => {
            const btnEl = document.createElement('button');
            btnEl.textContent = btn.label;
            
            // カスタムボタンスタイル
            const btnStyle = btn.style || {};
            const isCancel = btn.value === 'cancel';
            
            btnEl.style.cssText = `
                background: ${btnStyle.background || (isCancel ? (isDark ? '#555' : '#ccc') : 'var(--accent)')};
                color: ${btnStyle.color || '#fff'};
                border: ${btnStyle.border || 'none'};
                padding: ${btnStyle.padding || '8px 16px'};
                border-radius: ${btnStyle.borderRadius || '40px'};
                font-size: ${btnStyle.fontSize || '14px'};
                font-weight: ${btnStyle.fontWeight || 'bold'};
                cursor: pointer;
                transition: 0.2s;
                ${btnStyle.additional || ''}
            `;
            
            // ホバー効果（カスタムで上書き可能）
            if (!btnStyle.noHover) {
                btnEl.onmouseenter = () => {
                    btnEl.style.opacity = '0.8';
                    btnEl.style.transform = 'scale(0.98)';
                };
                btnEl.onmouseleave = () => {
                    btnEl.style.opacity = '1';
                    btnEl.style.transform = 'scale(1)';
                };
            }
            
            btnEl.onclick = () => {
                overlay.remove();
                // 入力値がある場合は結果に含める
                const result = inputElement ? { value: btn.value, inputValue: inputElement.value } : btn.value;
                resolve(result);
            };
            btnContainer.appendChild(btnEl);
        });

        // ★ dialog に contentArea と btnContainer を追加
        dialog.appendChild(contentArea);
        dialog.appendChild(btnContainer);
        overlay.appendChild(dialog);
        document.getElementById('device').appendChild(overlay);

        // オーバーレイクリックで閉じる（オプション）
        if (options.closeOnOverlayClick) {
            overlay.onclick = (e) => {
                if (e.target === overlay) {
                    overlay.remove();
                    const cancelButton = buttons.find(b => b.value === 'cancel');
                    if (cancelButton) {
                        resolve(inputElement ? { value: cancelButton.value, inputValue: inputElement?.value || null } : cancelButton.value);
                    } else {
                        resolve(inputElement ? { value: null, inputValue: inputElement?.value || null } : null);
                    }
                }
            };
        }

        // アニメーション用キーフレーム
        if (!document.querySelector('#dialog-animation-style')) {
            const style = document.createElement('style');
            style.id = 'dialog-animation-style';
            style.textContent = `
                @keyframes fadeInScale {
                    from { opacity: 0; transform: scale(0.9); }
                    to { opacity: 1; transform: scale(1); }
                }
            `;
            document.head.appendChild(style);
        }

        // 入力フィールドにフォーカス
        if (inputElement && options.input?.autoFocus !== false) {
            setTimeout(() => inputElement.focus(), 100);
        }
    });
}

// ==================== システム情報公開API（修正版） ====================
// カーネルインスタンスが既に存在する前提で拡張する
(function extendKernel() {
    const k = kernel;
    if (!k) {
        console.error('❌ カーネルが見つかりません');
        return;
    }

    // --- 内部統計データの初期化 ---
    k.bootTime = Date.now();
    k.appLaunchCounts = new Map();       // appId -> 起動回数
    k.appTotalActiveTime = new Map();    // appId -> 累積アクティブ秒数
    k.appLastActive = new Map();         // appId -> 最終アクティブ時刻

    // 稼働時間とアクティブ時間を記録するタイマー
    setInterval(() => {
        if (k.activeAppId) {
            const current = k.appTotalActiveTime.get(k.activeAppId) || 0;
            k.appTotalActiveTime.set(k.activeAppId, current + 1);
        }
    }, 1000);

    // --- launchをフックして起動回数を記録 ---
    const __originalLaunch = k.launch;
    k.launch = function(id, event) {
        const count = this.appLaunchCounts.get(id) || 0;
        this.appLaunchCounts.set(id, count + 1);
        this.appLastActive.set(id, Date.now());
        return __originalLaunch.call(this, id, event);
    };

    // --- 情報取得用のメソッド ---
    k.getSystemStats = function() {
        let memory = null;
        if (performance.memory) {
            memory = {
                used: performance.memory.usedJSHeapSize,
                total: performance.memory.totalJSHeapSize,
                limit: performance.memory.jsHeapSizeLimit,
                percent: (performance.memory.usedJSHeapSize / performance.memory.jsHeapSizeLimit) * 100
            };
        }

        const appStats = {};
        for (const appId of Object.keys(this.apps)) {
            appStats[appId] = {
                name: this.apps[appId]?.name || appId,
                launchCount: this.appLaunchCounts.get(appId) || 0,
                totalActiveSeconds: this.appTotalActiveTime.get(appId) || 0,
                lastActive: this.appLastActive.get(appId) || null,
                isRunning: this.runningApps.includes(appId)
            };
        }

        return {
            uptime: Date.now() - this.bootTime,
            bootTime: this.bootTime,
            runningApps: this.runningApps.slice(),
            activeApp: this.activeAppId,
            totalApps: Object.keys(this.apps).length,
            isRooted: this.isRooted,
            theme: this.config?.theme || 'light',
            userName: this.config?.userName || '',
            memory: memory,
            appStats: appStats,
            version: '2.4'
        };
    };

    k.getStorageStats = async function() {
        try {
            const estimate = await navigator.storage.estimate();
            return {
                usage: estimate.usage,
                quota: estimate.quota,
                percent: (estimate.usage / estimate.quota) * 100
            };
        } catch(e) {
            return { error: 'storage_estimate_failed' };
        }
    };

    // --- handleAppMessage を拡張 ---
    const __originalHandleAppMessage = k.handleAppMessage;
    k.handleAppMessage = async function(e) {
        const data = e.data;
        const sourceWindow = e.source;

        // 新規アクション：システム統計
        if (data.action === 'GET_SYSTEM_STATS') {
            const stats = this.getSystemStats();
            sourceWindow.postMessage({
                type: 'SYSTEM_STATS_RESULT',
                stats: stats,
                requestId: data.requestId
            }, '*');
            return;
        }

        // 新規アクション：ストレージ統計
        if (data.action === 'GET_STORAGE_STATS') {
            const storageStats = await this.getStorageStats();
            sourceWindow.postMessage({
                type: 'STORAGE_STATS_RESULT',
                stats: storageStats,
                requestId: data.requestId
            }, '*');
            return;
        }

        // 新規アクション：PING
        if (data.action === 'SYSTEM_PING') {
            sourceWindow.postMessage({
                type: 'SYSTEM_PONG',
                pingId: data.pingId,
                timestamp: Date.now()
            }, '*');
            return;
        }

        // 既存のハンドラを呼び出し
        return __originalHandleAppMessage.call(this, e);
    };

    // デバッグ用
    window.paaosStats = () => {
        console.log('=== PaaOS System Stats ===');
        console.log(k.getSystemStats());
        k.getStorageStats().then(s => console.log('Storage:', s));
    };

    console.log('✅ PaaOS システムが起動しました。Future 2.4');
})();


// ==================== PaaOS モジュール機構 (Future 2.4) ====================
// 追加場所: ファイル末尾、既存の extendKernel() の後ろ
(function extendModuleSystem() {
    const k = kernel;
    if (!k) return;

    // --- モジュール保存ディレクトリの確保 ---
    k.ensureModuleDir = async function() {
        const sysDir = await this.root.getDirectoryHandle('system');
        return await sysDir.getDirectoryHandle('modules', { create: true });
    };

    // --- モジュール管理用ストレージ ---
    k.modules = new Map();           // id -> { manifest, enabled, priority, code }
    k.moduleLoadOrder = [];           // 優先度順のIDリスト

    // --- モジュール読み込み ---
    k.loadModule = async function(zipFile, options = {}) {
        const zip = await JSZip.loadAsync(zipFile);
        
        // manifest.json 読み込み
        const manifestFile = zip.file('manifest.json');
        if (!manifestFile) throw new Error('manifest.json が見つかりません');
        const manifest = JSON.parse(await manifestFile.async('text'));
        
        // module.js 読み込み
        const moduleFile = zip.file('module.js');
        if (!moduleFile) throw new Error('module.js が見つかりません');
        const code = await moduleFile.async('text');
        
        // ID生成（ファイル名から）
        const id = zipFile.name.replace(/\.modpaa$/i, '').replace(/[^a-z0-9_-]/gi, '_');
        const priority = manifest.priority || 0;
        
        // 既存のモジュールがあれば上書き
        const existing = this.modules.get(id);
        if (existing) {
            await this.unloadModule(id);
        }
        
        // モジュールを保存
        const moduleData = {
            id: id,
            manifest: manifest,
            priority: priority,
            enabled: manifest.enabled !== false,
            code: code,
            state: 'loaded'
        };
        this.modules.set(id, moduleData);
        
        // 優先度順リストを更新
        this.moduleLoadOrder = Array.from(this.modules.keys())
            .sort((a, b) => (this.modules.get(b).priority || 0) - (this.modules.get(a).priority || 0));
        
        // ファイルシステムに保存
        if (options.persist !== false) {
            const modDir = await this.ensureModuleDir();
            const fileHandle = await modDir.getFileHandle(id + '.modpaa', { create: true });
            const writable = await fileHandle.createWritable();
            await writable.write(await zipFile.arrayBuffer());
            await writable.close();
        }
        
        // 自動有効化
        if (moduleData.enabled) {
            await this.enableModule(id);
        }
        
        this.addSystemLog?.('module', `モジュール「${manifest.name || id}」v${manifest.version || '1.0'} を読み込みました`);
        return { success: true, id: id };
    };

    // --- モジュール有効化 ---
    k.enableModule = async function(id) {
        const mod = this.modules.get(id);
        if (!mod) throw new Error(`モジュール ${id} が見つかりません`);
        if (mod.state === 'active') return;
        
        // サンドボックス環境でコードを実行
        const api = this.createModuleAPI(id);
        try {
            const func = new Function('kernel', 'api', mod.code);
            mod.exports = func(this, api) || {};
            
            // initフックがあれば呼び出し
            if (mod.exports.init && typeof mod.exports.init === 'function') {
                await mod.exports.init();
            }
            
            mod.state = 'active';
            mod.enabled = true;
            this.addSystemLog?.('module', `モジュール「${mod.manifest.name || id}」を有効化`);
            return true;
        } catch(e) {
            console.error(`モジュール ${id} の実行に失敗:`, e);
            mod.state = 'error';
            mod.error = e.message;
            this.showOSPopup?.('モジュールエラー', `${mod.manifest.name || id}: ${e.message}`);
            return false;
        }
    };

    // --- モジュール無効化 ---
    k.disableModule = async function(id) {
        const mod = this.modules.get(id);
        if (!mod) return false;
        if (mod.state !== 'active') return false;
        
        if (mod.exports && typeof mod.exports.cleanup === 'function') {
            try {
                await mod.exports.cleanup();
            } catch(e) {
                console.warn(`モジュール ${id} のcleanupに失敗:`, e);
            }
        }
        
        mod.state = 'loaded';
        mod.enabled = false;
        this.addSystemLog?.('module', `モジュール「${mod.manifest.name || id}」を無効化`);
        return true;
    };

    // --- モジュール削除 ---
    k.unloadModule = async function(id) {
        await this.disableModule(id);
        this.modules.delete(id);
        this.moduleLoadOrder = this.moduleLoadOrder.filter(i => i !== id);
        
        try {
            const modDir = await this.ensureModuleDir();
            await modDir.removeEntry(id + '.modpaa');
        } catch(e) {}
    };

    // --- モジュールAPIの作成 ---
    k.createModuleAPI = function(moduleId) {
        const self = this;
        return {
            // ログ出力
            log: (...args) => self.addSystemLog?.('module:'+moduleId, args.join(' ')),
            
            // 通知表示
            notify: (title, message) => self.showOSPopup?.(`[${moduleId}] ${title}`, message),
            
            // スタイル追加
            addStyle: (css) => {
                const style = document.createElement('style');
                style.setAttribute('data-module', moduleId);
                style.textContent = css;
                document.head.appendChild(style);
                return style;
            },
            
            // スタイル削除
            removeStyle: (styleEl) => styleEl?.remove(),

 send: (data) => {
            // 既存の data を破壊せずにコピー
            const payload = { ...data };
            payload.moduleId = moduleId;   // モジュールIDを明示
            // もし data に appId があっても moduleId で上書きしない（優先度は moduleId > appId）
            // しかし、appId は残しておいてもよい（互換性）
            window.parent.postMessage(payload, '*');
        },
            
            // モジュール固有のスタイルをすべて削除
            removeAllStyles: () => {
                document.querySelectorAll(`style[data-module="${moduleId}"]`).forEach(s => s.remove());
            },
            
            // 設定の読み書き
            getConfig: (key, defaultValue) => {
                if (!self.config.modules) self.config.modules = {};
                if (!self.config.modules[moduleId]) self.config.modules[moduleId] = {};
                return self.config.modules[moduleId][key] ?? defaultValue;
            },
            setConfig: async (key, value) => {
                if (!self.config.modules) self.config.modules = {};
                if (!self.config.modules[moduleId]) self.config.modules[moduleId] = {};
                self.config.modules[moduleId][key] = value;
                await self.saveConfig?.();
            },
            
            // 優先度取得
            getPriority: () => self.modules.get(moduleId)?.priority || 0
        };
    };

    // --- 起動時に保存済みモジュールを読み込む ---
    k.loadAllModulesFromStorage = async function() {
        try {
            const modDir = await this.ensureModuleDir();
            for await (const entry of modDir.values()) {
                if (entry.kind === 'file' && entry.name.endsWith('.modpaa')) {
                    const file = await entry.getFile();
                    try {
                        await this.loadModule(file, { persist: false });
                    } catch(e) {
                        console.warn(`モジュール ${entry.name} の読み込みに失敗:`, e);
                    }
                }
            }
        } catch(e) {
            console.warn('モジュールディレクトリの読み込みに失敗:', e);
        }
    };

    // --- モジュール一覧取得 ---
    k.getModuleList = function() {
        return this.moduleLoadOrder.map(id => {
            const mod = this.modules.get(id);
            return {
                id: id,
                name: mod.manifest.name || id,
                version: mod.manifest.version || '1.0',
                description: mod.manifest.description || '',
                enabled: mod.enabled,
                state: mod.state,
                priority: mod.priority,
                error: mod.error
            };
        });
    };

    // --- 優先度変更 ---
    k.setModulePriority = async function(id, newPriority) {
        const mod = this.modules.get(id);
        if (!mod) return false;
        
        mod.priority = newPriority;
        this.moduleLoadOrder = Array.from(this.modules.keys())
            .sort((a, b) => (this.modules.get(b).priority || 0) - (this.modules.get(a).priority || 0));
        
        // 設定に保存
        if (!this.config.modules) this.config.modules = {};
        if (!this.config.modules[id]) this.config.modules[id] = {};
        this.config.modules[id].priority = newPriority;
        await this.saveConfig?.();
        
        return true;
    };

    // --- boot() を拡張してモジュール自動読み込み ---
    const __originalBoot = k.boot;
    k.boot = async function() {
        const result = await __originalBoot.call(this);
        // ファイルシステムが準備できてからモジュールを読み込む
        await this.loadAllModulesFromStorage();
        this.addSystemLog?.('module', `${this.modules.size} 個のモジュールを読み込みました`);
        return result;
    };

    // --- handleAppMessage にモジュール管理アクションを追加 ---
    const __originalHandleAppMessage = k.handleAppMessage;
    k.handleAppMessage = async function(e) {
        const data = e.data;
        const sourceWindow = e.source;
        
        // モジュール管理アクション
        if (data.action === 'INSTALL_MODULE') {
            try {
                // data.file は ArrayBuffer として渡される想定
                const file = new File([data.file], data.fileName || 'module.modpaa', { type: 'application/zip' });
                const result = await this.loadModule(file);
                sourceWindow.postMessage({ type: 'INSTALL_MODULE_RESULT', success: true, id: result.id, requestId: data.requestId }, '*');
            } catch(e) {
                sourceWindow.postMessage({ type: 'INSTALL_MODULE_RESULT', success: false, error: e.message, requestId: data.requestId }, '*');
            }
            return;
        }
        
        if (data.action === 'GET_MODULE_LIST') {
            const list = this.getModuleList();
            sourceWindow.postMessage({ type: 'MODULE_LIST_RESULT', modules: list, requestId: data.requestId }, '*');
            return;
        }
        
        if (data.action === 'ENABLE_MODULE') {
            const success = await this.enableModule(data.moduleId);
            sourceWindow.postMessage({ type: 'ENABLE_MODULE_RESULT', success: success, requestId: data.requestId }, '*');
            return;
        }
        
        if (data.action === 'DISABLE_MODULE') {
            const success = await this.disableModule(data.moduleId);
            sourceWindow.postMessage({ type: 'DISABLE_MODULE_RESULT', success: success, requestId: data.requestId }, '*');
            return;
        }
        
        if (data.action === 'UNINSTALL_MODULE') {
            await this.unloadModule(data.moduleId);
            sourceWindow.postMessage({ type: 'UNINSTALL_MODULE_RESULT', success: true, requestId: data.requestId }, '*');
            return;
        }
        
        if (data.action === 'SET_MODULE_PRIORITY') {
            const success = await this.setModulePriority(data.moduleId, data.priority);
            sourceWindow.postMessage({ type: 'SET_MODULE_PRIORITY_RESULT', success: success, requestId: data.requestId }, '*');
            return;
        }
        
        // 既存ハンドラに委譲
        return __originalHandleAppMessage.call(this, e);
    };

    console.log('✅ PaaOS Future 2.4 が実行されています');
})();

// ==================== 設定アプリ用モジュール管理ヘルパー（一番最後に追加するだけ） ====================
let __moduleListResponseHandler = null;

async function loadModuleListIntoUI() {
    const container = document.getElementById('module-list-container');
    if (!container) return;
    container.innerHTML = '<p style="text-align:center; opacity:0.5;">読み込み中...</p>';
    const requestId = Date.now();
    window.parent.postMessage({ action: 'GET_MODULE_LIST', requestId: requestId }, '*');
    if (__moduleListResponseHandler) window.removeEventListener('message', __moduleListResponseHandler);
    __moduleListResponseHandler = (e) => {
        if (e.data.type === 'MODULE_LIST_RESULT' && e.data.requestId === requestId) {
            window.removeEventListener('message', __moduleListResponseHandler);
            const modules = e.data.modules || [];
            if (modules.length === 0) {
                container.innerHTML = '<p style="text-align:center; opacity:0.5;">インストール済みモジュールはありません</p>';
                return;
            }
            let html = '';
            modules.forEach(mod => {
                const statusColor = mod.enabled ? '#4CAF50' : '#888';
                const statusText = mod.enabled ? '有効' : '無効';
                html += '<div style="background:rgba(128,128,128,0.1); border-radius:12px; padding:12px; margin-bottom:8px;">' +
                    '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">' +
                    '<span style="font-weight:bold;">' + escapeHtml(mod.name) + '</span>' +
                    '<span style="color:' + statusColor + '; font-size:11px;">' + statusText + '</span></div>' +
                    '<div style="font-size:11px; opacity:0.7; margin-bottom:8px;">' + escapeHtml(mod.description || '') + ' v' + mod.version + ' | 優先度: ' + mod.priority + '</div>' +
                    '<div style="display:flex; gap:6px; flex-wrap:wrap;">' +
                    '<button class="btn-mini" style="padding:4px 10px;" onclick="window.__toggleModuleEnable(\'' + mod.id + '\', ' + !mod.enabled + ')">' + (mod.enabled ? '無効化' : '有効化') + '</button>' +
                    '<button class="btn-mini" style="padding:4px 10px; background:#666;" onclick="window.__changeModulePriority(\'' + mod.id + '\', ' + mod.priority + ')">優先度</button>' +
                    '<button class="btn-mini" style="padding:4px 10px; background:#8B0000;" onclick="window.__uninstallModuleDialog(\'' + mod.id + '\', \'' + escapeHtml(mod.name) + '\')">削除</button>' +
                    '</div></div>';
            });
            container.innerHTML = html;
        }
    };
    window.addEventListener('message', __moduleListResponseHandler);
    setTimeout(() => { window.removeEventListener('message', __moduleListResponseHandler); if (container.innerHTML.includes('読み込み中')) container.innerHTML = '<p style="text-align:center; opacity:0.5; color:#ff6666;">取得できませんでした</p>'; }, 3000);
}

window.installModuleDialog = async function() {
    try {
        const [handle] = await window.showOpenFilePicker({ types: [{ description: 'PaaOS Module', accept: { 'application/zip': ['.modpaa'] } }] });
        const file = await handle.getFile(); const buffer = await file.arrayBuffer(); const requestId = Date.now();
        window.parent.postMessage({ action: 'INSTALL_MODULE', file: buffer, fileName: handle.name, requestId: requestId }, '*');
        const handler = (e) => { if (e.data.type === 'INSTALL_MODULE_RESULT' && e.data.requestId === requestId) { window.removeEventListener('message', handler); kernel.showDialog('PaaOS', e.data.success ? 'モジュールインストール完了' : '失敗: ' + (e.data.error || ''), [{ label: 'OK', value: 'ok' }]); if (e.data.success) loadModuleListIntoUI(); } };
        window.addEventListener('message', handler); setTimeout(() => window.removeEventListener('message', handler), 10000);
    } catch(e) { if (e.name !== 'AbortError') kernel.showDialog('PaaOS', '[エラー] インストールに失敗しました', [{ label: 'OK', value: 'ok' }]); }
};

window.__toggleModuleEnable = function(moduleId, enable) {
    const requestId = Date.now();
    window.parent.postMessage({ action: enable ? 'ENABLE_MODULE' : 'DISABLE_MODULE', moduleId: moduleId, requestId: requestId }, '*');
    const handler = (e) => { if ((e.data.type === 'ENABLE_MODULE_RESULT' || e.data.type === 'DISABLE_MODULE_RESULT') && e.data.requestId === requestId) { window.removeEventListener('message', handler); if (e.data.success) loadModuleListIntoUI(); else kernel.showDialog('PaaOS', '[エラー] 操作に失敗しました', [{ label: 'OK', value: 'ok' }]); } };
    window.addEventListener('message', handler); setTimeout(() => window.removeEventListener('message', handler), 5000);
};

window.__changeModulePriority = function(moduleId, currentPriority) {
    const newPriority = prompt('新しい優先度（数字が大きいほど後から実行）:', currentPriority); if (newPriority === null) return;
    const priority = parseInt(newPriority); if (isNaN(priority)) { kernel.showDialog('PaaOS', '[エラー] 数字を入力してください', [{ label: 'OK', value: 'ok' }]); return; }
    const requestId = Date.now();
    window.parent.postMessage({ action: 'SET_MODULE_PRIORITY', moduleId: moduleId, priority: priority, requestId: requestId }, '*');
    const handler = (e) => { if (e.data.type === 'SET_MODULE_PRIORITY_RESULT' && e.data.requestId === requestId) { window.removeEventListener('message', handler); if (e.data.success) loadModuleListIntoUI(); else kernel.showDialog('PaaOS', '[エラー] 優先度の変更に失敗しました', [{ label: 'OK', value: 'ok' }]); } };
    window.addEventListener('message', handler); setTimeout(() => window.removeEventListener('message', handler), 5000);
};

window.__uninstallModuleDialog = async function(moduleId, moduleName) {
    const result = await kernel.showDialog('確認', 'モジュール「' + moduleName + '」を削除しますか？', [
        { label: 'OK', value: 'ok' },
        { label: 'キャンセル', value: 'cancel' }
    ]);
    if (result !== 'ok') return;s
    const requestId = Date.now();
    window.parent.postMessage({ action: 'UNINSTALL_MODULE', moduleId: moduleId, requestId: requestId }, '*');
    const handler = (e) => { if (e.data.type === 'UNINSTALL_MODULE_RESULT' && e.data.requestId === requestId) { window.removeEventListener('message', handler); if (e.data.success) loadModuleListIntoUI(); else kernel.showDialog('PaaOS', '[エラー] 削除に失敗しました', [{ label: 'OK', value: 'ok' }]); } };
    window.addEventListener('message', handler); setTimeout(() => window.removeEventListener('message', handler), 5000);
};

function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }


</script>
