    }
}

    initHomeBar() {
    const bar = document.getElementById('home-bar');
    let startY = 0;
    let isDragging = false;
    let pointerId = null;

    const onPointerDown = (e) => {
        if (this.movingAppId) return;
        // 左クリック（ボタン0）またはタッチ（タッチはボタンが設定されない）
        if (e.button !== undefined && e.button !== 0) return;

        e.preventDefault();
        startY = e.clientY;
        isDragging = true;
        pointerId = e.pointerId;
        bar.setPointerCapture(pointerId);   // ★ これでイベントを横取り
        bar.style.transition = 'none';
    };

    const onPointerMove = (e) => {
        if (!isDragging) return;
        e.preventDefault();
        const dist = startY - e.clientY;
        bar.style.transform = `translateY(${-dist}px)`;
    };

    const onPointerUp = (e) => {
        if (!isDragging) return;
        const dist = startY - e.clientY;
        bar.style.transition = 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)';
        bar.style.transform = 'translateY(0px)';

        if (dist > 80) {
            this.showSwitcher();
        } else if (Math.abs(dist) < 10) {
            this.goHome();
        }

        // キャプチャ解放
        if (pointerId !== null) {
            bar.releasePointerCapture(pointerId);
            pointerId = null;
        }
        isDragging = false;
    };

    // 既存のイベントリスナーをすべて削除（重複防止）
    bar.removeEventListener('pointerdown', onPointerDown);
    window.removeEventListener('pointermove', onPointerMove);
    window.removeEventListener('pointerup', onPointerUp);

    // 新しいイベントリスナーを登録（pointer イベントはキャプチャ不要）
    bar.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);
}

startSplitScreen() {
    // スイッチャーを閉じる
    this.closeSwitcher();
    // アプリ選択ダイアログを表示
    this.showSplitAppPicker();
}

showSplitAppPicker() {
    const allApps = Object.keys(this.apps).filter(id => !this.config.hiddenApps.includes(id));
    if (allApps.length < 2) {
        this.showOSPopup('分割表示', '分割するには少なくとも2つのアプリが必要です');
        return;
    }

    let selected = [];
    const renderPicker = () => {
        const options = {
            title: '分割するアプリを選択 (2つ)',
            html: `
                <div style="max-height:300px; overflow-y:auto; text-align:left;">
                    ${allApps.map(id => `
                        <div style="display:flex; align-items:center; gap:10px; padding:8px; border-bottom:1px solid rgba(128,128,128,0.1);">
                            <span style="font-size:20px;">${this.apps[id].icon}</span>
                            <span style="flex:1;">${this.apps[id].name}</span>
                            <button class="btn-mini" data-id="${id}" style="background:${selected.includes(id) ? '#4CAF50' : 'var(--accent)'}; color:#fff; border:none; padding:4px 12px; border-radius:12px; font-size:12px; cursor:pointer;">
                                ${selected.includes(id) ? '✓ 選択済み' : '選択'}
                            </button>
                        </div>
                    `).join('')}
                </div>
                <div style="margin-top:12px; text-align:center; color:${selected.length === 2 ? '#4CAF50' : '#888'};">
                    ${selected.length === 2 ? '✅ 2つ選択しました。分割を開始します。' : `${selected.length}/2 選択済み`}
                </div>
            `,
            buttons: [
                { label: 'キャンセル', value: 'cancel' }
            ],
            style: { width: '320px', maxHeight: '70vh' }
        };
        // ボタンクリックで選択切り替え
        // ダイアログ表示前にイベントリスナーを仕込むため、showDialogのオプションにコールバックを渡す
        // しかしshowDialogは生成後にHTMLをセットするので、後からイベントを付与する。
        // 代わりに、showDialogで表示した後に、querySelectorでボタンを取得してリスナーを追加する。
        // しかし、showDialogはPromiseを返すので、その前にDOMが生成されるタイミングが難しい。
        // 簡易的に、showDialog内でHTMLを表示し、その後でボタンにイベントを付与するために、setTimeoutで囲む。
        this.showDialog('分割表示', options.html, options.buttons, options)
            .then((result) => {
                if (result === 'cancel' || selected.length !== 2) {
                    // キャンセルまたは選択不足なら何もしない
                    return;
                }
                // 選択完了 → 分割開始
                this.launchSplitApps(selected[0], selected[1]);
            });
        // ダイアログ表示後にボタンにイベントを付与
        setTimeout(() => {
            const btns = document.querySelectorAll('.modal-dialog .btn-mini[data-id]');
            btns.forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    const idx = selected.indexOf(id);
                    if (idx > -1) {
                        selected.splice(idx, 1);
                    } else {
                        if (selected.length < 2) {
                            selected.push(id);
                        } else {
                            this.showOSPopup('選択制限', '2つまでしか選択できません');
                            return;
                        }
                    }
                    // 選択状態を更新（ダイアログ内のHTMLを書き換え）
                    const contentDiv = document.querySelector('.modal-dialog .modal-dialog-content') || document.querySelector('.modal-dialog [style*="max-height"]');
                    if (contentDiv) {
                        // 再描画（簡易的にダイアログを閉じて再度開く？ → 現在は再描画が面倒なので、シンプルにリセット）
                        // 代わりに、選択数を上部に表示して、ボタン文言を変えるだけにする。
                        // とりあえず、選択状態を反映するためにボタンの背景色とテキストを変更
                        const allAppBtns = document.querySelectorAll('.modal-dialog .btn-mini[data-id]');
                        allAppBtns.forEach(b => {
                            const bid = b.dataset.id;
                            if (selected.includes(bid)) {
                                b.style.background = '#4CAF50';
                                b.textContent = '✓ 選択済み';
                            } else {
                                b.style.background = 'var(--accent)';
                                b.textContent = '選択';
                            }
                        });
                        // カウント表示
                        const countDiv = document.querySelector('.modal-dialog .modal-dialog-content div:last-child');
                        if (countDiv) {
                            countDiv.textContent = selected.length === 2 ? '✅ 2つ選択しました。分割を開始します。' : `${selected.length}/2 選択済み`;
                            countDiv.style.color = selected.length === 2 ? '#4CAF50' : '#888';
                        }
                        // 選択完了時に自動で進める？ → ユーザーが「分割開始」ボタンを押す必要があるので、OKボタンを押すと開始。
                        // OKボタンが押されたときにselected.length === 2 なら進む。
                    }
                };
            });
            // OKボタンの挙動をカスタマイズ（元々のOKはキャンセルと同じ扱い？）
            // showDialogのボタンに「分割開始」を追加するために、ボタンリストを変更する必要がある。
            // 現在はキャンセルだけなので、代わりに「分割開始」ボタンを追加する。
            // 上記のbuttonsではキャンセルだけだが、実際は「分割開始」を追加したい。
            // そこで、ダイアログ内に「分割開始」ボタンをHTMLで追加する。
            const dialog = document.querySelector('.modal-dialog');
            if (dialog) {
                const btnContainer = dialog.querySelector('div:last-child');
                if (btnContainer) {
                    const startBtn = document.createElement('button');
                    startBtn.textContent = '分割開始';
                    startBtn.style.cssText = 'background:#4CAF50; color:#fff; border:none; padding:8px 20px; border-radius:40px; font-weight:bold; cursor:pointer;';
                    startBtn.onclick = () => {
                        if (selected.length === 2) {
                            // ダイアログを閉じて分割開始
                            dialog.closest('.modal-dialog-overlay').remove();
                            this.launchSplitApps(selected[0], selected[1]);
                        } else {
                            this.showOSPopup('注意', '2つのアプリを選択してください');
                        }
                    };
                    btnContainer.prepend(startBtn);
                }
            }
        }, 100);
    };
    renderPicker();
}

launchSplitApps(topId, bottomId) {
    // スイッチャーを閉じる
    this.closeSwitcher();
    // 既存の分割があれば閉じる
    this.closeSplitScreen();

    const container = document.createElement('div');
    container.id = 'split-view';
    container.className = 'active';
    document.getElementById('window-layer').appendChild(container);

    // 上部ペイン
    const topPane = document.createElement('div');
    topPane.className = 'split-pane';
    topPane.id = 'split-pane-top';
    container.appendChild(topPane);

    // 分割線
    const divider = document.createElement('div');
    divider.className = 'split-divider';
    divider.id = 'split-divider';
    container.appendChild(divider);

    // 下部ペイン
    const bottomPane = document.createElement('div');
    bottomPane.className = 'split-pane';
    bottomPane.id = 'split-pane-bottom';
    container.appendChild(bottomPane);

    // 初期比率を設定 (50%)
    this.splitState.ratio = 50;
    this.applySplitRatio();

    // アプリを起動（ペインに配置）
    const topWin = this._createAppWindow(topId, topPane);
    const bottomWin = this._createAppWindow(bottomId, bottomPane);

    // 状態保存
    this.splitState.active = true;
    this.splitState.topId = topId;
    this.splitState.bottomId = bottomId;
    this.splitState.topWin = topWin;
    this.splitState.bottomWin = bottomWin;
    this.splitState.container = container;
    this.splitState.divider = divider;

    // 分割線のドラッグイベント
    this._initSplitDrag(divider, container);

    // 分割線クリックメニュー
    this._initSplitMenu(divider);

    // ドック・編集ボタンを隠す
    document.getElementById('dock').classList.add('hidden');
    document.getElementById('edit-trigger').style.display = 'none';

    // 起動したアプリを runningApps に追加（既に launch 内で追加されるが、_createAppWindow では追加されないため）
    if (!this.runningApps.includes(topId)) this.runningApps.push(topId);
    if (!this.runningApps.includes(bottomId)) this.runningApps.push(bottomId);
}

_createAppWindow(id, container) {
    const app = this.apps[id];
    if (!app) return null;

    // 既存のウィンドウがあれば削除（一意性のため）
    const oldWin = document.getElementById('win-' + id);
    if (oldWin) oldWin.remove();

    const win = document.createElement('div');
    win.className = 'window';
    win.id = 'win-' + id;
    win.style.position = 'absolute';
    win.style.inset = '0';
    win.style.transform = 'none';
    win.style.opacity = '1';
    win.style.pointerEvents = 'auto';
    win.style.borderRadius = '0';
    win.style.transition = 'none';

    win.innerHTML = `
        <div class="win-header">
            <span>${app.name}</span>
            <div style="display:flex; gap:15px;">
                <span onclick="kernel.goHome()" style="cursor:pointer; padding:5px;">―</span>
                <span onclick="kernel.killApp('${id}')" style="cursor:pointer; padding:5px;">✕</span>
            </div>
        </div>
        <div class="win-body" id="body-${id}"></div>
    `;

    container.appendChild(win);

    // レンダリング（システムアプリ or 外部アプリ）
    if (app.type === 'sys') {
        this.renderSysApp(id);
    } else {
        const frame = document.createElement('iframe');
        frame.id = `iframe-${id}`;
        frame.src = URL.createObjectURL(new Blob([app.content], { type: 'text/html' }));
        document.getElementById(`body-${id}`).appendChild(frame);
    }

    return win;
}

_initSplitDrag(divider, container) {
    let isDragging = false;
    let startY = 0;
    let startTopHeight = 0;

    const onStart = (e) => {
        e.preventDefault();
        isDragging = true;
        startY = e.clientY;
        const topPane = document.getElementById('split-pane-top');
        if (topPane) startTopHeight = topPane.offsetHeight;
        document.body.style.cursor = 'ns-resize';
        document.body.style.userSelect = 'none';
        divider.setPointerCapture(e.pointerId);
    };

    const onMove = (e) => {
        if (!isDragging) return;
        const currentY = e.clientY;
        const delta = currentY - startY;
        const totalHeight = container.offsetHeight;
        const dividerHeight = 6;
        let newTopHeight = Math.max(50, Math.min(totalHeight - dividerHeight - 50, startTopHeight + delta));
        const newRatio = (newTopHeight / (totalHeight - dividerHeight)) * 100;
        this.splitState.ratio = Math.max(10, Math.min(90, newRatio));
        this.applySplitRatio();
        e.preventDefault();
    };

    const onEnd = (e) => {
        if (!isDragging) return;
        isDragging = false;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        divider.releasePointerCapture(e.pointerId);
    };

    divider.addEventListener('pointerdown', onStart);
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onEnd);
    window.addEventListener('pointercancel', onEnd);
}

async confirmCloseSplitScreen() {
    const result = await this.showDialog(
        '分割表示終了',
        '分割表示を終了しますか？',
        [
            { label: '終了', value: 'ok' },
            { label: 'キャンセル', value: 'cancel' }
        ]
    );
    if (result === 'ok') {
        this.closeSplitScreen();
    }
}

applySplitRatio() {
    const container = this.splitState.container;
    if (!container) return;
    const topPane = document.getElementById('split-pane-top');
    const bottomPane = document.getElementById('split-pane-bottom');
    const divider = document.getElementById('split-divider');
    if (!topPane || !bottomPane || !divider) return;

    const ratio = this.splitState.ratio; // 0-100
    const totalHeight = container.offsetHeight;
    const topHeight = (totalHeight * ratio) / 100;
    const dividerHeight = 6;
    const bottomHeight = totalHeight - topHeight - dividerHeight;

    topPane.style.flex = 'none';
    topPane.style.height = topHeight + 'px';
    divider.style.flex = 'none';
    divider.style.height = dividerHeight + 'px';
    bottomPane.style.flex = 'none';
    bottomPane.style.height = bottomHeight + 'px';
}

// ========== タイマー管理（平行アニメーション対応） ==========
_clearTimer(key) {
    if (this._timers[key]) {
        clearTimeout(this._timers[key]);
        this._timers[key] = null;
    }
}

_clearAllTimers() {
    for (const key in this._timers) {
        if (this._timers[key]) {
            clearTimeout(this._timers[key]);
            this._timers[key] = null;
        }
    }
}

_setTimer(key, callback, delay) {
    this._clearTimer(key);
    this._timers[key] = setTimeout(() => {
        callback();
        this._timers[key] = null;
    }, delay);
}

swapSplitPanes() {
    if (!this.splitState.active) return;
    const topPane = document.getElementById('split-pane-top');
    const bottomPane = document.getElementById('split-pane-bottom');
    if (!topPane || !bottomPane) return;

    // 中身を入れ替え
    const topChildren = topPane.children;
    const bottomChildren = bottomPane.children;
    // ウィンドウ要素を移動
    const topWin = topPane.querySelector('.window');
    const bottomWin = bottomPane.querySelector('.window');
    if (topWin && bottomWin) {
        topPane.appendChild(bottomWin);
        bottomPane.appendChild(topWin);
    }

    // IDも入れ替え
    const tempId = this.splitState.topId;
    this.splitState.topId = this.splitState.bottomId;
    this.splitState.bottomId = tempId;
    // ウィンドウ参照も更新
    this.splitState.topWin = topPane.querySelector('.window');
    this.splitState.bottomWin = bottomPane.querySelector('.window');
}

changeSplitApps() {
    // アプリを維持したまま分割を解除（keepApps=true）
    this.closeSplitScreen(true);
    // 選択画面を表示（選択完了後に再度 launchSplitApps が呼ばれる）
    this.showSplitAppPicker();
}

closeSplitScreen(keepApps = false) {
    if (!this.splitState.active) return;

    const topId = this.splitState.topId;
    const bottomId = this.splitState.bottomId;

    // ★ アプリを終了する場合は、killApp を呼ばずに直接削除
    if (!keepApps) {
        // ウィンドウを削除（すでに container.remove() で消えるため、個別に削除する必要はない）
        // ただし、runningApps からは除外する
        if (topId && this.runningApps.includes(topId)) {
            this.runningApps = this.runningApps.filter(id => id !== topId);
            // サムネイル等の後片付け（必要なら）
            localStorage.removeItem(`paaos_thumb_${topId}`);
        }
        if (bottomId && this.runningApps.includes(bottomId)) {
            this.runningApps = this.runningApps.filter(id => id !== bottomId);
            localStorage.removeItem(`paaos_thumb_${bottomId}`);
        }
        // アクティブアプリが分割のものならリセット
        if (this.activeAppId === topId || this.activeAppId === bottomId) {
            this.activeAppId = null;
        }
    }

    // コンテナを削除
    if (this.splitState.container) {
        this.splitState.container.remove();
    }

    // 状態リセット
    this.splitState.active = false;
    this.splitState.topId = null;
    this.splitState.bottomId = null;
    this.splitState.topWin = null;
    this.splitState.bottomWin = null;
    this.splitState.container = null;
    this.splitState.divider = null;

    // ドック・編集ボタンを表示
    document.getElementById('dock').classList.remove('hidden');
    document.getElementById('edit-trigger').style.display = 'block';
}

    initLockScreen() {
    const handle = document.getElementById('slider-handle');
    const container = document.getElementById('slider-container');
    const track = document.getElementById('slider-track');
    let isDragging = false;
    let startX = 0;
    const maxSlide = container.offsetWidth - handle.offsetWidth - 10;

    const start = (e) => {
        isDragging = true;
        startX = (e.type === 'touchstart') ? e.touches[0].clientX : e.clientX;
        handle.style.transition = 'none';
    };
    
    const move = (e) => {
        if (!isDragging) return;
        const x = (e.type === 'touchmove') ? e.touches[0].clientX : e.clientX;
        let offset = x - startX;
        offset = Math.max(0, Math.min(offset, maxSlide));
        requestAnimationFrame(() => {
            handle.style.transform = `translateX(${offset}px)`;
            track.style.opacity = 1 - (offset / maxSlide);
        });
    };
    
    const end = async (e) => {
        if (!isDragging) return;
        isDragging = false;
        const x = (e.type === 'touchend') ? e.changedTouches[0].clientX : e.clientX;
        
        if (x - startX > maxSlide * 0.7) {
            handle.style.transform = `translateX(${maxSlide}px)`;
            await this.boot();
        } else {
            handle.style.transition = 'transform 0.2s ease-out';
            handle.style.transform = 'translateX(0px)';
            track.style.opacity = 1;
        }
    };

    // ★★★ キーボード（スペースキー）対応 ★★★
    const onKeyDown = (e) => {
    const lockScreen = document.getElementById('lock-screen');
    if (!lockScreen || lockScreen.style.display === 'none') return;

    // ★ 起動処理中なら無視 ★
    if (this._isBootInProgress) return;

    if (e.key === ' ' || e.key === 'Space') {
        e.preventDefault();
        handle.style.transition = 'transform 0.02s ease-out';
        handle.style.transform = `translateX(${maxSlide}px)`;
        track.style.transition = 'opacity 0.02s ease-out';
        track.style.opacity = 0;
        setTimeout(async () => {
            await this.boot();
        }, 50);
    }
};

    // マウス／タッチイベント
    handle.addEventListener('mousedown', start);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', end);
    handle.addEventListener('touchstart', start, {passive: true});
    window.addEventListener('touchmove', move, {passive: true});
    window.addEventListener('touchend', end, {passive: true});

    // ★★★ キーボードイベントを追加 ★★★
    window.addEventListener('keydown', onKeyDown);

    // クリーンアップ用（必要に応じて）
    this._lockScreenCleanup = () => {
        window.removeEventListener('keydown', onKeyDown);
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', end);
        window.removeEventListener('touchmove', move);
        window.removeEventListener('touchend', end);
    };
}

    async getDB() {
        return new Promise((resolve) => {
            const req = indexedDB.open(this.dbName, 1);
            req.onupgradeneeded = () => req.result.createObjectStore("state");
            req.onsuccess = () => resolve(req.result);
        });
    }


async boot() {
    // ★ 既に起動処理中なら何もしない
    if (this._isBootInProgress) return;
    this._isBootInProgress = true;

    try {
        const db = await this.getDB();
        let handle = await new Promise(r => db.transaction("state").objectStore("state").get("root").onsuccess = (e) => r(e.target.result));
        
        let isFirstTime = false;
        if (handle) {
            const opt = { mode: 'readwrite' };
            if (await handle.queryPermission(opt) !== 'granted') {
                if (await handle.requestPermission(opt) !== 'granted') throw new Error("Permission Denied");
            }
        } else {
            handle = await window.showDirectoryPicker({ mode: 'readwrite' });
            await db.transaction("state", "readwrite").objectStore("state").put(handle, "root");
            isFirstTime = true;
        }
        
        this.showLoadingOverlay();
        await new Promise(r => setTimeout(r, 30));

        // ★ 認証前に必要なディレクトリを作成
        this.root = handle;
        for (const f of this.folders) await this.root.getDirectoryHandle(f, { create: true });
        await (await this.root.getDirectoryHandle('system', {create:true})).getDirectoryHandle('shutdown', {create:true});
        await (await this.root.getDirectoryHandle('system', {create:true})).getDirectoryHandle('boot', {create:true});

        // ★ 設定を読み込む
        await this.loadConfig();
        if (isFirstTime || !this.config.userName) await this.showSetupWizard();

        // ★ パスコード確認
        const loadingOverlay = document.getElementById('boot-loading');
        if (loadingOverlay) loadingOverlay.style.display = 'none';
        const auth = await this.askPasscode();
        if (loadingOverlay) loadingOverlay.style.display = 'flex';

        if (!auth) {
            this.hideLoadingOverlay();
            document.getElementById('slider-handle').style.transform = 'translateX(0px)';
            document.getElementById('slider-track').style.opacity = 1;
            return; // ★ finally でフラグ解除
        }

        // ★ 認証成功
        await this.scanApps();
        this.applyTheme();
        this.applyWP();

        const lock = document.getElementById('lock-screen');
        lock.classList.add('unlocked');
        document.getElementById('desktop').classList.add('active');
        document.getElementById('dock').style.display = 'flex';
        document.getElementById('edit-trigger').style.display = 'block';
        setTimeout(() => lock.style.display = 'none', 500);

        if (this.config.language) {
            await this.loadLanguage(this.config.language);
        } else {
            this.currentLanguage = 'ja';
        }
        
        this.renderDesktop();
        this.renderDock();
        this.renderQuickPanel(); 
// boot() 内の適切な場所（例: this.renderQuickPanel(); の後など）
// boot() 内の適切な場所
// boot() 内
// ★ 既存のリスナーを削除（念のため）
document.removeEventListener('fullscreenchange', this._fullscreenChangeHandler);
// ★ ハンドラをメソッドとして定義（後で削除しやすいように）
this._fullscreenChangeHandler = () => {
    const el = document.getElementById('device');
    if (document.fullscreenElement) {
        el.classList.add('fullscreen-mode');
    } else {
        el.classList.remove('fullscreen-mode');
    }
    this.updateQuickPanel();
};
document.addEventListener('fullscreenchange', this._fullscreenChangeHandler);
        
window.addEventListener('message', this.handleAppMessage.bind(this));

        setTimeout(() => this.hideLoadingOverlay(), 150);

        // ★ ロック解除後にキーボードイベントを削除
        

    } catch (e) { 
    this.hideLoadingOverlay();
    console.error("Boot Error:", e);
    document.getElementById('slider-handle').style.transform = 'translateX(0px)';
    document.getElementById('slider-track').style.opacity = 1;
    
    const result = await this.showDialog(
        'PaaOS',
        'システム領域へのアクセスが必要です(FileSystemAccessAPI Chorme86以上が必要です)\n\n' + e.message,
        [
            { label: '再試行', value: 'retry' },
            { label: 'キャンセル', value: 'cancel' }
        ]
    );
    
    // 戻り値がオブジェクトの場合は value を取得
    const choice = (typeof result === 'object' && result !== null) ? result.value : result;
    
    if (choice === 'retry') {
        this._isBootInProgress = false;  // フラグをリセット
        this.boot();                     // 再起動
    }
} finally {
        // ★ 必ずフラグを解除（return や例外が発生しても実行される）
        this._isBootInProgress = false;
    }}

            this.config = Object.assign(this.config, parsed);

            if (!this.config.fontFamily) this.config.fontFamily = 'default';
            if (!this.config.emojiFamily) this.config.emojiFamily = 'default';

    document.documentElement.style.setProperty('--text-dark', isDark ? '#ffffff' : '#000000');

updateStatusBarAutoColor() {
    const statusBar = document.getElementById('status-bar');
    if (!statusBar) return;
    
    // 背景色を取得（ステータスバーの背景は透明なので、その背後の色を擬似的に）
    const device = document.getElementById('device');
    const bgColor = window.getComputedStyle(device).backgroundColor;
    const rgb = bgColor.match(/\d+/g);
    if (rgb) {
        const brightness = (parseInt(rgb[0]) * 0.299 + parseInt(rgb[1]) * 0.587 + parseInt(rgb[2]) * 0.114);
        statusBar.style.transition = 'color 0.3s ease';
        statusBar.style.color = brightness > 128 ? '#000000' : '#ffffff';
    }
}

    async saveConfig() {
    const sys = await this.root.getDirectoryHandle('system');
    const writable = await (await sys.getFileHandle('config.json', {create:true})).createWritable();
    await writable.write(JSON.stringify(this.config));
    await writable.close();
    this.applyWP();
    this.applyFontAndEmoji();  // この中で renderDesktop / renderDock が呼ばれる
}

        'sys.appstore': { name: 'アプリストア', icon: '🛒', type: 'sys' }
    };

    // ★★★ ストアデータを一度だけ取得（ネットワーク1回またはキャッシュ読み取り） ★★★
    let storeData = null;
    try {
        storeData = await this.fetchStoreApps();
    } catch(e) {
        // 取得できなくてもアプリは読み込めるようにする
        console.warn('Store data fetch failed, using folder names as display names', e);
    }

    const appsDir = await this.root.getDirectoryHandle('apps');
    for await (const entry of appsDir.values()) {
        if (entry.kind !== 'directory') continue;
        if (this.config.disabled.includes(entry.name)) continue;

        const appId = entry.name;

        try {
            let icon = '📱';
            try {
                const iconFile = await entry.getFileHandle('icon.png');
                icon = URL.createObjectURL(await iconFile.getFile());
            } catch(e) {}

            const htmlFile = await entry.getFileHandle('index.html');
            const html = await (await htmlFile.getFile()).text();

            // ★★★ ストアデータから表示名を取得（フォールバックはフォルダ名） ★★★
            let displayName = appId;
            if (storeData && storeData.apps) {
                const info = storeData.apps.find(a => a.id === appId);
                if (info && info.name) {
                    displayName = info.name;
                }
            }

            this.apps[appId] = {
                name: displayName,
                icon: icon,
                type: 'app',
                content: html,
                _folder: appId
            };
        } catch(e) {
            console.warn(`アプリ ${appId} の読み込みに失敗:`, e);
        }
    }
}

    async goHome() {
    if (this.popupState.active) {
        this.closePopupApp();
        return;
    }
    if (this.splitState.active) {
        this.closeSplitScreen();
        return;
    }
    if (this.panelActive) this.togglePanel();
    if (this.isSwitcherActive) {
        this._clearTimer('switcher');
        this._clearTimer('switcher_close');
        this.closeSwitcher();
    }
    if (!this.activeAppId) return;

    const id = this.activeAppId;
    const win = document.getElementById('win-' + id);
    if (win) {
        // サムネイル生成（変更なし）
        const canvas = document.createElement('canvas');
        canvas.width = 480; canvas.height = 864;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = this.config.theme === 'dark' ? '#1a1a1a' : '#fdfdfd';
        ctx.fillRect(0, 0, 480, 864);
        ctx.fillStyle = this.config.theme === 'dark' ? '#333' : '#eee';
        ctx.fillRect(0, 0, 480, 120);
        ctx.fillStyle = this.config.theme === 'dark' ? '#fff' : '#000';
        ctx.font = 'bold 30px sans-serif';
        ctx.fillText(this.apps[id].name, 30, 80);
        ctx.fillStyle = this.config.theme === 'dark' ? '#222' : '#f0f0f0';
        ctx.fillRect(20, 140, 440, 680);
        const icon = this.apps[id].icon;
        if (icon.length > 2) {
            try {
                const img = new Image();
                img.src = icon;
                await new Promise(r => img.onload = r);
                ctx.drawImage(img, 140, 300, 200, 200);
            } catch(e){}
        } else {
            ctx.font = '100px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(icon, 240, 450);
        }
        const thumbBase64 = canvas.toDataURL('image/webp', 0.8);
        localStorage.setItem(`paaos_thumb_${id}`, thumbBase64);

        win.classList.remove('active');
        win.classList.add('minimized');
        win.style.pointerEvents = 'none'; 
    }
    this.activeAppId = null;
    document.getElementById('dock').classList.remove('hidden');
    document.getElementById('edit-trigger').style.display = 'block';

    killApp(id, fromSwitcher = false) {
    if (this.popupState.active && id === this.popupState.appId) {
        this.closePopupApp();
        return;
    }
    if (this.splitState.active && (id === this.splitState.topId || id === this.splitState.bottomId)) {
        this.closeSplitScreen();
        return;
    }
    const win = document.getElementById('win-' + id);
    if (fromSwitcher) {
        const card = document.getElementById('card-' + id);
        if (card) {
            card.classList.remove('visible');
            card.classList.add('closing');
            this._setTimer('killApp', () => {
                this.runningApps = this.runningApps.filter(a => a !== id);
                if (win) win.remove();
                localStorage.removeItem(`paaos_thumb_${id}`);
                if (id === 'sys.cmd') this._cmdFirstLaunchFixed = false;
                if (this.runningApps.length === 0) {
                    this.closeSwitcher();
                } else {
                    this.showSwitcher();
                }
            }, 350);
        }
    } else {
        if (win) {
            win.classList.remove('active');
            win.classList.add('minimized');
            this._setTimer('killApp', () => {
                win.remove();
            }, 400);
        }
        this.runningApps = this.runningApps.filter(a => a !== id);
        this._cmdFirstLaunchFixed = false;
        localStorage.removeItem(`paaos_thumb_${id}`);
        if (this.activeAppId === id) {
            this.activeAppId = null;
            document.getElementById('dock').classList.remove('hidden');
            document.getElementById('edit-trigger').style.display = 'block';
        }
    }
}

// ★ 閉じる専用メソッド（アニメーション付き）
closeAppDrawer() {
    const popup = document.querySelector('.system-popup');
    if (!popup) return;

    // ★ ① active が付いていなければ、まず active を付与（表示状態にする）
    if (!popup.classList.contains('active')) {
        popup.classList.add('active');
        // 強制リフローしてから改めて閉じる処理を呼ぶ
        void popup.offsetHeight;
        // 次のフレームで閉じる（再帰呼び出し）
        requestAnimationFrame(() => {
            this.closeAppDrawer();
        });
        return;
    }

    // ★ ② active が付いている状態で closing を追加（逆再生）
    popup.classList.add('closing');

    // ★ ③ 次のフレームで active を削除（closing が優先）
    requestAnimationFrame(() => {
        popup.classList.remove('active');
    });

    // ★ ④ アニメーション完了後に要素を削除
    setTimeout(() => {
        if (popup.parentNode) {
            popup.remove();
            this._appDrawerVisible = false;
        }
        popup.classList.remove('closing');
    }, 350);
}

initMoveSystem() {

    window.addEventListener('touchmove', (e) => {
        if (!this.movingAppId) return;
        e.preventDefault();
        const touch = e.touches[0];
        const el = document.getElementById('icon-' + this.movingAppId);
        if (el) {
            const desktop = document.getElementById('desktop');
            const rect = desktop.getBoundingClientRect();
            const x = touch.clientX - rect.left - 40;
            const y = touch.clientY - rect.top - 45;
            el.style.zIndex = '10000';
            el.style.left = x + "px";
            el.style.top = y + "px";
        }
    }, { passive: false });
    
    window.addEventListener('touchend', () => {
        if (this.movingAppId) this.stopMoving();
    });

    // ★ マウス操作用
    window.addEventListener('mousemove', (e) => {
        if (!this.movingAppId) return;
        e.preventDefault();
        const el = document.getElementById('icon-' + this.movingAppId);
        if (el) {
            const desktop = document.getElementById('desktop');
            const rect = desktop.getBoundingClientRect();
            const x = e.clientX - rect.left - 40;
            const y = e.clientY - rect.top - 45;
            el.style.zIndex = '10000';
            el.style.left = x + "px";
            el.style.top = y + "px";
        }
    });
    
    window.addEventListener('mouseup', () => {
        if (this.movingAppId) this.stopMoving();
    });

    // ★★★ pointerup を追加（マウス・タッチ両方でより確実に終了検知） ★★★
    window.addEventListener('pointerup', () => {

window.addEventListener('touchcancel', () => {

    });
}

startMoving(id, e) {

    const el = document.getElementById('icon-' + id);

        el.classList.add('moving');

}
async stopMoving() {
    if (!this.movingAppId) return;
    // ★ フラグリセットを遅延させる（クリックイベントが先に実行されるように） ★
    setTimeout(() => {
        this._isDragging = false;
    }, 0);
    const id = this.movingAppId;
    const el = document.getElementById('icon-' + id);
    if (!el) {
        this.movingAppId = null;
        return;
    }
    this.movingAppId = null;
    el.classList.remove('moving');
    el.style.zIndex = '';
    const currentX = parseFloat(el.style.left);
    const currentY = parseFloat(el.style.top);
    const safeX = isNaN(currentX) ? 20 : currentX;
    const safeY = isNaN(currentY) ? 70 : currentY;
    const snapX = Math.round((safeX - 20) / this.gridSize.x) * this.gridSize.x + 20;
    const snapY = Math.round((safeY - 70) / this.gridSize.y) * this.gridSize.y + 70;
    const finalX = Math.max(20, Math.min(snapX, 375 - 100));
    const finalY = Math.max(70, Math.min(snapY, 812 - 150));
    el.style.left = finalX + "px";
    el.style.top = finalY + "px";
    this.config.appPositions[id] = { x: finalX, y: finalY };
    await this.saveConfig();

async reboot() {
    const overlay = document.getElementById('reboot-overlay');
    const display = document.getElementById('reboot-display');
    overlay.style.display = 'flex';
    overlay.style.backgroundColor = '#000';
    display.style.display = 'block';
    overlay.style.justifyContent = 'center';
    overlay.style.alignItems = 'center';

    this.isBooting = true;

    try {
        const sys = await this.root.getDirectoryHandle('system');

        // shutdown画像表示
        try {
            const shutdownDir = await sys.getDirectoryHandle('shutdown');
            const entries = [];
            for await (const entry of shutdownDir.values()) {
                if (entry.kind === 'file') entries.push(entry);
            }
            entries.sort((a, b) => a.name.localeCompare(b.name));
            if (entries.length === 1) {
                const file = await entries[0].getFile();
                const url = URL.createObjectURL(file);
                display.src = url;
                display.style.display = 'block';
                await new Promise(r => setTimeout(r, 3000));
                URL.revokeObjectURL(url);
            } else if (entries.length > 1) {
                for (const entry of entries) {
                    const file = await entry.getFile();
                    const url = URL.createObjectURL(file);
                    display.src = url;
                    await new Promise(r => setTimeout(r, 1000 / 24));
                    URL.revokeObjectURL(url);
                }
            }
        } catch(e) {}

        display.style.display = 'none';
        await new Promise(r => setTimeout(r, 3000));
        display.style.display = 'block';

        // boot画像表示
        try {
            const bootDir = await sys.getDirectoryHandle('boot');
            const entries = [];
            for await (const entry of bootDir.values()) {
                if (entry.kind === 'file') entries.push(entry);
            }
            entries.sort((a, b) => a.name.localeCompare(b.name));
            if (entries.length === 1) {
                const file = await entries[0].getFile();

// キャッシュキー
_getStoreCacheKey() {
    return `paaos_store_cache_${this._storeRepo.owner}_${this._storeRepo.repo}`;
}

// アプリ一覧を取得（キャッシュ付き）
async fetchStoreApps(force = false) {
    const cacheKey = this._getStoreCacheKey();
    const cacheTimeKey = cacheKey + '_time';
    const now = Date.now();
    // 5分間キャッシュ有効
    if (!force && localStorage.getItem(cacheTimeKey) && (now - parseInt(localStorage.getItem(cacheTimeKey)) < 300000)) {
        try {
            const cached = JSON.parse(localStorage.getItem(cacheKey));
            if (cached && cached.apps) return cached;
        } catch(e) {}
    }
    try {
        const url = `https://api.github.com/repos/${this._storeRepo.owner}/${this._storeRepo.repo}/contents/apps.json?ref=${this._storeRepo.branch}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error('Failed to fetch apps.json');
        const data = await response.json();
const binaryString = atob(data.content);
const bytes = new Uint8Array(binaryString.length);
for (let i = 0; i < binaryString.length; i++) {
    bytes[i] = binaryString.charCodeAt(i);
}
const content = new TextDecoder('utf-8').decode(bytes);
const json = JSON.parse(content);
        localStorage.setItem(cacheKey, JSON.stringify(json));
        localStorage.setItem(cacheTimeKey, String(now));
        return json;
    } catch(e) {
        console.error('Store fetch error:', e);
        // キャッシュがあれば古いものを返す
        const cached = localStorage.getItem(cacheKey);
        if (cached) {
            try { return JSON.parse(cached); } catch(e2) {}
        }
        return null;
    }
}

// インストール済みバージョンを取得
// インストール済みバージョンを取得（ファイルシステム直接検索）
async getInstalledVersion(appId) {
    try {
        const appDir = await this.root.getDirectoryHandle('apps');
        // apps/ 以下の全フォルダをループ
        for await (const entry of appDir.values()) {
            if (entry.kind !== 'directory') continue;
            try {
                // id.txt をチェック
                const idFile = await entry.getFileHandle('id.txt');
                const file = await idFile.getFile();
                const id = (await file.text()).trim();
                if (id === appId) {
                    try {
                        const versionFile = await entry.getFileHandle('version.txt');
                        const vFile = await versionFile.getFile();
                        return (await vFile.text()).trim();
                    } catch(e) {
                        return null;
                    }
                }
            } catch(e) {}
        }
    } catch(e) {}
    return null;
}

// アプリがインストール済みか
async isAppInstalled(appId) {
    // this.apps に appId がキーとして存在すればインストール済み
    return !!this.apps[appId];
}

// 更新の有無をチェック
async checkForUpdate(appId) {
    const store = await this.fetchStoreApps();
    if (!store) return null;
    const appInfo = store.apps.find(a => a.id === appId);
    if (!appInfo) return null;
    
    const app = this.apps[appId];
    if (!app) return null;
    const folderName = app._folder || appId;
    
    try {
        const appDir = await this.root.getDirectoryHandle('apps');
        const targetDir = await appDir.getDirectoryHandle(folderName);
        const versionFile = await targetDir.getFileHandle('version.txt');
        const file = await versionFile.getFile();
        const installed = await file.text();
        if (appInfo.version !== installed.trim()) {
            return appInfo.version;
        }
    } catch(e) {}
    return null;
}

async installApp(appId, onProgress) {
    try {
        const store = await this.fetchStoreApps();
        if (!store) throw new Error('ストア情報を取得できませんでした。');
        const appInfo = store.apps.find(a => a.id === appId);
        if (!appInfo) throw new Error(`アプリ「${appId}」が見つかりません。`);

        const folderName = appId.trim();
        if (!folderName) throw new Error('アプリIDが空です。');

        const appDir = await this.root.getDirectoryHandle('apps', { create: true });

        // ★★★ 日本語フォルダが存在したら、リネーム（削除しない） ★★★
        try {
            const oldDir = await appDir.getDirectoryHandle(folderName);
            // バックアップ名にリネーム（_old_タイムスタンプ）
            const backupName = folderName + '_old_' + Date.now();
            // リネームは File System Access API では直接できないので、
            // 新しい名前にコピーしてから古い方を削除する（が、削除が問題なので...）
            // 代わりに、フォルダごと移動（rename）はできないので、
            // 新しいフォルダに中身をコピーしてから古いフォルダを消すという方法。
            // しかし、それだとまた削除の問題にぶつかる。
            // なので、ここでは「削除せずに空にする」ことを試みる。
        } catch(e) {}

        // ★★★ ここからは「削除せずに上書き」でいく ★★★
        // 代わりに、強制的に新しいフォルダを作成する（既存があればエラーになるが、それを無視）
        // 方法: 新しいフォルダを tmp で作り、既存を置き換える

        let targetDir;
        try {
            // まず新しいフォルダを作成しようとする
            targetDir = await appDir.getDirectoryHandle(folderName, { create: true });
        } catch(e) {
            // 既に存在する場合は、一度中身を空にしてから使う
            targetDir = await appDir.getDirectoryHandle(folderName);
            // 中身を空にする（ファイルだけ削除、フォルダは残す）
            const entries = [];
            for await (const entry of targetDir.values()) {
                entries.push(entry);
            }
            for (const entry of entries) {
                try {
                    if (entry.kind === 'file') {
                        await targetDir.removeEntry(entry.name);
                    } else {
                        await targetDir.removeEntry(entry.name, { recursive: true });
                    }
                } catch(e) {
                    console.warn(`[install] 削除失敗: ${entry.name}`, e);
                }
            }
        }

        // ファイルダウンロード
        const totalFiles = appInfo.files.length;
        let completed = 0;

        for (const file of appInfo.files) {
            const fileUrl = `https://raw.githubusercontent.com/${this._storeRepo.owner}/${this._storeRepo.repo}/${this._storeRepo.branch}/${appInfo.basePath}${file}`;
            const response = await fetch(fileUrl);
            if (!response.ok) throw new Error(`ファイル ${file} のダウンロードに失敗しました。 (${response.status})`);
            const blob = await response.blob();
            const fileHandle = await targetDir.getFileHandle(file, { create: true });
            const writable = await fileHandle.createWritable();
            await writable.write(blob);
            await writable.close();
            completed++;
            if (onProgress) onProgress(completed / totalFiles);
        }

        // メタデータ保存
        const idFile = await targetDir.getFileHandle('id.txt', { create: true });
        const idWritable = await idFile.createWritable();
        await idWritable.write(appId);
        await idWritable.close();

        const versionHandle = await targetDir.getFileHandle('version.txt', { create: true });
        const versionWritable = await versionHandle.createWritable();
        await versionWritable.write(appInfo.version);
        await versionWritable.close();

        await this.scanApps();
        this.renderDesktop();
        this.renderDock();

        const appBody = document.getElementById('body-sys.appstore');
        if (appBody) {
            await this.renderAppStore(appBody);
        }

        this.showOSPopup('アプリストア', `${appInfo.name} のインストールが完了しました。`);
    } catch(e) {
        this.showOSPopup('❌ インストールエラー', e.message);
        console.error(e);
    }
}
// アプリを削除
async uninstallApp(appId) {
    // アプリ情報を取得
    const appInfo = this.apps[appId];
    if (!appInfo) {
        throw new Error('アプリが見つかりません。');
    }

    const confirm = await this.showDialog('アプリ削除', `「${appInfo.name}」を削除しますか？`, [
        { label: '削除', value: 'ok' },
        { label: 'キャンセル', value: 'cancel' }
    ]);
    if (confirm !== 'ok') return;

    // ★★★ apps ディレクトリを毎回新しく取得 ★★★
    const appDir = await this.root.getDirectoryHandle('apps');

    // ★★★ id.txt を検索してフォルダを特定 ★★★
    let targetFolder = null;
    for await (const entry of appDir.values()) {
        if (entry.kind !== 'directory') continue;
        try {
            const idFile = await entry.getFileHandle('id.txt');
            const idContent = await (await idFile.getFile()).text();
            if (idContent.trim() === appId) {
                targetFolder = entry.name;
                break;
            }
        } catch(e) {
            // id.txt がなければスキップ
        }
    }

    if (!targetFolder) {
        // フォールバック：_folder を試す
        const fallbackName = appInfo._folder;
        if (fallbackName) {
            try {
                await appDir.getDirectoryHandle(fallbackName);
                targetFolder = fallbackName;
            } catch(e) {}
        }
    }

    if (!targetFolder) {
        throw new Error(`アプリ「${appInfo.name}」のフォルダが見つかりません。`);
    }

    // ★★★ フォルダ内のファイルを1つずつ削除 ★★★
    const targetDir = await appDir.getDirectoryHandle(targetFolder);
    const errors = [];

    // まず全エントリをリストアップ
    const entries = [];
    for await (const entry of targetDir.values()) {
        entries.push(entry);
    }

    // ファイルを1つずつ削除
    for (const entry of entries) {
        try {
            if (entry.kind === 'file') {
                await targetDir.removeEntry(entry.name);
            } else {
                // サブフォルダは再帰的に削除（ここでは想定しないが一応）
                await targetDir.removeEntry(entry.name, { recursive: true });
            }
        } catch(e) {
            errors.push(`${entry.name}: ${e.message}`);
        }
    }

    // エラーがあってもフォルダ削除を試みる
    try {
        // ★★★ ここで再度 appDir を取得してからフォルダ削除 ★★★
        const freshAppDir = await this.root.getDirectoryHandle('apps');
        await freshAppDir.removeEntry(targetFolder);
    } catch(e) {
        errors.push(`フォルダ削除: ${e.message}`);
        // 空でない場合は再試行（強制削除）
        try {
            const retryDir = await this.root.getDirectoryHandle('apps');
            await retryDir.removeEntry(targetFolder, { recursive: true });
        } catch(e2) {
            errors.push(`強制削除: ${e2.message}`);
        }
    }

    if (errors.length > 0) {
        console.warn('削除エラー:', errors);
        // 一部削除できなくても続行
    }

    // 後処理
    await this.scanApps();
    this.renderDesktop();
    this.renderDock();

    const appBody = document.getElementById('body-sys.appstore');
    if (appBody) {
        await this.renderAppStore(appBody);
    }

    this.showOSPopup('アプリストア', `${appInfo.name} を削除しました。`);
}

// 内部：リスト描画
async _renderStoreList(body) {
    const listContainer = body.querySelector('#store-apps-list');
    const searchKeyword = body.querySelector('#store-search').value.toLowerCase();
    listContainer.innerHTML = '読み込み中...';

    const store = await this.fetchStoreApps();
    if (!store || !store.apps) {
        listContainer.innerHTML = '⚠️ アプリ一覧の取得に失敗しました。インターネット接続を確認してください。';
        return;
    }

    const installedMap = {};
    for (const app of store.apps) {
        const version = await this.getInstalledVersion(app.id);
        if (version) installedMap[app.id] = version;
    }

    let apps = store.apps;
    if (searchKeyword) {
        apps = apps.filter(app => app.name.toLowerCase().includes(searchKeyword) || app.id.toLowerCase().includes(searchKeyword));
    }

    listContainer.innerHTML = '';
    if (apps.length === 0) {
        listContainer.innerHTML = '<div style="text-align:center; padding:40px; opacity:0.5;">該当するアプリがありません</div>';
        return;
    }

    for (const app of apps) {
        const installedVersion = installedMap[app.id] || null;
        const isInstalled = !!installedVersion;
        const updateAvailable = isInstalled ? await this.checkForUpdate(app.id) : false;
        const iconHtml = app.icon ? `<img src="${app.icon}" style="width:48px; height:48px; border-radius:8px; object-fit:cover;" onerror="this.style.display='none'">` : '📱';

        const card = document.createElement('div');
        card.style.cssText = 'background:rgba(128,128,128,0.08); border-radius:16px; padding:14px; display:flex; align-items:center; gap:14px;';

        const iconDiv = document.createElement('div');
        iconDiv.style.cssText = 'font-size:36px; flex-shrink:0;';
        iconDiv.innerHTML = iconHtml;
        card.appendChild(iconDiv);

        const infoDiv = document.createElement('div');
        infoDiv.style.cssText = 'flex:1; min-width:0;';
        infoDiv.innerHTML = `
    <div style="font-weight:bold; font-size:16px;">${app.name}</div>
    <div style="font-size:12px; opacity:0.7; margin-top:2px;">${app.description || ''}</div>
    <div style="font-size:11px; opacity:0.5; margin-top:4px;">
        バージョン: ${app.version}
        ${isInstalled ? `(インストール済み v${installedVersion})` : ''}
        ${updateAvailable ? `<span style="color:#4CAF50; margin-left:8px;">🔄 更新あり (${updateAvailable})</span>` : ''}
    </div>
`;
        card.appendChild(infoDiv);

        const btnDiv = document.createElement('div');
        btnDiv.style.cssText = 'display:flex; gap:6px; flex-shrink:0;';

        if (!isInstalled) {
            const btn = document.createElement('button');
            btn.className = 'btn-mini';
            btn.textContent = 'インストール';
            btn.onclick = async (e) => {
                const b = e.currentTarget;
                b.disabled = true;
                b.textContent = 'インストール中…';
                try {
                    await this.installApp(app.id);
                } catch (err) {
                    b.disabled = false;
                    b.textContent = 'インストール';
                    this.showOSPopup('エラー', 'インストールに失敗しました: ' + err.message);
                }
            };
            btnDiv.appendChild(btn);
        } else {
            const delBtn = document.createElement('button');
            delBtn.className = 'btn-mini';
            delBtn.textContent = '削除';
            delBtn.onclick = async (e) => {
                const b = e.currentTarget;
                b.disabled = true;
                b.textContent = '削除中…';
                try {
                    await this.uninstallApp(app.id);
                } catch (err) {
                    b.disabled = false;
                    b.textContent = '削除';
                    this.showOSPopup('エラー', '削除に失敗しました: ' + err.message);
                }
            };
            btnDiv.appendChild(delBtn);
        }

        if (updateAvailable) {
            const updBtn = document.createElement('button');
            updBtn.className = 'btn-mini';
            updBtn.style.cssText = 'background:#4CAF50;';
            updBtn.textContent = '更新';
            updBtn.onclick = async (e) => {
                const b = e.currentTarget;
                b.disabled = true;
                b.textContent = '更新中…';
                try {
                    await this.installApp(app.id);
                } catch (err) {
                    b.disabled = false;
                    b.textContent = '更新';
                    this.showOSPopup('エラー', '更新に失敗しました: ' + err.message);
                }
            };
            btnDiv.appendChild(updBtn);
        }

        card.appendChild(btnDiv);
        listContainer.appendChild(card);
    }
}

// 言語ファイルをアップロード
async uploadLanguageFile() {
    try {
        const [fileHandle] = await window.showOpenFilePicker({
            types: [{
                description: 'Language File',
                accept: { 'text/plain': ['.txt'] }
            }]
        });
        const file = await fileHandle.getFile();
        const langName = file.name.replace(/\.txt$/i, '');
        if (!langName) {
            this.showOSPopup('エラー', 'ファイル名が無効です');
            return;
        }
        const langDir = await this.root.getDirectoryHandle('system')
            .then(d => d.getDirectoryHandle('language', { create: true }));
        const newFileHandle = await langDir.getFileHandle(file.name, { create: true });
        const writable = await newFileHandle.createWritable();
        await writable.write(file);
        await writable.close();

        this.config.language = langName;
        await this.saveConfig();
        await this.loadLanguage(langName);
        this.showOSPopup('言語', `${langName} を適用しました`);
        if (this.activeAppId === 'sys.settings') this.renderSysApp('sys.settings');
    } catch(e) {
        if (e.name !== 'AbortError') {
            this.showOSPopup('エラー', 'アップロードに失敗しました');
            console.error(e);
        }
    }
}

async switchLanguage(langName) {
    this.config.language = langName;
    await this.saveConfig();
    await this.loadLanguage(langName);
    this.showOSPopup('言語', `${langName} に切り替えました`);

    }

async loadLanguage(langName) {
    this.currentLanguage = langName;
    this.translations.clear();
    try {
        const langDir = await this.root.getDirectoryHandle('system').then(d => d.getDirectoryHandle('language', { create: true }));
        const fileHandle = await langDir.getFileHandle(langName + '.txt');
        const file = await fileHandle.getFile();
        const text = await file.text();
        const lines = text.split('\n');
        for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed || trimmed.startsWith('#')) continue;
            const eqIndex = trimmed.indexOf('=');
            if (eqIndex > 0) {
                const key = trimmed.substring(0, eqIndex).trim();
                const value = trimmed.substring(eqIndex + 1).trim();
                if (key && value) {
                    this.translations.set(key, value);
                }
            }
        }
        this.applyTranslations();
        return true;
    } catch(e) {
        console.warn('Language load failed:', e);
        return false;
    }
}

_t(text) {
    return this.translations.get(text) || text;
}

    const existing = document.getElementById(themeId);
    if (existing) existing.remove();

    if (!this.config.customThemeEnabled || !this.config.customThemeFile) {
        // カスタムテーマが無効なら、標準テーマを適用

function levenshtein(a, b) {
    const m = Array(b.length + 1).fill(null).map(() => Array(a.length + 1).fill(null));
    for (let i = 0; i <= a.length; i++) m[0][i] = i;
    for (let j = 0; j <= b.length; j++) m[j][0] = j;
    for (let j = 1; j <= b.length; j++) {
        for (let i = 1; i <= a.length; i++) {
            const cost = a[i-1] === b[j-1] ? 0 : 1;
            m[j][i] = Math.min(m[j][i-1] + 1, m[j-1][i] + 1, m[j-1][i-1] + cost);
        }
    }
    return m[b.length][a.length];
}

    async loadNotifications() {

            const text = await file.text();
            if (!text.trim()) return [];
            return text.trim().split('\n').map(line => JSON.parse(line));

        const entry = {
            title: title || "システム",
            message: message,
            time: new Date().toLocaleString('ja-JP')
        };
        const sys = await this.root.getDirectoryHandle('system');
        const handle = await sys.getFileHandle('notification.json', {create:true});
        const file = await handle.getFile();
        const currentText = await file.text();
        const writable = await handle.createWritable();
        await writable.write(currentText + JSON.stringify(entry) + "\n");
        await writable.close();
    }

        let logs = await this.loadNotifications();

    async updateSystem() {
    try {
        const [fileHandle] = await window.showOpenFilePicker({
            types: [{
                description: 'PaaOS Update File (.zip)',
                accept: { 'application/zip': ['.zip'] }
            }]
        });
        const file = await fileHandle.getFile();
        const zip = await JSZip.loadAsync(file);
        
        // 必須: os.html の存在確認
        const osFile = zip.file("os.html");
        if (!osFile) {
            await this.showDialog('PaaOS', '[エラー]  zipの中に os.html が見つかりませんでした。', [{ label: 'OK', value: 'ok' }]);
            return;
        }
        
        // オプション: info.txt の処理
        const infoFile = zip.file("info.txt");
        if (infoFile) {
            try {
                const infoContent = await infoFile.async("text");
                const sysDir = await this.root.getDirectoryHandle('system', { create: true });
                const infoHandle = await sysDir.getFileHandle('info.txt', { create: true });
                const writable = await infoHandle.createWritable();
                await writable.write(infoContent);
                await writable.close();
                this.showOSPopup("更新", "システム情報 (info.txt) を更新しました");
            } catch (infoErr) {
                console.warn("info.txtの保存に失敗しました:", infoErr);
                this.showOSPopup("警告", "info.txtの保存に失敗しましたが、更新は続行します");
            }
        }
        
        // os.html の処理（既存コード）
        const osContent = await osFile.async("blob");
        const rand = Math.floor(Math.random() * 10000);
        const newFileName = `${rand}os.html`;
        const newFileHandle = await this.root.getFileHandle(newFileName, { create: true });
        const writable = await newFileHandle.createWritable();
        await writable.write(osContent);
        await writable.close();
        
        await this.showDialog('PaaOS', ` 更新が完了しました。[${newFileName}] を起動します。`, [{ label: 'OK', value: 'ok' }]);
        
        // 古い os.html の削除（あれば）
        try {
            const sysDir = await this.root.getDirectoryHandle('system');
            await sysDir.removeEntry("os.html");
        } catch(e) {
            try { await this.root.removeEntry("os.html"); } catch(e2){}
        }
        
        location.href = `${newFileName}`;
        
    } catch (err) {
        console.error("Update Error:", err);
        if (err.name !== 'AbortError') {
            await this.showDialog('PaaOS', '[エラー] アップデート中にエラーが発生しました。', [{ label: 'OK', value: 'ok' }]);
        }
    }
}

// ---------- 文字列エスケープ ----------
_escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
}
_escapeJsString(str) {
    if (!str) return '';
    return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r');
}
_formatFileSize(bytes) {
    if (bytes < 1024) return `${bytes}B`;
    if (bytes < 1048576) return `${(bytes / 1024).toFixed(1)}KB`;
    return `${(bytes / 1048576).toFixed(1)}MB`;
}

}

// ---------- カテゴリ別表示 ----------
async switchToCategory(category) {
    this.fmCategory = category;
    this.fmViewMode = 'category';
    await this.renderCategoryView();
}
async switchToBrowser() {
    this.fmViewMode = 'browser';
    this.fmPath = [];
    this.fmSelectMode = false;
    this.fmSelected.clear();
    this._returnToCategory = false;
    await this.renderBrowser(document.getElementById('body-sys.files'));
}
async renderCategoryView() {
    const body = document.getElementById('body-sys.files');
    const extMap = {
        images: ['jpg','jpeg','png','gif','webp','bmp','svg'],
        videos: ['mp4','webm','mov','avi','mkv'],
        music: ['mp3','wav','aac','flac','ogg','m4a'],
        documents: ['txt','html','json','pdf','doc','docx','xls','xlsx','ppt','pptx']
    };
    let targetExts = extMap[this.fmCategory] || [];
    let fileList = [];
    const collect = async (dirHandle, currentPath = '') => {
        for await (const entry of dirHandle.values()) {
            if (entry.kind === 'file') {
                const ext = entry.name.split('.').pop().toLowerCase();
                if (targetExts.includes(ext)) {
                    const file = await entry.getFile();
                    fileList.push({ fullPath: currentPath + entry.name, name: entry.name, size: file.size });
                }
            } else if (entry.kind === 'directory' && entry.name !== 'trash') {
                await collect(await dirHandle.getDirectoryHandle(entry.name), currentPath + entry.name + '/');
            }
        }
    };
    await collect(this.root);
    fileList.sort((a,b) => a.name.localeCompare(b.name));

    let html = `
        <div style="padding:15px;">
            <div style="margin-bottom:16px;"><button class="btn-mini" onclick="kernel.gofilehome()">← ホームへ戻る</button></div>
            <div style="font-size:13px; opacity:0.7; margin-bottom:12px;">
                ${this.fmCategory === 'images' ? '🖼️ 画像ファイル' : this.fmCategory === 'videos' ? '🎬 動画ファイル' : this.fmCategory === 'music' ? '🎵 音楽ファイル' : '📄 ドキュメントファイル'} (${fileList.length}件)
            </div>
    `;
    for (const item of fileList) {
        const nameEscaped = this._escapeHtml(item.name);
        const fullPathEscaped = this._escapeJsString(item.fullPath);
        html += `
            <div class="list-item" style="justify-content: space-between;">
                <div style="display:flex; align-items:center; gap:8px; flex:1;">
                    <span>📄 ${nameEscaped}</span>
                    <span style="font-size:10px; opacity:0.6;">${this._formatFileSize(item.size)}</span>
                </div>
                <div style="display:flex; gap:6px;">
                    <button class="btn-mini" onclick="kernel.openFileByPath('${fullPathEscaped}')">開く</button>
                    <button class="btn-mini" onclick="kernel.deleteFileByPath('${fullPathEscaped}')">🗑️</button>
                </div>
            </div>
        `;
    }
    if (fileList.length === 0) html += `<div style="text-align:center; padding:40px; opacity:0.5;">該当するファイルがありません</div>`;
    body.innerHTML = html + `</div>`;
}
async gofilehome() {
    this.fmViewMode = 'home';
    this._previewReturnMode = null;
    this._previewSearchKeyword = '';
    await this.renderHome(document.getElementById('body-sys.files'));
}
async openFileByPath(fullPath) {
    const parts = fullPath.split('/').filter(p => p);
    const fileName = parts.pop();
    const dirPath = parts;
    const oldPath = [...this.fmPath];
    const oldMode = this.fmViewMode;
    this.fmPath = dirPath;
    this._returnToCategory = (oldMode === 'category');
    this._previewReturnMode = (oldMode === 'category') ? 'category' : (oldMode === 'search' ? 'search' : 'browser');
    if (oldMode === 'search') this._previewSearchKeyword = this._lastSearchKeyword || '';
    await this.fmAction(fileName, 'file');
    this.fmPath = oldPath;
}
async deleteFileByPath(fullPath) {
    const parts = fullPath.split('/').filter(p => p);
    const fileName = parts.pop();
    const dirPath = parts;
    const oldPath = [...this.fmPath];
    this.fmPath = dirPath;
    await this.fmDelete(fileName, 'file');
    this.fmPath = oldPath;
    await this.renderCategoryView();
}

// ---------- 従来のブラウザ表示 ----------
async renderBrowser(body) {
    if (!this.fmTrashDir) {
        try { this.fmTrashDir = await this.root.getDirectoryHandle('trash', { create: true }); } catch(e) {}
    }
    let dir = await this.getFmDir();
    let clipboardStatus = '';
    if (this.fmClipboard && this.fmClipboard.items && this.fmClipboard.items.length > 0) {
        clipboardStatus = ` | クリップボード: ${this.fmClipboard.items.length}個 (${this.fmClipboard.type === 'copy' ? 'コピー' : '切り取り'})`;
    }
    let html = `
        <div style="padding:15px;">
            <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid rgba(128,128,128,0.2);">
                <button class="btn-mini" onclick="kernel.fmNewFile()">📄 新規ファイル</button>
                <button class="btn-mini" onclick="kernel.fmNewFolder()">📁 新規フォルダ</button>
                <button class="btn-mini" onclick="kernel.fmSearch()">🔍 検索</button>
                <button class="btn-mini" onclick="kernel.fmToggleSelectMode()">${this.fmSelectMode ? '✓ 選択解除' : '☐ 選択モード'}</button>
                ${this.fmSelectMode && this.fmSelected.size > 0 ? `
                    <button class="btn-mini" onclick="kernel.fmCopyToClipboard()">📋 コピー</button>
                    <button class="btn-mini" onclick="kernel.fmCutToClipboard()">✂️ 切り取り</button>
                ` : ''}
                ${this.fmClipboard && this.fmClipboard.items && this.fmClipboard.items.length > 0 ? `<button class="btn-mini" style="background:#4CAF50;" onclick="kernel.fmPasteFromClipboard()">📎 貼り付け${clipboardStatus}</button>` : ''}
                ${this.fmSelectMode && this.fmSelected.size > 0 ? `<button class="btn-mini" style="background:#ff6b6b;" onclick="kernel.fmBatchDelete()">🗑️ 選択(${this.fmSelected.size})を削除</button>` : ''}
                <button class="btn-mini" onclick="kernel.fmOpenTrash()">🗑️ ゴミ箱</button>
                <button class="btn-mini" onclick="kernel.fmRefreshBrowser()">🔄 更新</button>
                <button class="btn-mini" onclick="kernel.gofilehome()">🏠 ホーム</button>
            </div>
            <div style="margin-bottom:12px; font-size:13px; background:rgba(128,128,128,0.05); padding:8px 12px; border-radius:8px;">
                ${this._buildBreadcrumb()}
            </div>
    `;
    if (this.fmPath.length > 0) {
        html += `<div class="list-item" onclick="kernel.fmUp()" style="cursor:pointer;"><span>⬅ .. 戻る</span></div>`;
    }
    let entries = [];
    for await (const entry of dir.values()) entries.push(entry);
    entries.sort((a,b) => {
        if (a.kind !== b.kind) return a.kind === 'directory' ? -1 : 1;
        return a.name.localeCompare(b.name);
    });
    const isTrashView = (this.fmPath[0] === 'trash');
    for (const entry of entries) {
        const icon = entry.kind === 'directory' ? '📂' : '📄';
        const isSelected = this.fmSelected.has(entry.name);
        const nameEscaped = this._escapeHtml(entry.name);
        const nameJsEscaped = this._escapeJsString(entry.name);
        let extraButtons = '';
        if (isTrashView) {
            extraButtons = `<button class="btn-mini" style="background:#4CAF50;" onclick="kernel.fmRestoreFromTrash('${nameJsEscaped}')">復元</button>`;
        }
        html += `
            <div class="list-item" style="justify-content: space-between; flex-wrap:wrap;">
                <div style="display:flex; align-items:center; gap:8px; flex:1;">
                    ${this.fmSelectMode ? `<input type="checkbox" data-name="${nameEscaped}" ${isSelected ? 'checked' : ''} onchange="kernel.fmToggleSelect('${nameJsEscaped}')">` : ''}
                    <span>${icon} ${nameEscaped}</span>
                </div>
                <div style="display:flex; gap:6px;">
                    <button class="btn-mini" onclick="kernel.fmAction('${nameJsEscaped}', '${entry.kind}')">開く</button>
                    <button class="btn-mini" onclick="kernel.fmDelete('${nameJsEscaped}', '${entry.kind}')">🗑️</button>
                    <button class="btn-mini" onclick="kernel.fmRename('${nameJsEscaped}', '${entry.kind}')">✏️</button>
                    ${extraButtons}
                </div>
            </div>
        `;
    }
    body.innerHTML = html + `</div>`;
}
async fmRefreshBrowser() {
    await this.renderBrowser(document.getElementById('body-sys.files'));
}

// ---------- パンくずリスト ----------
_buildBreadcrumb() {
    let html = `<span style="cursor:pointer; color:var(--accent);" onclick="kernel.fmNavigateToPath([])">root</span>`;
    let cumulative = [];
    for (let i = 0; i < this.fmPath.length; i++) {
        cumulative.push(this.fmPath[i]);
        let pathJson = JSON.stringify(cumulative.slice(0, i+1)).replace(/"/g, "'");
        html += ` / <span style="cursor:pointer; color:var(--accent);" onclick="kernel.fmNavigateToPath(${pathJson})">${this._escapeHtml(this.fmPath[i])}</span>`;
    }
    return html;
}
async fmNavigateToPath(pathArray) {
    if (typeof pathArray === 'string') {
        try { pathArray = JSON.parse(pathArray.replace(/'/g, '"')); } catch(e) { pathArray = []; }
    }
    if (!Array.isArray(pathArray)) pathArray = [];
    this.fmPath = pathArray;
    this.fmSelectMode = false;
    this.fmSelected.clear();
    await this.renderBrowser(document.getElementById('body-sys.files'));
}

// ---------- クリップボード操作 ----------
async fmCopyToClipboard() {
    if (this.fmSelected.size === 0) return;
    const dir = await this.getFmDir();
    let items = [];
    for (const name of this.fmSelected) {
        let entry;
        try { entry = await dir.getDirectoryHandle(name); items.push({ name, kind: 'directory', handle: entry }); }
        catch(e) { entry = await dir.getFileHandle(name); items.push({ name, kind: 'file', handle: entry }); }
    }
    this.fmClipboard = { type: 'copy', sourcePath: [...this.fmPath], items };
    this.showOSPopup("クリップボード", `${items.length}個のアイテムをコピーしました`);
}
async fmCutToClipboard() {
    if (this.fmSelected.size === 0) return;
    const dir = await this.getFmDir();
    let items = [];
    for (const name of this.fmSelected) {
        let entry;
        try { entry = await dir.getDirectoryHandle(name); items.push({ name, kind: 'directory', handle: entry }); }
        catch(e) { entry = await dir.getFileHandle(name); items.push({ name, kind: 'file', handle: entry }); }
    }
    this.fmClipboard = { type: 'cut', sourcePath: [...this.fmPath], items };
    this.showOSPopup("クリップボード", `${items.length}個のアイテムを切り取りました（貼り付け後に削除されます）`);
}
async fmPasteFromClipboard() {
    if (!this.fmClipboard || !this.fmClipboard.items || this.fmClipboard.items.length === 0) {
        this.showOSPopup("貼り付け", "クリップボードが空です");
        return;
    }
    const destDir = await this.getFmDir();
    let success = 0, fail = 0;
    for (const item of this.fmClipboard.items) {
        let exists = false;
        try { await destDir.getFileHandle(item.name); exists = true; } catch(e) { try { await destDir.getDirectoryHandle(item.name); exists = true; } catch(e2) {} }
        if (exists) {
            const choice = await this.showDialog("ファイル競合", `${item.name} は既に存在します。どうしますか？`, [
                { label: "上書き", value: "overwrite" }, { label: "スキップ", value: "skip" }, { label: "キャンセル", value: "cancel" }
            ]);
            if (choice === "cancel") break;
            if (choice === "skip") { fail++; continue; }
            try { await destDir.removeEntry(item.name, { recursive: true }); } catch(e) { console.warn(e); }
        }
        try {
            if (item.kind === 'file') {
                const file = await item.handle.getFile();
                const newFile = await destDir.getFileHandle(item.name, { create: true });
                const writable = await newFile.createWritable();
                await writable.write(await file.arrayBuffer());
                await writable.close();
            } else {
                const sourceDir = item.handle;
                const targetDir = await destDir.getDirectoryHandle(item.name, { create: true });
                await this._copyDir(sourceDir, targetDir);
            }
            success++;
        } catch(e) { fail++; console.warn(`貼り付け失敗: ${item.name}`, e); }
    }
    if (this.fmClipboard.type === 'cut' && success > 0) {
        const sourceDir = await this._getDirByPath(this.fmClipboard.sourcePath);
        for (const item of this.fmClipboard.items) {
            try { await sourceDir.removeEntry(item.name, { recursive: true }); } catch(e) { console.warn(`削除失敗: ${item.name}`, e); }
        }
        if (JSON.stringify(this.fmPath) === JSON.stringify(this.fmClipboard.sourcePath))
            await this.renderBrowser(document.getElementById('body-sys.files'));
    }
    this.fmClipboard = null;
    this.fmSelectMode = false;
    this.fmSelected.clear();
    await this.renderBrowser(document.getElementById('body-sys.files'));
    this.showOSPopup("貼り付け", `${success}個成功、${fail}個失敗`);
}
async _getDirByPath(pathArray) {
    let dir = this.root;
    for (const p of pathArray) dir = await dir.getDirectoryHandle(p);
    return dir;
}

// ---------- 検索機能 ----------
async fmSearch() {
    const result = await this.showDialog("ファイル検索", "検索ワードを入力", [
        { label: "検索", value: "search" }, { label: "キャンセル", value: "cancel" }
    ], { input: { type: "text", placeholder: "ファイル名の一部" } });
    if (result.value !== "search") return;
    const keyword = result.inputValue.trim().toLowerCase();
    if (!keyword) return;
    await this._executeSearch(keyword);
}
async _executeSearch(keyword) {
    this._lastSearchKeyword = keyword;
    this.fmViewMode = 'search';
    const results = [];
    const searchDir = async (dirHandle, currentPath = '') => {
        for await (const entry of dirHandle.values()) {
            if (entry.kind === 'file' && entry.name.toLowerCase().includes(keyword))
                results.push({ path: currentPath, name: entry.name });
            else if (entry.kind === 'directory' && entry.name !== 'trash')
                await searchDir(await dirHandle.getDirectoryHandle(entry.name), currentPath + entry.name + '/');
        }
    };
    await searchDir(this.root);
    const body = document.getElementById('body-sys.files');
    if (results.length === 0) {
        body.innerHTML = `<div style="padding:15px;"><p>見つかりませんでした: "${keyword}"</p><button class="btn-mini" onclick="kernel.gofilehome()">ホームへ戻る</button></div>`;
    } else {
        let html = `<div style="padding:15px;"><h4>検索結果: "${keyword}" (${results.length})</h4><button class="btn-mini" onclick="kernel.gofilehome()">🏠 ホームへ戻る</button><hr>`;
        for (const item of results) {
            const fullPath = (item.path ? item.path + item.name : item.name);
            html += `<div class="list-item" style="justify-content:space-between;"><span>📄 ${item.path}${item.name}</span><button class="btn-mini" onclick="kernel.fmNavigateToFile('${this._escapeJsString(fullPath)}')">開く</button></div>`;
        }
        body.innerHTML = html + `</div>`;
    }
}
async fmNavigateToFile(fullPath) {
    const parts = fullPath.split('/').filter(p => p);
    const fileName = parts.pop();
    const dirPath = parts;
    const oldPath = [...this.fmPath];
    this.fmPath = dirPath;
    this._previewReturnMode = 'search';
    this._previewSearchKeyword = this._lastSearchKeyword || '';
    await this.fmAction(fileName, 'file');
    this.fmPath = oldPath;
}

// ---------- 選択モード ----------
fmToggleSelectMode() {
    this.fmSelectMode = !this.fmSelectMode;
    if (!this.fmSelectMode) this.fmSelected.clear();
    this.renderBrowser(document.getElementById('body-sys.files'));
}
fmToggleSelect(name) {
    if (this.fmSelected.has(name)) this.fmSelected.delete(name);
    else this.fmSelected.add(name);
    this.renderBrowser(document.getElementById('body-sys.files'));
