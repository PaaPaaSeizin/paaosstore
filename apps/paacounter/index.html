<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カウンター</title>
    <style>
        body { font-family: sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff; }
        .container { text-align: center; padding: 40px; background: rgba(255,255,255,0.1); border-radius: 24px; backdrop-filter: blur(10px); }
        .count { font-size: 80px; font-weight: bold; }
        .controls { display: flex; gap: 16px; margin-top: 24px; justify-content: center; }
        .btn { width: 64px; height: 64px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .btn:active { transform: scale(0.9); }
        .btn.plus { background: #4CAF50; color: #fff; }
        .btn.minus { background: #ff6b35; color: #fff; }
        .btn.reset { background: rgba(255,255,255,0.2); color: #fff; font-size: 16px; }
        .step { margin-top: 16px; font-size: 14px; opacity: 0.7; }
        .step input { width: 48px; padding: 4px 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: #fff; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="count" id="count">0</div>
        <div class="controls">
            <button class="btn minus" onclick="change(-1)">−</button>
            <button class="btn reset" onclick="reset()">↺</button>
            <button class="btn plus" onclick="change(1)">+</button>
        </div>
        <div class="step">
            ステップ: <input id="step" type="number" min="1" value="1">
        </div>
    </div>
    <script>
        let count = 0;
        const display = document.getElementById('count');
        const stepInput = document.getElementById('step');
        function change(delta) {
            const step = parseInt(stepInput.value) || 1;
            count += delta * step;
            display.textContent = count;
        }
        function reset() {
            count = 0;
            display.textContent = '0';
        }
    </script>
</body>
</html>
