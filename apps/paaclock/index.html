<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アナログ時計</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff; }
        .container { text-align: center; }
        .clock { width: 240px; height: 240px; border: 4px solid #333; border-radius: 50%; position: relative; margin: 0 auto; background: #111; }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 4px; }
        .hour { width: 4px; height: 50px; background: #fff; margin-left: -2px; }
        .minute { width: 3px; height: 70px; background: #aaa; margin-left: -1.5px; }
        .second { width: 2px; height: 80px; background: #ff6b35; margin-left: -1px; }
        .center { position: absolute; width: 12px; height: 12px; background: #ff6b35; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .digital { font-size: 20px; margin-top: 16px; font-variant-numeric: tabular-nums; letter-spacing: 2px; opacity: 0.8; }
        .date { font-size: 14px; opacity: 0.5; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="clock" id="clock">
            <div class="hand hour" id="hour"></div>
            <div class="hand minute" id="minute"></div>
            <div class="hand second" id="second"></div>
            <div class="center"></div>
        </div>
        <div class="digital" id="digital"></div>
        <div class="date" id="date"></div>
    </div>
    <script>
        function updateClock() {
            const now = new Date();
            const h = now.getHours() % 12;
            const m = now.getMinutes();
            const s = now.getSeconds();
            document.getElementById('hour').style.transform = `rotate(${h * 30 + m * 0.5}deg)`;
            document.getElementById('minute').style.transform = `rotate(${m * 6}deg)`;
            document.getElementById('second').style.transform = `rotate(${s * 6}deg)`;
            document.getElementById('digital').textContent = now.toLocaleTimeString('ja-JP');
            document.getElementById('date').textContent = now.toLocaleDateString('ja-JP');
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
