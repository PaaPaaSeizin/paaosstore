<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サイコロ</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff; }
        .container { text-align: center; }
        .dice { font-size: 120px; line-height: 1; transition: transform 0.1s; }
        .dice.rolling { animation: roll 0.3s ease-in-out; }
        @keyframes roll {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .btn { padding: 16px 48px; background: #ff6b35; border: none; border-radius: 40px; color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 32px; }
        .btn:active { transform: scale(0.95); }
        .history { margin-top: 24px; font-size: 14px; opacity: 0.6; }
        .history span { display: inline-block; padding: 4px 8px; background: #2d2d2d; border-radius: 4px; margin: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="dice" id="dice">🎲</div>
        <div id="result" style="font-size: 32px; font-weight: bold; margin-top: 8px;">?</div>
        <button class="btn" onclick="rollDice()">🎲 振る</button>
        <div class="history" id="history"></div>
    </div>
    <script>
        let history = [];
        const diceEmojis = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
        const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
        function rollDice() {
            const el = document.getElementById('dice');
            el.classList.remove('rolling');
            void el.offsetWidth;
            el.classList.add('rolling');
            const val = Math.floor(Math.random() * 6) + 1;
            document.getElementById('result').textContent = val;
            el.textContent = diceFaces[val - 1];
            history.push(val);
            if (history.length > 10) history.shift();
            document.getElementById('history').innerHTML = history.map(n => `<span>${n}</span>`).join(' ');
        }
        rollDice();
    </script>
</body>
</html>
