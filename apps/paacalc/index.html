<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電卓</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .calc { width: 280px; background: #2d2d2d; border-radius: 16px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        #display { width: 100%; height: 60px; background: #1a1a1a; color: #fff; font-size: 28px; text-align: right; padding: 12px; border: none; border-radius: 8px; box-sizing: border-box; margin-bottom: 16px; }
        .row { display: flex; gap: 8px; margin-bottom: 8px; }
        .btn { flex: 1; height: 56px; background: #3d3d3d; color: #fff; border: none; border-radius: 8px; font-size: 20px; cursor: pointer; }
        .btn:active { background: #5d5d5d; }
        .btn.op { background: #ff6b35; }
        .btn.op:active { background: #ff8a5c; }
        .btn.eq { background: #4CAF50; }
        .btn.eq:active { background: #66bb6a; }
        .btn.zero { flex: 2; }
    </style>
</head>
<body>
    <div class="calc">
        <input id="display" readonly>
        <div class="row">
            <button class="btn" onclick="input('7')">7</button>
            <button class="btn" onclick="input('8')">8</button>
            <button class="btn" onclick="input('9')">9</button>
            <button class="btn op" onclick="input('+')">+</button>
        </div>
        <div class="row">
            <button class="btn" onclick="input('4')">4</button>
            <button class="btn" onclick="input('5')">5</button>
            <button class="btn" onclick="input('6')">6</button>
            <button class="btn op" onclick="input('-')">-</button>
        </div>
        <div class="row">
            <button class="btn" onclick="input('1')">1</button>
            <button class="btn" onclick="input('2')">2</button>
            <button class="btn" onclick="input('3')">3</button>
            <button class="btn op" onclick="input('*')">×</button>
        </div>
        <div class="row">
            <button class="btn zero" onclick="input('0')">0</button>
            <button class="btn" onclick="input('.')">.</button>
            <button class="btn op" onclick="input('/')">÷</button>
        </div>
        <div class="row">
            <button class="btn" onclick="clearDisplay()" style="background:#d32f2f;">C</button>
            <button class="btn eq" onclick="calculate()" style="flex:2;">=</button>
        </div>
    </div>
    <script>
        let display = document.getElementById('display');
        let current = '';
        function input(val) { current += val; display.value = current; }
        function clearDisplay() { current = ''; display.value = ''; }
        function calculate() {
            try { current = eval(current).toString(); display.value = current; }
            catch(e) { display.value = 'Error'; current = ''; }
        }
    </script>
</body>
</html>
