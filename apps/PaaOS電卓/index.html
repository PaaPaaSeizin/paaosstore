<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電卓</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            font-family: sans-serif;
        }
        .calculator {
            width: 320px;
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        #display {
            width: 100%;
            height: 70px;
            font-size: 2.5rem;
            text-align: right;
            border: none;
            outline: none;
            background: #f8f9fa;
            color: #333;
            margin-bottom: 20px;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 10px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            height: 60px;
            font-size: 1.5rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #e9ecef;
            transition: background 0.2s;
        }
        button:active { background: #dee2e6; }
        .op { background: #ff9500; color: white; }
        .op:active { background: #e08400; }
        .eq { background: #28a745; color: white; }
        .ac { background: #dc3545; color: white; }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" readonly value="0">
    <div class="grid">
        <button class="ac" onclick="clearAll()">AC</button>
        <button onclick="backspace()">C</button>
        <button class="op" onclick="addOp('/')">÷</button>
        <button class="op" onclick="addOp('*')">×</button>

        <button onclick="addNum('7')">7</button>
        <button onclick="addNum('8')">8</button>
        <button onclick="addNum('9')">9</button>
        <button class="op" onclick="addOp('-')">-</button>

        <button onclick="addNum('4')">4</button>
        <button onclick="addNum('5')">5</button>
        <button onclick="addNum('6')">6</button>
        <button class="op" onclick="addOp('+')">+</button>

        <button onclick="addNum('1')">1</button>
        <button onclick="addNum('2')">2</button>
        <button onclick="addNum('3')">3</button>
        <button class="eq" onclick="calc()" style="grid-row: span 2; height: 130px;">=</button>

        <button onclick="addNum('0')" style="grid-column: span 2;">0</button>
        <button onclick="addNum('.')">.</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    let expr = '0';
    let finish = false;

    function update() {
        display.value = expr;
    }

    function addNum(n) {
        if (expr === '0' || finish) {
            expr = n;
            finish = false;
        } else {
            expr += n;
        }
        update();
    }

    function addOp(op) {
        finish = false;
        const last = expr.slice(-1);
        if (['+','-','*','/'].includes(last)) {
            expr = expr.slice(0, -1) + op;
        } else {
            expr += op;
        }
        update();
    }

    function clearAll() {
        expr = '0';
        update();
    }

    function backspace() {
        expr = expr.slice(0, -1);
        if (expr === '') expr = '0';
        update();
    }

    function calc() {
        try {
            // evalの前に基本的なバリデーション
            let result = eval(expr);
            expr = String(result);
            finish = true;
            update();
        } catch {
            display.value = "Error";
            expr = '0';
        }
    }

    // キーボード入力を監視
    document.addEventListener('keydown', (e) => {
        if (e.key >= '0' && e.key <= '9') addNum(e.key);
        if (e.key === '.') addNum('.');
        if (e.key === '+') addOp('+');
        if (e.key === '-') addOp('-');
        if (e.key === '*') addOp('*');
        if (e.key === '/') addOp('/');
        if (e.key === 'Enter') { e.preventDefault(); calc(); }
        if (e.key === 'Backspace') backspace();
        if (e.key === 'Escape') clearAll();
    });
</script>

</body>
</html>
