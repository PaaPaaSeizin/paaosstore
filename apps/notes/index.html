<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メモ帳</title>
    <style>
        body { font-family: sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        h1 { font-size: 20px; color: #333; }
        textarea { width: 100%; height: 300px; padding: 12px; border-radius: 12px; border: 1px solid #ddd; font-size: 14px; box-sizing: border-box; resize: none; }
        .btn { width: 100%; padding: 12px; background: #4CAF50; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 8px; cursor: pointer; }
        .btn:active { opacity: 0.8; }
        .btn.clear { background: #d32f2f; }
        .info { font-size: 12px; color: #888; text-align: center; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 メモ帳</h1>
        <textarea id="memo" placeholder="メモを入力してください..."></textarea>
        <button class="btn" onclick="saveMemo()">💾 保存</button>
        <button class="btn clear" onclick="clearMemo()">🗑️ クリア</button>
        <div class="info" id="status">準備完了</div>
    </div>
    <script>
        const memo = document.getElementById('memo');
        const status = document.getElementById('status');
        // ローカルストレージに保存
        memo.value = localStorage.getItem('paaos_memo') || '';
        function saveMemo() {
            localStorage.setItem('paaos_memo', memo.value);
            status.textContent = '✅ 保存しました！';
            setTimeout(() => status.textContent = '準備完了', 2000);
        }
        function clearMemo() {
            if (confirm('メモを削除しますか？')) {
                memo.value = '';
                localStorage.removeItem('paaos_memo');
                status.textContent = '🗑️ 削除しました';
                setTimeout(() => status.textContent = '準備完了', 2000);
            }
        }
        // 自動保存（5秒ごと）
        setInterval(saveMemo, 5000);
    </script>
</body>
</html>
