<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>PaaOS App Store Manager</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input, textarea, button, select { display: block; width: 100%; margin: 8px 0; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #0078d4; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { opacity: 0.8; }
        .status { padding: 10px; background: #e8f0fe; border-radius: 8px; }
        .error { background: #fce8e8; color: #c00; }
        .flex-row { display: flex; gap: 10px; align-items: center; }
        .flex-row > * { flex: 1; }
        .file-note { font-size: 12px; color: #888; margin-top: -4px; margin-bottom: 8px; }
        .readonly-field { background: #f0f0f0; cursor: not-allowed; }
        .warning { background: #fff3cd; color: #856404; padding: 10px; border-radius: 8px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <h1>📦 PaaOS アプリストア管理</h1>
    <div class="card">
        <h2>設定</h2>
        <form id="settings-form">
            <label>GitHub トークン</label>
            <input type="password" id="token" name="token" 
                   placeholder="ghp_xxxx" 
                   autocomplete="current-password">

            <label>リポジトリ（owner/repo）</label>
            <input type="text" id="repo" name="repo" 
                   value="PaaPaaSeizin/paaosstore" readonly>

            <label>ブランチ</label>
            <input type="text" id="branch" name="branch" 
                   value="main" readonly>
        </form>
    </div>

    <div class="card">
        <h2>既存アプリを選択（更新用）</h2>
        <div class="flex-row">
            <button id="loadAppsBtn">📋 アプリ一覧を読み込む</button>
            <select id="appSelect" style="display:none;">
                <option value="">-- アプリを選択してください --</option>
            </select>
        </div>
        <div id="loadStatus" class="status" style="margin-top:10px;">まだ読み込んでいません</div>
    </div>

    <div class="card">
        <h2>アプリ情報</h2>
        
        <div class="warning">
            ⚠️ <strong>重要：</strong>アプリIDとアプリ名は常に同じ値になります。<br>
            フォルダ名もこのIDで作成されるため、PaaOS上で確実に認識されます。
        </div>

        <label>アプリID（英数字・ハイフン） <span style="color:#c00;">*</span></label>
        <input type="text" id="appId" placeholder="例: calculator" oninput="syncName()">

        <label>アプリ名 <span style="color:#c00;">*</span></label>
        <input type="text" id="appName" class="readonly-field" readonly>

        <label>説明</label>
        <input type="text" id="appDesc" placeholder="説明文">

        <label>バージョン</label>
        <input type="text" id="appVersion" value="1.0.0">

        <label>アイコンファイル（PNG）<span style="font-weight:normal;font-size:12px;color:#888;">（任意：選択しないと既存を維持）</span></label>
        <input type="file" id="iconFile" accept="image/png">
        <div class="file-note">更新時にアイコンを変更したい場合のみ選択</div>

        <label>index.html ファイル<span style="font-weight:normal;font-size:12px;color:#888;">（任意：選択しないと既存を維持）</span></label>
        <input type="file" id="indexFile" accept="text/html">
        <div class="file-note">更新時にHTMLを変更したい場合のみ選択</div>

        <button id="uploadBtn">アップロード（新規追加／更新）</button>
        <div id="status" class="status">準備完了</div>
    </div>

    <div class="card">
        <h2>現在の apps.json（確認用）</h2>
        <button id="listBtn">JSONを表示</button>
        <pre id="appList" style="background:#eee; padding:10px; border-radius:8px; max-height:300px; overflow:auto;"></pre>
    </div>

    <script>
        // ----- 同期関数：appId → appName を自動コピー -----
        function syncName() {
            const id = document.getElementById('appId').value;
            const nameInput = document.getElementById('appName');
            // アプリ名をIDと同じにする（ただし空の場合は空のまま）
            nameInput.value = id;
        }

        // 手動で名前を変更できないようにする（既に readonly だが念のため）
        document.getElementById('appName').addEventListener('keydown', (e) => e.preventDefault());

        // ----- ユーティリティ -----
        const tokenInput = document.getElementById('token');
        const repoInput = document.getElementById('repo');
        const branchInput = document.getElementById('branch');

        const appIdInput = document.getElementById('appId');
        const appNameInput = document.getElementById('appName');
        const appDescInput = document.getElementById('appDesc');
        const appVersionInput = document.getElementById('appVersion');
        const iconFileInput = document.getElementById('iconFile');
        const indexFileInput = document.getElementById('indexFile');

        const statusDiv = document.getElementById('status');
        const loadStatusDiv = document.getElementById('loadStatus');

        const appSelect = document.getElementById('appSelect');
        const loadAppsBtn = document.getElementById('loadAppsBtn');

        // ----- アプリ一覧取得＆セレクトボックス生成 -----
        async function fetchAppList() {
            const token = tokenInput.value;
            const repo = repoInput.value;
            const branch = branchInput.value;

            if (!token || !repo) {
                loadStatusDiv.innerText = '⚠️ トークンとリポジトリを設定してください。';
                loadStatusDiv.className = 'status error';
                return;
            }

            try {
                const owner = repo.split('/')[0];
                const repoName = repo.split('/')[1];
                const url = `https://api.github.com/repos/${owner}/${repoName}/contents/apps.json?ref=${branch}`;
                const res = await fetch(url, {
                    headers: { 'Authorization': `token ${token}` }
                });

                if (!res.ok) throw new Error('apps.json の取得に失敗しました (HTTP ' + res.status + ')');

                const data = await res.json();
                const content = atob(data.content);
                const json = JSON.parse(content);

                if (!json.apps || json.apps.length === 0) {
                    loadStatusDiv.innerText = '📭 アプリが一つも登録されていません。';
                    loadStatusDiv.className = 'status';
                    appSelect.style.display = 'none';
                    return;
                }

                // セレクトボックスを生成
                appSelect.innerHTML = '<option value="">-- アプリを選択してください --</option>';
                json.apps.forEach(app => {
                    const opt = document.createElement('option');
                    opt.value = app.id;
                    opt.textContent = `${app.name} (${app.id}) v${app.version}`;
                    appSelect.appendChild(opt);
                });
                appSelect.style.display = 'block';
                loadStatusDiv.innerText = `✅ ${json.apps.length} 件のアプリを読み込みました。`;
                loadStatusDiv.className = 'status';

                // 選択イベントを付与
                appSelect.onchange = function() {
                    const selectedId = this.value;
                    if (!selectedId) return;
                    const app = json.apps.find(a => a.id === selectedId);
                    if (!app) return;
                    // フォームに反映（IDと名前は同じ値でセット）
                    appIdInput.value = app.id;
                    appNameInput.value = app.id;  // ★ 強制的にIDと同じにする
                    appDescInput.value = app.description || '';
                    appVersionInput.value = app.version;
                    // ファイル入力はクリア
                    iconFileInput.value = '';
                    indexFileInput.value = '';
                    statusDiv.innerText = `📝 アプリ「${app.name}」の情報を読み込みました。必要に応じてファイルを選択し、「アップロード」を押してください。`;
                    statusDiv.className = 'status';
                };

                // 現在選択中のアイテムがあれば、自動で反映
                if (appSelect.value) {
                    appSelect.dispatchEvent(new Event('change'));
                }

            } catch (err) {
                loadStatusDiv.innerText = '❌ エラー: ' + err.message;
                loadStatusDiv.className = 'status error';
                console.error(err);
            }
        }

        loadAppsBtn.addEventListener('click', fetchAppList);

        // ----- アップロード処理（ID＝名前強制） -----
        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const token = tokenInput.value;
            const repo = repoInput.value;
            const branch = branchInput.value;
            const appId = appIdInput.value.trim();
            const appName = appNameInput.value.trim();  // ← IDと同じ値が入っている
            const appDesc = appDescInput.value.trim();
            const appVersion = appVersionInput.value.trim();
            const iconFile = iconFileInput.files[0];
            const indexFile = indexFileInput.files[0];

            // 必須項目チェック（ファイルは任意）
            if (!token || !repo || !appId) {
                statusDiv.innerText = '⚠️ トークン、リポジトリ、アプリIDは必須です。';
                statusDiv.className = 'status error';
                return;
            }

            // ★ 念のため：名前がIDと異なる場合は強制的に合わせる
            if (appName !== appId) {
                appNameInput.value = appId;
                statusDiv.innerText = '⚠️ アプリ名をアプリIDに合わせました。';
                statusDiv.className = 'status error';
                return;
            }

            statusDiv.innerText = '⏳ 処理中...';
            statusDiv.className = 'status';

            try {
                const owner = repo.split('/')[0];
                const repoName = repo.split('/')[1];
                const apiBase = `https://api.github.com/repos/${owner}/${repoName}/contents`;

                // 1. apps.json を取得
                let currentAppsJson = { apps: [] };
                let sha = null;
                try {
                    const res = await fetch(`${apiBase}/apps.json?ref=${branch}`, {
                        headers: { 'Authorization': `token ${token}` }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        const content = atob(data.content);
                        currentAppsJson = JSON.parse(content);
                        sha = data.sha;
                    } else if (res.status !== 404) {
                        throw new Error('apps.json 取得エラー');
                    }
                } catch(e) {}

                // 2. アプリ情報を更新/追加（ID＝名前）
                const appIndex = currentAppsJson.apps.findIndex(a => a.id === appId);
                const appEntry = {
                    id: appId,
                    name: appId,  // ★★★ 強制的にIDと同じ名前 ★★★
                    description: appDesc || '',
                    version: appVersion,
                    icon: `https://raw.githubusercontent.com/${owner}/${repoName}/${branch}/apps/${appId}/icon.png`,
                    basePath: `apps/${appId}/`,
                    files: ['index.html', 'icon.png']
                };
                if (appIndex >= 0) {
                    currentAppsJson.apps[appIndex] = appEntry;
                } else {
                    currentAppsJson.apps.push(appEntry);
                }

                // 3. ファイルアップロード（選択されているものだけ）
                const readFileAsBase64 = (file) => {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                    });
                };

                const uploadFile = async (path, content, message) => {
                    let fileSha = null;
                    try {
                        const res = await fetch(`${apiBase}/${path}?ref=${branch}`, {
                            headers: { 'Authorization': `token ${token}` }
                        });
                        if (res.ok) {
                            const data = await res.json();
                            fileSha = data.sha;
                        }
                    } catch(e) {}
                    const body = {
                        message: message,
                        content: content,
                        branch: branch,
                        sha: fileSha || undefined
                    };
                    const res = await fetch(`${apiBase}/${path}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(body)
                    });
                    if (!res.ok) throw new Error(`ファイル ${path} のアップロードに失敗 (HTTP ${res.status})`);
                };

                // アイコンファイルが選択されていればアップロード
                if (iconFile) {
                    const iconBase64 = await readFileAsBase64(iconFile);
                    await uploadFile(`apps/${appId}/icon.png`, iconBase64, `Add/update icon for ${appId}`);
                }

                // index.html が選択されていればアップロード
                if (indexFile) {
                    const indexBase64 = await readFileAsBase64(indexFile);
                    await uploadFile(`apps/${appId}/index.html`, indexBase64, `Add/update index.html for ${appId}`);
                }

                // 4. apps.json を更新（常に更新）
                const updatedJson = JSON.stringify(currentAppsJson, null, 2);
                // UTF-8 → Base64 に正しく変換
const encoder = new TextEncoder();
const data = encoder.encode(updatedJson);
const jsonBase64 = btoa(String.fromCharCode(...data));
                await uploadFile('apps.json', jsonBase64, `Update apps.json for ${appId}`);

                statusDiv.innerText = `✅ アプリ "${appId}" をアップロードしました！（ID＝名前＝フォルダ名）`;
                statusDiv.className = 'status';

                // アップロード成功後、アプリ一覧を再読み込み
                await fetchAppList();
                // 選択をリセット
                appSelect.value = '';

            } catch (err) {
                statusDiv.innerText = `❌ エラー: ${err.message}`;
                statusDiv.className = 'status error';
                console.error(err);
            }
        });

        // ----- JSON表示（確認用） -----
        document.getElementById('listBtn').addEventListener('click', async () => {
            const token = tokenInput.value;
            const repo = repoInput.value;
            const branch = branchInput.value;
            const pre = document.getElementById('appList');
            if (!token || !repo) {
                pre.innerText = 'トークンとリポジトリを設定してください。';
                return;
            }
            try {
                const owner = repo.split('/')[0];
                const repoName = repo.split('/')[1];
                const res = await fetch(`https://api.github.com/repos/${owner}/${repoName}/contents/apps.json?ref=${branch}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (!res.ok) throw new Error('取得失敗');
                const data = await res.json();
                const content = atob(data.content);
                const json = JSON.parse(content);
                pre.innerText = JSON.stringify(json, null, 2);
            } catch(e) {
                pre.innerText = 'エラー: ' + e.message;
            }
        });

        // 初期化：アプリ名欄にIDを自動反映
        document.addEventListener('DOMContentLoaded', () => {
            syncName();
        });
    </script>
</body>
</html>
